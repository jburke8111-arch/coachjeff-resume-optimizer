  const hasProjects = (data.projects || []).some(p => p.name || (p.bullets || []).some(Boolean));
  const hasExperience = (data.experience || []).some(e => e.title || e.org || (e.bullets || []).some(Boolean));
  const hasPublications = (data.publications || []).some(p => p.citation);

  if (/Technology|CS|Engineering|Data|Analytics|AI/i.test(field)) {
    const reasons = [];
    reasons.push("Skills stay near the top so recruiters can quickly confirm technical fit.");
    if (hasProjects) reasons.push("Projects are placed high because they show tools, code, analysis, and applied work.");
    if (hasExperience) reasons.push("Experience follows projects because this resume has substantive applied work.");
    reasons.push("Education remains visible, but not above stronger project/experience evidence.");
    if (hasPublications) reasons.push("Publications move higher because research output is a differentiator.");
    return reasons.join(" ");
  }
  return "The order is based on common recruiter scan patterns for the selected field and can still be customized.";
}


function countNonEmptyEntries(arr, keys) {
  return (arr || []).filter(item => keys.some(k => {
    const v = item && item[k];
    return Array.isArray(v) ? v.some(Boolean) : !!v;
  })).length;
}


function isUserMeaningfulImportChange(msg) {
  const m = String(msg || "").trim();
  if (!m) return false;
  // Hide internal parser housekeeping that does not affect the visible resume.
  if (/removed formatting artifact/i.test(m)) return false;
  return true;
}

function normalizeSkillForMatch(s) {
  return String(s || "")
    .toLowerCase()
    .replace(/[()]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function skillAlreadyOnResume(data, skill) {
  const target = normalizeSkillForMatch(skill);
  if (!target) return false;
  const buckets = [
    data.skills && data.skills.technical,
    data.skills && data.skills.dataVisualization,
    data.skills && data.skills.tools,
    data.skills && data.skills.domain
  ].join(", ");
  const resumeText = normalizeSkillForMatch(buckets);
  const parts = splitCsvSkills(buckets).map(normalizeSkillForMatch);
  if (parts.some(p => p === target)) return true;
  if (target === "power bi" && /\bpower bi\b/.test(resumeText)) return true;
  if (target === "git" && /\bgit\b|\bgit\/github\b/.test(resumeText)) return true;
  if (target === "github" && /\bgithub\b|\bgit\/github\b/.test(resumeText)) return true;
  if (target === "azure" && /\bazure\b/.test(resumeText)) return true;
  if (target === "python" && /\bpython\b/.test(resumeText)) return true;
  if (target === "sql" && /\bsql\b/.test(resumeText)) return true;
  return false;
}

function analyzeImportIntelligence(mapped, importLinks) {
  if (!mapped) return null;

  const created = [];
  const review = [];
  const changed = [];
  const removed = [];

  const expCount = countNonEmptyEntries(mapped.experience, ["title", "org", "bullets"]);
  const projCount = countNonEmptyEntries(mapped.projects, ["name", "bullets"]);
  const eduCount = countNonEmptyEntries(mapped.education, ["degree", "school"]);
  const actCount = countNonEmptyEntries(mapped.activities, ["role", "org", "bullets"]);
  const certCount = countNonEmptyEntries(mapped.certifications, ["name"]);
  const awardsCount = countNonEmptyEntries(mapped.awards, ["name"]);
  const pubsCount = countNonEmptyEntries(mapped.publications, ["citation"]);

  if (mapped.name || (mapped.contact && (mapped.contact.email || mapped.contact.phone))) created.push("Contact information detected");
  if (mapped.summary) created.push("Professional Summary detected");
  if (mapped.skills && (mapped.skills.technical || mapped.skills.dataVisualization || mapped.skills.tools || mapped.skills.domain)) {
    const skillTotal =
      splitCsvSkills(mapped.skills.technical).length +
      splitCsvSkills(mapped.skills.dataVisualization).length +
      splitCsvSkills(mapped.skills.tools).length +
      splitCsvSkills(mapped.skills.domain).length;
    created.push("Skills classified (" + skillTotal + ")");
  }
  if (expCount) created.push(expCount + " Experience entr" + (expCount === 1 ? "y" : "ies"));
  if (projCount) created.push(projCount + " Project entr" + (projCount === 1 ? "y" : "ies"));
  if (eduCount) created.push(eduCount + " Education entr" + (eduCount === 1 ? "y" : "ies"));
  if (actCount) created.push(actCount + " Leadership/Activity entr" + (actCount === 1 ? "y" : "ies"));
  if (certCount) created.push(certCount + " Certification entr" + (certCount === 1 ? "y" : "ies"));
  if (awardsCount) created.push(awardsCount + " Award/Honor entr" + (awardsCount === 1 ? "y" : "ies"));
  if (pubsCount) created.push(pubsCount + " Publication/Research entr" + (pubsCount === 1 ? "y" : "ies"));

  if (importLinks && importLinks.all && importLinks.all.length) changed.push(importLinks.all.length + " embedded hyperlink" + (importLinks.all.length === 1 ? "" : "s") + " extracted separately");

  if (mapped.skills && mapped.skills.importChanges && mapped.skills.importChanges.length) {
    mapped.skills.importChanges.filter(isUserMeaningfulImportChange).forEach(n => {
      if (/removed/i.test(n)) removed.push(n);
      else changed.push(n);
    });
  }

  (mapped.education || []).forEach(ed => {
    if (ed && ed.degree && ed.grad && ed.degree.toLowerCase().includes(String(ed.grad).toLowerCase())) review.push("Education degree field may still include graduation date");
    if (ed && ed.school && ed.location && ed.school.includes(ed.location)) review.push("Education school field may still include location");
    if (ed && (ed.degree || ed.school) && !ed.grad) review.push("Education entry missing graduation date");
  });

  (mapped.certifications || []).forEach(c => {
    if (c && c.name && !c.date) review.push("Certification imported without date");
  });

  if (mapped.contact && mapped.contact.relocationNoteFound) {
    review.push("Relocation note removed from location — a “relocating to…” line generally isn't necessary on a resume; list your current city and state, or the target city if you've already moved.");
  }

  (mapped.publications || []).forEach(p => {
    if (p && p.citation && !p.date) review.push("Publication/Research entry may need date review");
  });

  const missingCore = [];
  if (!mapped.summary) missingCore.push("summary");
  if (!expCount) missingCore.push("experience");
  if (!eduCount) missingCore.push("education");
  if (!mapped.skills || !(mapped.skills.technical || mapped.skills.dataVisualization || mapped.skills.tools || mapped.skills.domain)) missingCore.push("skills");

  let score = 100;
  score -= missingCore.length * 12;
  score -= Math.min(review.length, 6) * 4;
  if (!mapped.name) score -= 6;
  if (!mapped.contact || !mapped.contact.email) score -= 6;
  if (!mapped.contact || !mapped.contact.phone) score -= 4;
  score = Math.max(55, Math.min(100, score));

  let label = "Excellent";
  if (score < 70) label = "Significant Review Needed";
  else if (score < 85) label = "Review Recommended";
  else if (score < 95) label = "Good";

  return {
    score,
    label,
    created: Array.from(new Set(created)),
    changed: Array.from(new Set(changed)),
    removed: Array.from(new Set(removed)),
    review: Array.from(new Set(review)),
    counts: { expCount, projCount, eduCount, actCount, certCount, awardsCount, pubsCount }
  };
}

function analyzeProjectStrength(data) {
  const toolsLine = b => /^\s*(tools?|tech|technologies|stack|built with|tools?\s*&\s*technologies)\s*[:|]/i.test(String(b || ""));
  // Subtitle/org lines (e.g. "University of North Texas | ...") are context, not accomplishments.
  const metaLine = b => toolsLine(b) || /^(university|college|institute|school)\b/i.test(String(b || "").trim()) || (/\s\|\s/.test(String(b || "")) && !/\d/.test(String(b || "")));
  // A real project has a name AND at least one meaningful (non-meta) bullet.
  const projects = (data.projects || []).filter(p => p && (p.name && (p.bullets || []).some(b => b && b.trim() && !metaLine(b))));
  const techTerms = ["Python","SQL","API","APIs","React","Node","Power BI","Tableau","XGBoost","Logistic Regression","D3","Gemini","RAG","Machine Learning","NetworkX","TradingView","Figma","Agile","Excel","Azure","AWS","Docker"];
  // Accomplishment bullets exclude tools and subtitle/org lines.
  const bullets = projects.flatMap(p => (p.bullets || []).filter(b => b && b.trim() && !metaLine(b)));
  const quantified = bullets.filter(b => isQuantifiedBullet(b)).length;
  const techDetected = projects.filter(p => {
    const hasToolsLine = (p.bullets || []).some(toolsLine);
    const t = [p.name, ...(p.bullets || [])].join(" ");
    return hasToolsLine || techTerms.some(term => t.toLowerCase().includes(term.toLowerCase()));
  }).length;
  const score = projects.length ? Math.max(55, Math.min(100, 72 + Math.min(18, quantified * 3) + Math.min(10, techDetected * 2))) : 60;
  const notes = [];
  if (!projects.length) notes.push("No projects detected.");
  if (projects.length && quantified < Math.ceil(bullets.length / 3)) notes.push("Add more measurable project outcomes where accurate.");
  if (projects.length && techDetected < projects.length) notes.push("Make sure each project names the tools, methods, or technologies used.");

  return { score, projects: projects.length, bullets: bullets.length, quantified, techDetected, notes };
}

function targetFieldFit(data) {
  const field = String(data.field || "");
  const resumeText = collectResumeText(data).toLowerCase();
  const required = (SKILL_BANK[field] || []).map(s => String(s || "").toLowerCase());
  if (!field || !required.length) return { score: 100, hits: [], missing: [], penalty: 0, note: "" };
  const hits = required.filter(s => resumeText.includes(s));
  const hitRatio = hits.length / required.length;
  let penalty = 0;
  if (hitRatio < 0.08) penalty = 22;
  else if (hitRatio < 0.16) penalty = 14;
  else if (hitRatio < 0.25) penalty = 7;
  const missing = required.filter(s => !resumeText.includes(s)).slice(0, 8);
  const score = Math.max(55, Math.round(100 - penalty - Math.max(0, 25 - Math.round(hitRatio * 100)) / 2));
  const note = penalty ? "Target field mismatch: the selected field is " + field + ", but the resume shows limited matching evidence. Scores are reduced until the resume or target field aligns." : "Target field evidence appears aligned with " + field + ".";
  return { score, hits, missing, penalty, note };
}

// ---- Evaluation Context (manual eval §0) ----
// States the target role back to the candidate and flags focus dilution,
// mirroring the opening frame of the manual audit.
function buildEvaluationContext(data, resumeStrength) {
  const field = String(data.field || "").trim();
  if (!field) return null;
  const fit = (resumeStrength && resumeStrength.fieldFit) || targetFieldFit(data);

  // Focus-dilution heuristic: count distinct "identity" signals in the resume
  // text. If the resume spreads across several unrelated tracks, note it.
  const text = collectResumeText(data).toLowerCase();
  const identities = [
    { name: "software / backend engineering", re: /\b(backend|api|microservice|distributed systems|full[- ]?stack)\b/ },
    { name: "data / ML engineering", re: /\b(machine learning|ml|deep learning|model|pipeline|data engineer)\b/ },
    { name: "data analysis / BI", re: /\b(tableau|power bi|dashboard|analytics|reporting|sql)\b/ },
    { name: "cloud / DevOps", re: /\b(aws|azure|kubernetes|docker|ci\/cd|terraform|mlops)\b/ },
    { name: "product / project management", re: /\b(product manager|scrum|roadmap|stakeholder|agile)\b/ }
  ];
  const present = identities.filter(i => i.re.test(text)).map(i => i.name);

  const strengthLine = "You've given a clear target: " + field +
    " roles. That direction should drive your summary, skill order, and which projects lead.";

  let focusNote = "";
  if (present.length >= 3) {
    focusNote = "The resume currently spans several tracks (" + present.slice(0, 3).join(", ") +
      "). That breadth is a technical strength, but it can dilute focus for any single posting. " +
      "Keep this as your master version, and tailor a copy per application so the summary and skills lean toward the role you're applying to that day.";
  } else if (fit.penalty) {
    focusNote = "The resume shows limited evidence matching " + field +
      " so far. Make sure your strongest " + field + "-relevant work is near the top and named in the summary.";
  } else {
    focusNote = "The resume reads as focused on " + field + " — good. Keep the summary and skill order pointed at that target.";
  }

  const tailorTip = "Recommended: keep one master resume, then tailor a copy per application (summary + skill order) toward whichever role you're targeting.";
  return { field, strengthLine, focusNote, tailorTip, spanCount: present.length };
}

function leadershipEvidenceCount(data) {
  const leadershipWords = /\b(lead|led|leader|leadership|president|vice president|captain|chair|coordinator|mentor|mentored|tutored|tutor|taught|instructed|trained|supervised|organized|founded|initiated|spearheaded|volunteer|community|team|collaborated|collaboration|facilitated|managed|oversaw|directed|headed|guided)\b/i;
  const pools = []
    .concat(data.activities || [])
    .concat(data.volunteer || [])
    .concat(data.awards || [])
    .concat(data.projects || [])
    .concat(data.experience || []);
  return pools.filter(item => leadershipWords.test(Object.keys(item || {}).map(k => Array.isArray(item[k]) ? item[k].join(" ") : item[k]).join(" "))).length;
}

function calculateResumeStrength(data, lastSkillImportNote) {
  const exp = analyzeExperienceQuality(data);
  const skills = analyzeSkillsClassification(data);
  const edu = analyzeEducationCleanup(data);
  const projects = analyzeProjectStrength(data);
  const order = recommendSectionOrder(data);
  const fieldFit = targetFieldFit(data);

  const hasSummary = String(data.summary || "").trim().length > 80;
  const hasContact = !!(data.name && data.contact && data.contact.email && data.contact.phone);
  const hasProjects = (data.projects || []).some(p => p.name && (p.bullets || []).some(Boolean));
  const hasLinks = detectProfileLinks(data).hasAny;

  const summaryScore = hasSummary ? 95 : 70;
  const contactScore = hasContact ? 95 : 75;
  const projectsScore = projects.score;
  const orderScore = order.mismatch ? 85 : 95;

  const atsApprox = Math.max(70, Math.min(100, Math.round(contactScore * 0.25 + skills.score * 0.25 + edu.score * 0.15 + exp.score * 0.25 + orderScore * 0.10)));
  const readabilityApprox = Math.max(55, Math.min(100, Math.round(contactScore * 0.20 + exp.score * 0.30 + skills.score * 0.15 + projectsScore * 0.15 + orderScore * 0.20)));
  const rawOverall = Math.round(
    exp.score * 0.30 +
    skills.score * 0.20 +
    projectsScore * 0.15 +
    edu.score * 0.10 +
    atsApprox * 0.15 +
    readabilityApprox * 0.10
  );
  const overall = Math.max(55, Math.min(100, rawOverall - fieldFit.penalty));

  const changeNotes = analyzeSkillChangeExplanations(data, lastSkillImportNote);

  return {
    overall,
    exp,
    skills,
    edu,
    projects,
    order,
    hasSummary,
    hasContact,
    hasProjects,
    hasLinks,
    fieldFit,
    changeNotes
  };
}



function specificExperienceFeedback(data) {
  const entries = (data.experience || []).filter(e => e && (e.title || e.org || (e.bullets || []).some(Boolean)));
  const bullets = entries.flatMap(e => (e.bullets || []).filter(Boolean).map(b => ({ text: String(b || ""), entry: e })));
  const weak = bullets.filter(x => /^(responsible for|was responsible for|worked on|helped|assisted|participated|involved in|was involved in|in charge of|handled|dealt with|contributed to|took part in|oversaw the|duties included|tasked with|successfully)\b/i.test(x.text.trim()));
  const quantified = bullets.filter(x => isQuantifiedBullet(x.text));
  const unquantified = bullets.length - quantified.length;
  const missingDates = entries.filter(e => (e.title || e.org) && (!e.start || !e.end)).length;
  const longBullets = bullets.filter(x => x.text.split(/\s+/).length > 38).length;

  const notes = [];
  if (bullets.length) notes.push((quantified.length >= Math.ceil(bullets.length / 2) ? "✓ " : "⚠ ") + quantified.length + " of " + bullets.length + " experience bullets contain measurable results.");
  if (unquantified > 0) notes.push("⚠ " + unquantified + " bullet" + (unquantified === 1 ? "" : "s") + " may need more measurable results.");
  if (weak.length > 0) notes.push("⚠ " + weak.length + " bullet" + (weak.length === 1 ? "" : "s") + " may use a weak opening phrase.");
  if (missingDates === 0 && entries.length) notes.push("✓ All experience entries include dates.");
  if (missingDates > 0) notes.push("⚠ " + missingDates + " experience entr" + (missingDates === 1 ? "y is" : "ies are") + " missing dates.");
  if (longBullets > 0) notes.push("⚠ " + longBullets + " bullet" + (longBullets === 1 ? "" : "s") + " may be too long for quick recruiter scanning.");
  return { notes, quantified: quantified.length, total: bullets.length, weak: weak.length, unquantified, missingDates, longBullets };
}

function specificProjectFeedback(data) {
  const toolsLine = b => /^\s*(tools?|tech|technologies|stack|built with|tools?\s*&\s*technologies)\s*[:|]/i.test(String(b || ""));
  const metaLine = b => toolsLine(b) || /^(university|college|institute|school)\b/i.test(String(b || "").trim()) || (/\s\|\s/.test(String(b || "")) && !/\d/.test(String(b || "")));
  const projects = (data.projects || []).filter(p => p && (p.name && (p.bullets || []).some(b => b && b.trim() && !metaLine(b))));
  const techPattern = /(python|sql|api|react|node|power bi|tableau|xgboost|logistic regression|machine learning|d3|rag|gemini|networkx|tradingview|excel|azure|aws|docker|linux|github|git|jupyter|vs code|figma|agile)/i;
  const projectTech = projects.filter(p => (p.bullets || []).some(toolsLine) || techPattern.test([p.name, ...(p.bullets || [])].join(" ")));
  const quantified = projects.filter(p => (p.bullets || []).some(b => !metaLine(b) && isQuantifiedBullet(b)));
  const genericTitles = projects.filter(p => p.name && !techPattern.test(p.name) && p.name.split(/\s+/).length < 4);

  const notes = [];
  if (projects.length) notes.push((projectTech.length === projects.length ? "✓ " : "⚠ ") + projectTech.length + " of " + projects.length + " projects reference tools, methods, or technologies.");
  if (quantified.length) notes.push("✓ " + quantified.length + " project" + (quantified.length === 1 ? "" : "s") + " include measurable outcomes.");
  if (genericTitles.length) notes.push("⚠ " + genericTitles.length + " project title" + (genericTitles.length === 1 ? "" : "s") + " may be too generic.");
  if (projects.length && projectTech.length < projects.length) notes.push("⚠ Make sure each project names the tools, methods, or technologies used.");
  return { notes, projects: projects.length, withTech: projectTech.length, quantified: quantified.length, genericTitles: genericTitles.length };
}

function topImportRisks(importIntelligence) {
  if (!importIntelligence) return [];
  const risks = [];
  (importIntelligence.review || []).slice(0, 5).forEach(x => risks.push("\uD83D\uDFE1 " + x));
  return risks.slice(0, 5);
}

function analyzeRecruiterReadability(data, resumeStrength) {
  const exp = analyzeExperienceQuality(data);
  const projects = analyzeProjectStrength(data);
  const skills = analyzeSkillsClassification(data);
  const edu = analyzeEducationCleanup(data);
  const order = recommendSectionOrder(data);

  const resumeText = collectResumeText(data);
  const wordCount = resumeText.split(/\s+/).filter(Boolean).length;
  const allBullets = [
    ...(data.experience || []).flatMap(e => e.bullets || []),
    ...(data.projects || []).flatMap(p => p.bullets || []),
    ...(data.activities || []).flatMap(a => a.bullets || []),
    ...(data.volunteer || []).flatMap(v => v.bullets || [])
  ].filter(Boolean);
  const longBullets = allBullets.filter(b => String(b).split(/\s+/).length > 38).length;
  const contactComplete = !!(data.name && data.contact && data.contact.email && data.contact.phone);
  const linksPresent = detectProfileLinks(data).hasAny;
  const sectionOrderGood = !order.mismatch;

  let score = 100;
  if (!contactComplete) score -= 10;
  if (!linksPresent) score -= 4;
  if (!sectionOrderGood) score -= 7;
  score -= Math.min(18, longBullets * 3);
  if (exp.quantified < Math.ceil(Math.max(1, exp.bullets) / 3)) score -= 8;
  if (wordCount > 950) score -= 6;
  if (skills.artifacts && skills.artifacts.length) score -= 8;
  if (edu.issues && edu.issues.length) score -= 5;
  score = Math.max(55, Math.min(100, Math.round(score)));
  if (resumeStrength && typeof resumeStrength.overall === "number") {
    score = Math.round((score * 0.45) + (resumeStrength.overall * 0.55));
  }
  const fieldFit = targetFieldFit(data);
  if (fieldFit.penalty) score = Math.max(55, score - Math.min(12, fieldFit.penalty));

  const strengths = [];
  const suggestions = [];

  if (contactComplete) strengths.push("Contact information is easy to find.");
  else suggestions.push("Complete the name, email, and phone fields.");

  if (linksPresent) strengths.push("Professional links are included.");
  else suggestions.push("Add LinkedIn or GitHub/portfolio if available.");

  if (sectionOrderGood) strengths.push("Section order supports recruiter scanning.");
  else suggestions.push("Use the recommended section order or Apply Smart Order.");

  if (exp.quantified >= Math.ceil(Math.max(1, exp.bullets) / 3)) strengths.push("Good use of measurable outcomes.");
  else suggestions.push("Add more metrics, scope, or results where accurate.");

  if (!longBullets) strengths.push("Bullet length is recruiter-friendly.");
  else suggestions.push(longBullets + " bullet" + (longBullets === 1 ? "" : "s") + " may be too long for quick scanning.");

  if (skills.score >= 90 && !skills.crammed) strengths.push("Skills are organized clearly.");
  else suggestions.push(skills.crammed ? "Separate combined skill groups into the distinct skill fields so categories read clearly." : "Review skills categories for artifacts or misplaced items.");

  if (fieldFit.penalty) suggestions.unshift(fieldFit.note);

  return { score, strengths, suggestions, wordCount, longBullets };
}

function sectionRecruiterFeedback(data) {
  const exp = analyzeExperienceQuality(data);
  const projects = analyzeProjectStrength(data);
  const skills = analyzeSkillsClassification(data);
  const edu = analyzeEducationCleanup(data);
  const order = recommendSectionOrder(data);

  const feedback = [];

  // Combined Experience + Projects opening-verb pool: flag any leading verb
  // that opens more than one bullet across BOTH sections (inside or between
  // jobs/projects, or once in each section).
  const metaLineCombined = b => /^\s*(tools?|tech|technologies|stack|built with|tools?\s*&\s*technologies|skills used|methods?)\s*[:|]/i.test(String(b || "").trim()) || /^(university|college|institute|school)\b/i.test(String(b || "").trim()) || (/\s\|\s/.test(String(b || "")) && !/\d/.test(String(b || "")));
  const combinedBullets = []
    .concat((data.experience || []).flatMap(e => (e.bullets || []).filter(Boolean)))
    .concat((data.projects || []).flatMap(p => (p.bullets || []).filter(b => b && b.trim() && !metaLineCombined(b))));
  const combinedRepeatedVerbs = repeatedLeadingVerbs(combinedBullets);
  const repeatedVerbNote = combinedRepeatedVerbs.length
    ? "Vary repeated opening verbs across your Experience and Projects (" + combinedRepeatedVerbs.slice(0, 3).map(r => "“" + r.verb.charAt(0).toUpperCase() + r.verb.slice(1) + "”").join(", ") + "): start each bullet with a different action verb so they don't read repetitively."
    : "";

  feedback.push({
    section: "Professional Summary",
    score: String(data.summary || "").trim().length > 80 ? 92 : 72,
    strengths: String(data.summary || "").trim().length > 80 ? ["Professional Summary gives recruiters a quick positioning statement."] : [],
    suggestions: String(data.summary || "").trim().length > 80 ? [] : ["Add a 2–4 line summary that states target role, strengths, and evidence."]
  });

  feedback.push({
    section: "Skills",
    score: skills.score,
    strengths: (skills.score >= 90 && !skills.crammed) ? ["Skills are organized into clear categories."] : [],
    suggestions: skills.notes && skills.notes.length ? skills.notes.slice(0, 3) : []
  });

  feedback.push({
    section: "Experience",
    score: exp.score,
    strengths: [
      exp.entries ? exp.entries + " experience entr" + (exp.entries === 1 ? "y" : "ies") + " included." : "",
      exp.quantified ? exp.quantified + " quantified bullet" + (exp.quantified === 1 ? "" : "s") + " included." : ""
    ].filter(Boolean),
    suggestions: (repeatedVerbNote ? [repeatedVerbNote] : []).concat(exp.notes.slice(0, 4))
  });

  feedback.push({
    section: "Projects",
    score: projects.score,
    strengths: [
      projects.projects ? projects.projects + " project entr" + (projects.projects === 1 ? "y" : "ies") + " included." : "",
      projects.techDetected ? "Technical tools/methods are visible in projects." : ""
    ].filter(Boolean),
    suggestions: projects.notes.slice(0, 4)
  });

  feedback.push({
    section: "Education",
    score: edu.score,
    strengths: edu.issues.length ? [] : ["Education is cleanly structured."],
    suggestions: edu.issues.slice(0, 4)
  });

  const fieldChosen = !!String(data.field || "").trim();
  if (!fieldChosen) {
    feedback.push({
      section: "Section Order",
      score: null,
      strengths: [],
      suggestions: ["Select your Career Goal above to evaluate section order — the recommended order depends on your field."]
    });
  } else {
    feedback.push({
      section: "Section Order",
      score: order.mismatch ? 90 : 100,
      strengths: order.mismatch ? [] : ["Current section order matches the recommended order for " + data.field + "."],
      suggestions: order.mismatch ? ["Consider Apply Smart Order for " + data.field + " and your resume content."] : []
    });
  }

  return feedback;
}

function atsCompatibilityScore(data, resumeStrength) {
  let score = 100;
  if (!data.name) score -= 5;
  if (!data.contact || !data.contact.email) score -= 5;
  if (!data.summary) score -= 5;
  if (!data.skills || !(data.skills.technical || data.skills.tools || data.skills.domain || data.skills.dataVisualization)) score -= 8;
  const bullets = [
    ...(data.experience || []).flatMap(e => e.bullets || []),
    ...(data.projects || []).flatMap(p => p.bullets || [])
  ].filter(Boolean);
  if (!bullets.length) score -= 8;
  if (resumeStrength && resumeStrength.edu && resumeStrength.edu.issues && resumeStrength.edu.issues.length) score -= 3;
  return Math.max(70, Math.min(100, Math.round(score)));
}

        const mc = mapped.contact || {};
        const email = mc.email || "";
        const linkedInFromHyperlink = importLinks && importLinks.linkedIn ? importLinks.linkedIn : "";
        const githubFromHyperlink = importLinks && importLinks.github ? importLinks.github : "";
        const portfolioFromHyperlink = importLinks && importLinks.portfolio ? importLinks.portfolio : "";
        const linkedin = linkedInFromHyperlink || mc.linkedin || "";
        const portfolio = cleanImportedPortfolio(githubFromHyperlink || portfolioFromHyperlink || mc.portfolio || "", email, linkedin);
        return {
          cityState: cleanImportedCityState(mc.cityState || "", mapped.name || data.name || ""),
          phone: mc.phone || "",
          email,
          linkedin,
          portfolio
        };
      })(),
      summary: mapped.summary || data.summary,
      skills: {
        technical: mapped.skills && mapped.skills.technical ? mapped.skills.technical : data.skills.technical,
        dataVisualization: mapped.skills && mapped.skills.dataVisualization ? mapped.skills.dataVisualization : data.skills.dataVisualization,
        tools: mapped.skills && mapped.skills.tools ? mapped.skills.tools : data.skills.tools,
        domain: mapped.skills && mapped.skills.domain ? mapped.skills.domain : data.skills.domain,
        importChanges: mapped.skills && mapped.skills.importChanges ? mapped.skills.importChanges : data.skills.importChanges
      },
      experience: mapped.experience && (mapped.experience[0].title || mapped.experience[0].org || mapped.experience[0].bullets.some(Boolean)) ? mapped.experience : data.experience,
      projects: mapped.projects && (mapped.projects[0].name || mapped.projects[0].bullets.some(Boolean)) ? mapped.projects : data.projects,
      education: mapped.education && (mapped.education[0].degree || mapped.education[0].school) ? mapped.education : data.education,
      activities: mapped.activities && (mapped.activities[0].role || mapped.activities[0].org || mapped.activities[0].bullets.some(Boolean)) ? mapped.activities : data.activities,
      certifications: mapped.certifications && mapped.certifications[0].name ? mapped.certifications : data.certifications,
      awards: mapped.awards && mapped.awards[0].name ? mapped.awards : data.awards,
      publications: mapped.publications && mapped.publications[0].citation ? mapped.publications : data.publications,
      volunteer: mapped.volunteer && (mapped.volunteer[0].role || mapped.volunteer[0].org || mapped.volunteer[0].bullets.some(Boolean)) ? mapped.volunteer : data.volunteer,
      order: smartRecommendedOrder({
        ...data,
        experience: mapped.experience && (mapped.experience[0].title || mapped.experience[0].org || mapped.experience[0].bullets.some(Boolean)) ? mapped.experience : data.experience,
        projects: mapped.projects && (mapped.projects[0].name || mapped.projects[0].bullets.some(Boolean)) ? mapped.projects : data.projects,
        education: mapped.education && (mapped.education[0].degree || mapped.education[0].school) ? mapped.education : data.education,
        publications: mapped.publications && mapped.publications[0].citation ? mapped.publications : data.publications,
        awards: mapped.awards && mapped.awards[0].name ? mapped.awards : data.awards,
        activities: mapped.activities && (mapped.activities[0].role || mapped.activities[0].org || mapped.activities[0].bullets.some(Boolean)) ? mapped.activities : data.activities,
        certifications: mapped.certifications && mapped.certifications[0].name ? mapped.certifications : data.certifications
      })
    });
    setHasStarted(true);
    setShowBuilderWorkspace(false);
    setShowRecruiterReview(false);
  };

  const onDrop = (target) => {
    if (dragIdx === null || dragIdx === target) { setDragIdx(null); setOverIdx(null); return; }
    const next = [...data.order]; const [m] = next.splice(dragIdx, 1); next.splice(target, 0, m);
    set({ order: next }); setDragIdx(null); setOverIdx(null);
  };
  const move = (i, dir) => {
    const j = i + dir; if (j < 0 || j >= data.order.length) return;
    const next = [...data.order]; [next[i], next[j]] = [next[j], next[i]]; set({ order: next });
  };
  const toggleHide = (k) => set({ hidden: { ...data.hidden, [k]: !data.hidden[k] } });
  const addItem = (k, f) => set({ [k]: [...data[k], f()] });
  const delItem = (k, id) => set({ [k]: data[k].filter((x) => x.id !== id) });
  const updItem = (k, id, p) => set({ [k]: data[k].map((x) => x.id === id ? { ...x, ...p } : x) });
  const normalizeBulletInput = (v) => String(v || "").replace(/^([••\-\*]\s*)+/, "").replace(/\n[••\-\*]\s*/g, "\n");
  const updBullet = (k, id, bi, v) => set({ [k]: data[k].map((x) => x.id === id ? { ...x, bullets: x.bullets.map((b, n) => n === bi ? normalizeBulletInput(v) : b) } : x) });
  const addBullet = (k, id) => set({ [k]: data[k].map((x) => x.id === id ? { ...x, bullets: [...x.bullets, ""] } : x) });
  const delBullet = (k, id, bi) => set({ [k]: data[k].map((x) => x.id === id ? { ...x, bullets: x.bullets.filter((_, n) => n !== bi) } : x) });

  const escapeHtml = (s) => String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

  const buildResumeHtml = () => {
      const c = data.contact;
      const parts = [];
      // Header section
      const headerHtml = (t) => '<p style="margin:10pt 0 4pt 0;border-bottom:1pt solid #1F3864;"><span style="font-size:13pt;font-weight:bold;color:#1F3864;letter-spacing:1px;">' + escapeHtml(t.toUpperCase()) + '</span></p>';
      // Two-column row via a borderless full-width table
      const twoCol = (l, r, o = {}) =>
        '<table style="width:100%;border-collapse:collapse;margin:0;"><tr>' +
        '<td style="border:none;padding:0;font-size:11pt;font-family:Arial,sans-serif;' + (o.lb ? "font-weight:bold;" : "") + '">' + escapeHtml(l) + '</td>' +
        '<td style="border:none;padding:0;text-align:right;font-size:11pt;font-family:Arial,sans-serif;' + (o.ri ? "" : "") + '">' + escapeHtml(r || "") + '</td>' +
        '</tr></table>';
      const para = (html, after) => '<p style="margin:0 0 ' + (after != null ? after : 0) + 'pt 0;font-size:11pt;font-family:Arial,sans-serif;">' + html + '</p>';
      const bullet = (t) => '<p style="margin:0 0 0pt 18pt;font-size:11pt;font-family:Arial,sans-serif;text-indent:-18pt;">&#8226;&nbsp;' + escapeHtml(t).replace(/^([••\-\*]\s*)+/, "") + '</p>';

      // Name + contact (centered)
      parts.push('<p style="margin:0 0 2pt 0;text-align:center;"><span style="font-size:20pt;font-weight:bold;color:#1F3864;letter-spacing:1px;">' + escapeHtml((data.name || "First Last").toUpperCase()) + '</span></p>');
      const cp = [];
      if (c.cityState) cp.push(escapeHtml(c.cityState));
      if (c.phone) cp.push(escapeHtml(c.phone));
      if (c.email) cp.push('<a href="mailto:' + escapeHtml(c.email) + '" style="color:#0563C1;">' + escapeHtml(c.email) + '</a>');
      if (c.linkedin) cp.push('<a href="https://' + escapeHtml(c.linkedin.replace(/^https?:\/\//, "")) + '" style="color:#0563C1;">' + escapeHtml(cleanDisplayUrl(c.linkedin)) + '</a>');
      if (c.portfolio) cp.push('<a href="https://' + escapeHtml(c.portfolio.replace(/^https?:\/\//, "")) + '" style="color:#0563C1;">' + escapeHtml(cleanDisplayUrl(c.portfolio)) + '</a>');
      if (cp.length) parts.push('<p style="margin:0 0 8pt 0;text-align:center;font-size:11pt;color:#595959;font-family:Arial,sans-serif;">' + cp.join("&nbsp;&nbsp;|&nbsp;&nbsp;") + '</p>');

      for (const key of data.order) {
        if (data.hidden[key]) continue;
        if (key === "summary") { if (!data.summary.trim()) continue; parts.push(headerHtml("Professional Summary")); parts.push(para(escapeHtml(data.summary), 6)); }
        if (key === "skills") { const s = data.skills; if (!s.technical && !s.dataVisualization && !s.tools && !s.domain) continue; parts.push(headerHtml("Skills"));
          if (s.technical) parts.push(para('<b>Technical Skills:</b> ' + escapeHtml(s.technical), 0));
          if (s.dataVisualization) parts.push(para('<b>Data Visualization:</b> ' + escapeHtml(s.dataVisualization), 0));
          if (s.tools) parts.push(para('<b>Tools & Platforms:</b> ' + escapeHtml(s.tools), 0));
          if (s.domain) parts.push(para('<b>Domain Knowledge:</b> ' + escapeHtml(s.domain), 6)); }
        if (key === "experience") { const items = data.experience.filter((e) => e.title || e.org); if (!items.length) continue; parts.push(headerHtml("Experience"));
          items.forEach((e) => { parts.push(twoCol(e.title || "", [e.start, e.end].filter(Boolean).join(" – "), { lb: true })); parts.push(twoCol(e.org || "", e.location || "", { ri: true })); e.bullets.filter((b) => b.trim()).forEach((b) => parts.push(bullet(b))); parts.push('<p style="margin:0 0 6pt 0;font-size:4pt;">&nbsp;</p>'); }); }
        if (key === "projects") { const items = data.projects.filter((p) => p.name); if (!items.length) continue; parts.push(headerHtml("Projects"));
          items.forEach((p) => { parts.push(twoCol(p.name || "", p.date || "", { lb: true })); const sp = splitProjectLines(p.bullets); if (sp.context) parts.push(para(escapeHtml(sp.context), 0)); if (sp.toolsValue) parts.push(para('<strong>Technologies:</strong> ' + escapeHtml(sp.toolsValue), 0)); sp.accomplishments.filter((b) => b.trim()).forEach((b) => parts.push(bullet(b))); }); }
        if (key === "education") { const items = data.education.filter((ed) => ed.degree || ed.school); if (!items.length) continue; parts.push(headerHtml("Education"));
          items.forEach((ed) => { parts.push(twoCol(ed.school || "", ed.location || "", { lb: true })); const dm = splitDegreeMinor(ed.degree || ""); parts.push(twoCol(dm.degree, ed.grad || "", { lb: true })); if (dm.minor) parts.push(para(escapeHtml(dm.minor), 0)); const ex = []; if (ed.gpa) ex.push("GPA: " + ed.gpa); if (ed.honor) ex.push(ed.honor); if (ex.length) parts.push(para(escapeHtml(ex.join(" | ")), ed.coursework ? 0 : 6)); if (ed.coursework) parts.push(para("Relevant Coursework: " + escapeHtml(ed.coursework), 6)); }); }
        if (key === "activities") { const items = data.activities.filter((a) => a.role || a.org); if (!items.length) continue; parts.push(headerHtml("Leadership & Activities"));
          items.forEach((a) => { parts.push(twoCol(a.role || "", [a.start, a.end].filter(Boolean).join(" – "), { lb: true })); if (a.org) parts.push(twoCol(a.org, "", { ri: true })); a.bullets.filter((b) => b.trim()).forEach((b) => parts.push(bullet(b))); }); }
        if (key === "certifications") { const items = data.certifications.filter((x) => x.name); if (!items.length) continue; parts.push(headerHtml("Certifications"));
          items.forEach((x) => { parts.push(twoCol(x.name || "", [x.issuer, x.date].filter(Boolean).join(", "), { lb: true })); }); }
        if (key === "awards") { const items = data.awards.filter((x) => x.name); if (!items.length) continue; parts.push(headerHtml("Awards & Honors"));
          items.forEach((x) => { parts.push(twoCol(x.name || "", [x.issuer, x.date].filter(Boolean).join(", "), { lb: true })); }); }
        if (key === "publications") { const items = data.publications.filter((x) => x.citation); if (!items.length) continue; parts.push(headerHtml("Publications / Research"));
          items.forEach((x) => { parts.push(twoCol(x.citation || "", x.date || "", {})); }); }
        if (key === "volunteer") { const items = data.volunteer.filter((v) => v.role || v.org); if (!items.length) continue; parts.push(headerHtml("Volunteer Experience"));
          items.forEach((v) => { parts.push(twoCol(v.role || "", [v.start, v.end].filter(Boolean).join(" – "), { lb: true })); parts.push(twoCol(v.org || "", v.location || "", { ri: true })); v.bullets.filter((b) => b.trim()).forEach((b) => parts.push(bullet(b))); }); }
      }

      const html =
        '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">' +
        '<head><meta charset="utf-8"><title>Resume</title>' +
        '<!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom></w:WordDocument></xml><![endif]-->' +
        '<style>@page WordSection1 { size:8.5in 11.0in; margin:0.75in 0.75in 0.75in 0.75in; } div.WordSection1 { page:WordSection1; } body{font-family:Arial,sans-serif;}</style>' +
        '</head><body><div class="WordSection1">' + parts.join("") + '</div></body></html>';
      return html;
  };

  const exportDocx = () => {
    setBusy(true);
    try {
      const html = buildResumeHtml();
      const blob = new Blob(['\ufeff', html], { type: "application/msword" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = (data.name || "Resume").replace(/\s+/g, "_") + "_Resume.doc";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch (err) {
      alert("Sorry — the Word download hit an error. You can still use Print / PDF.\n\n" + err.message);
    } finally { setBusy(false); }
  };

  // ---- Review Report → Word (.doc) export — v11.5 ----
  // Compiles Resume Snapshot + Recruiter Review + Coach Review into one branded,
  // shareable Word document. Reuses the same derived state the screens already render
  // (snapshotStrengths/snapshotOpportunities, recruiterReview, coachReview) and the same
  // application/msword blob pattern as exportDocx above. No new dependencies.
  const buildCoachReportHtml = () => {
    const esc = (s) => String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const P  = (s, extra) => s ? '<p style="margin:0 0 9pt 0;font-size:11pt;color:#1e293b;line-height:1.5;' + (extra || "") + '">' + esc(s) + '</p>' : "";
    const H2 = (s) => '<h2 style="font-size:15pt;color:#1F3864;border-bottom:1.5pt solid #1F3864;padding-bottom:3pt;margin:20pt 0 8pt 0;">' + esc(s) + '</h2>';
    const H3 = (s) => '<h3 style="font-size:12.5pt;color:#334155;margin:14pt 0 5pt 0;">' + esc(s) + '</h3>';
    const UL = (arr, fn) => (Array.isArray(arr) && arr.length)
      ? '<ul style="margin:0 0 9pt 0;padding-left:18pt;">' + arr.map(x => '<li style="font-size:11pt;color:#334155;line-height:1.5;margin:0 0 4pt 0;">' + (fn ? fn(x) : esc(x)) + '</li>').join("") + '</ul>'
      : "";

    const parts = [];
    const rr = recruiterReview || {};
    const cr = coachReview || {};
    const today = new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
    const who = (data && data.name) ? data.name : (cr.firstName || "");

    // Cover / header
    parts.push('<h1 style="font-size:22pt;color:#1F3864;margin:0 0 2pt 0;">Resume Review Report</h1>');
    parts.push('<p style="font-size:10.5pt;color:#64748b;margin:0 0 2pt 0;">' + (who ? esc(who) + ' &middot; ' : '') + esc(today) + '</p>');
    parts.push('<p style="font-size:10.5pt;color:#64748b;margin:0 0 4pt 0;">Prepared with the Coach Jeff Resume Optimizer</p>');

    // 2. Resume Snapshot — kept lean: strengths + opportunities, not the raw parse.
    parts.push(H2("Resume Snapshot"));
    const snapS = (typeof snapshotStrengths !== "undefined" && snapshotStrengths) || [];
    const snapO = (typeof snapshotOpportunities !== "undefined" && snapshotOpportunities) || [];
    if (snapS.length) { parts.push(H3("What's working")); parts.push(UL(snapS)); }
    if (snapO.length) { parts.push(H3("Opportunities")); parts.push(UL(snapO)); }
    if (!snapS.length && !snapO.length) parts.push(P("Resume content imported successfully. See the reviews below for detailed feedback."));

    // 2.5 Evaluation Context — states the target role and focus up front (manual eval §0).
    if (cr.evalContext) {
      const ec = cr.evalContext;
      parts.push(H2("Evaluation Context"));
      parts.push(P(ec.strengthLine));
      parts.push(P(ec.focusNote, "color:#475569;"));
      parts.push(P(ec.tailorTip, "font-style:italic;color:#475569;"));
    }

    // 3. Recruiter Review
    parts.push(H2("Recruiter Review"));
    if (rr.outcome != null || rr.confidence != null)
      parts.push(P((rr.outcome ? String(rr.outcome).replace(/[🟢🟡🟠🔴]\s*/g, "") : "") + (rr.confidence != null ? "  —  Recruiter confidence: " + rr.confidence + "%" : ""), "font-weight:700;"));
    if (rr.emotionalRead)  parts.push(P(rr.emotionalRead, "font-style:italic;color:#475569;"));
    if (rr.firstNoticed) { parts.push(H3("What I noticed first")); parts.push(P(rr.firstNoticed)); }
    if (rr.paused)        { parts.push(H3("Where I paused"));       parts.push(P(rr.paused)); }
    if (rr.confidenceText){ parts.push(H3("What builds confidence"));parts.push(P(rr.confidenceText)); }
    if (Array.isArray(rr.improvements) && rr.improvements.length) {
      parts.push(H3("Top improvements from a recruiter's view"));
      parts.push(UL(rr.improvements.slice(0, 3), (im) => esc(im.title || im.label || im) + (im.why ? " — " + esc(im.why) : "")));
    }
    if (rr.closing) { parts.push(H3("Where I landed")); parts.push(P(rr.closing)); }

    // 3b. Category Scorecard + Market-Readiness (condensed from the manual eval)
    if (cr.scorecard && Array.isArray(cr.scorecard.categories) && cr.scorecard.categories.length) {
      const sc = cr.scorecard;
      parts.push(H2("Resume Scorecard"));
      const rows = sc.categories.map(c => {
        const dots = "\u25CF".repeat(c.dots) + "\u25CB".repeat(5 - c.dots);
        return '<tr>' +
          '<td style="padding:4pt 8pt;font-size:11pt;color:#334155;border-bottom:0.5pt solid #e2e8f0;">' + esc(c.key) + '</td>' +
          '<td style="padding:4pt 8pt;font-size:11pt;color:#1F3864;border-bottom:0.5pt solid #e2e8f0;letter-spacing:2px;">' + dots + '</td>' +
          '<td style="padding:4pt 8pt;font-size:11pt;color:#64748b;border-bottom:0.5pt solid #e2e8f0;text-align:right;">' + c.score + '/100</td>' +
          '</tr>';
      }).join("");
      parts.push('<table style="border-collapse:collapse;width:100%;margin:0 0 10pt 0;">' +
        '<tr>' +
        '<th style="text-align:left;padding:4pt 8pt;font-size:9.5pt;color:#64748b;text-transform:uppercase;letter-spacing:.5pt;border-bottom:1pt solid #1F3864;">Category</th>' +
        '<th style="text-align:left;padding:4pt 8pt;font-size:9.5pt;color:#64748b;text-transform:uppercase;letter-spacing:.5pt;border-bottom:1pt solid #1F3864;">Rating</th>' +
        '<th style="text-align:right;padding:4pt 8pt;font-size:9.5pt;color:#64748b;text-transform:uppercase;letter-spacing:.5pt;border-bottom:1pt solid #1F3864;">Score</th>' +
        '</tr>' + rows +
        '<tr>' +
        '<td style="padding:6pt 8pt;font-size:11pt;color:#1F3864;font-weight:700;border-top:1pt solid #1F3864;">OVERALL</td>' +
        '<td style="padding:6pt 8pt;border-top:1pt solid #1F3864;"></td>' +
        '<td style="padding:6pt 8pt;font-size:11pt;color:#1F3864;font-weight:700;text-align:right;border-top:1pt solid #1F3864;">' + sc.overall + '/100</td>' +
        '</tr>' +
        '</table>');
      parts.push(P("Market readiness: " + sc.tier, "font-weight:700;color:#1F3864;"));
      if (sc.tierNote) parts.push(P(sc.tierNote, "color:#475569;"));
    }

    // 3c. Five Major Areas Review — concise coverage of the five high-level
    // areas that the detailed manual audit handles more granularly.
    if (Array.isArray(cr.fiveMajorAreas) && cr.fiveMajorAreas.length) {
      parts.push(H2("Five Major Areas Review"));
      parts.push(P("These five areas summarize the major issues that a detailed manual audit would examine more deeply, without adding unnecessary report length.", "color:#475569;"));
      parts.push(UL(cr.fiveMajorAreas, (item) => '<b>' + esc(item.title) + ' — ' + esc(item.status) + '</b>: ' + esc(item.note)));
    }

    // 3c. Resume Risk Flags — consolidated credibility risks (manual eval §29).
    if (Array.isArray(cr.riskFlags) && cr.riskFlags.length) {
      parts.push(H2("Resume Risk Flags"));
      parts.push(P("These are the credibility risks a skeptical reviewer would probe. None require new content — address them before you apply.", "color:#475569;"));
      parts.push(UL(cr.riskFlags, (f) => '<b>' + esc(f.title) + '</b> — ' + esc(f.note)));
    }

    // 3d. Interview Conversion estimate — relative, caveated (manual eval §31).
    if (cr.conversion) {
      parts.push(H2("Interview Conversion Outlook"));
      parts.push(P("Estimated conversion for suitably-matched roles: " + cr.conversion.band, "font-weight:700;color:#1F3864;"));
      parts.push(P(cr.conversion.note));
      parts.push(P(cr.conversion.disclaimer, "font-style:italic;color:#64748b;font-size:10pt;"));
    }

    // 4. Coach Review
    parts.push(H2("Coach Review"));
    if (cr.opening) parts.push(P(cr.opening));
    if (Array.isArray(cr.planForToday) && cr.planForToday.length) {
      parts.push(H3("Coach Jeff's Game Plan" + (cr.totalMinutes ? " (" + cr.totalMinutes + " min today)" : "")));
      parts.push(UL(cr.planForToday, (p) => '<b>' + esc(p.title) + '</b>' + (p.minutes ? ' (' + p.minutes + ' min)' : '') + (p.why ? ' — ' + esc(p.why) : '')));
    }
    if ((cr.conf != null) && (cr.targetConf != null))
      parts.push(P("Projected recruiter confidence with these edits: " + cr.conf + "% → " + cr.targetConf + "%", "font-weight:700;color:#166534;"));
    if (Array.isArray(cr.strengths) && cr.strengths.length) {
      parts.push(H3("Strengths to keep"));
      parts.push(UL(cr.strengths, (s) => '<b>' + esc(s.label) + '</b>' + (s.why ? ' — ' + esc(s.why) : '')));
    }
    if (Array.isArray(cr.improvements) && cr.improvements.length) {
      parts.push(H3("Highest-impact improvements"));
      parts.push(UL(cr.improvements, (im) => '<b>' + esc(im.title) + '</b>' + (im.stars ? ' (' + '★'.repeat(im.stars) + ')' : '') + (im.why ? ' — ' + esc(im.why) : '') + (im.effort ? '  [Effort: ' + esc(im.effort) + (im.impact ? ' · Impact: ' + esc(im.impact) : '') + ']' : '')));
    }
    if (Array.isArray(cr.roadmap) && cr.roadmap.length) {
      parts.push(H3("Your improvement roadmap"));
      parts.push('<ol style="margin:0 0 9pt 0;padding-left:18pt;">' + cr.roadmap.map(stop => {
        const label = typeof stop === "string" ? stop : stop.step;
        const action = typeof stop === "string" ? "" : stop.action;
        return '<li style="font-size:11pt;color:#334155;line-height:1.5;margin:0 0 4pt 0;"><b>' + esc(label) + '</b>' + (action ? ' — ' + esc(action) : '') + '</li>';
      }).join("") + '</ol>');
    }
    if (Array.isArray(cr.examples) && cr.examples.length) {
      parts.push(H3("Before → After: coaching examples"));
      cr.examples.forEach((ex) => {
        parts.push('<p style="margin:0 0 2pt 0;font-size:9.5pt;color:#64748b;text-transform:uppercase;letter-spacing:.5pt;">' + esc(ex.section || "") + '</p>');

  // ---- True .docx export (built from scratch with JSZip; no fragile docx library) ----
  function loadJSZip() {
    if (typeof window.JSZip !== "undefined") return Promise.resolve();
    const urls = ["https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js","https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js","https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"];
    return new Promise((resolve, reject) => {
      let i = 0;
      const tryNext = () => {
        if (i >= urls.length) { reject(new Error("JSZip load failed")); return; }
        const s = document.createElement("script"); s.src = urls[i];
        s.onload = () => { let t = 0; const chk = () => { if (typeof window.JSZip !== "undefined") resolve(); else if (t++ > 60) { i++; tryNext(); } else setTimeout(chk, 50); }; chk(); };
        s.onerror = () => { i++; tryNext(); };
        document.head.appendChild(s);
      };
      tryNext();
    });
  }

  const xmlEsc = (s) => String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  // OOXML run + paragraph builders
  const cleanDisplayUrl = (s) => String(s || "").replace(/^https?:\/\//i, "").replace(/\/$/, "");
  const noWrapText = (s) => String(s || "").replace(/ /g, "\u00A0");
  const formatOrgLocation = (org, location) => {
    const o = String(org || "").trim().replace(/[,\s]+$/, "");
    const l = String(location || "").trim().replace(/^,+\s*/, "");
    if (!o) return l;
    if (!l) return o;
    if (o.toLowerCase().includes(l.toLowerCase())) return o.replace(/\s+([A-Z][a-zA-Z .'-]+,\s*[A-Z]{2})$/, ", $1");
    return o + ", " + l;
  };
  let docxHyperlinks = [];
  const xHyperlink = (label, url) => {
    if (!url) return xRun(label, { size: 11, color: "595959" });
    const id = "rIdLink" + (docxHyperlinks.length + 1);
    docxHyperlinks.push({ id, url });
    return '<w:hyperlink r:id="' + id + '"><w:r><w:rPr><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="22"/><w:color w:val="595959"/><w:u w:val="single"/></w:rPr><w:t xml:space="preserve">' + xmlEsc(label) + '</w:t></w:r></w:hyperlink>';
  };
  const xRun = (text, o = {}) => '<w:r><w:rPr>' + (o.bold ? '<w:b/>' : '') + (o.size ? '<w:sz w:val="' + (o.size * 2) + '"/>' : '') + (o.color ? '<w:color w:val="' + o.color + '"/>' : '') + '<w:rFonts w:ascii="Arial" w:hAnsi="Arial"/></w:rPr><w:t xml:space="preserve">' + xmlEsc(text) + '</w:t></w:r>';
  const xPar = (runs, o = {}) => {
    let pPr = '<w:pPr>';
    if (o.align) pPr += '<w:jc w:val="' + o.align + '"/>';
    if (o.border) pPr += '<w:pBdr><w:bottom w:val="single" w:sz="8" w:space="1" w:color="1F3864"/></w:pBdr>';
    if (o.indent != null) pPr += '<w:ind w:left="' + o.indent + '" w:hanging="' + (o.hanging || 0) + '"/>';
    if (o.keepNext) pPr += '<w:keepNext/>';
    if (o.keepLines) pPr += '<w:keepLines/>';
    if (o.tabRight) pPr += '<w:tabs><w:tab w:val="right" w:pos="9360"/></w:tabs>';
    pPr += '<w:spacing w:line="240" w:lineRule="auto" w:after="' + (o.after != null ? o.after : 0) + '"' + (o.before != null ? ' w:before="' + o.before + '"' : '') + '/>';
    pPr += '</w:pPr>';
    return '<w:p>' + pPr + (Array.isArray(runs) ? runs.join("") : runs) + '</w:p>';
  };
  const xTabRow = (l, r, o = {}) => xPar([
    xRun(l || "", { bold: !!o.lb, size: 11 }),
    r ? xRun("\t", { size: 11 }) + xRun(noWrapText(r), { size: 11 }) : ""
  ], { tabRight: true, after: o.after != null ? o.after : 0, keepNext: !!o.keepNext });
  const xHeader = (t) => xPar(xRun(t.toUpperCase(), { bold: true, size: 13, color: "1F3864" }), { border: true, before: 240, after: 120, keepNext: true });
  const xBullet = (t) => {
    const stripped = String(t).replace(/^([••\-\*]\s*)+/, "").replace(/^\s*•\s*/, "");
    const clean = tidyBullet(stripped);
    const pPr = '<w:pPr><w:spacing w:before="0" w:after="0" w:line="240" w:lineRule="auto"/><w:ind w:left="360" w:hanging="360"/></w:pPr>';
    return '<w:p>' + pPr + '<w:r><w:rPr><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="22"/></w:rPr><w:t xml:space="preserve">•\t</w:t></w:r>' + xRun(clean, { size: 11 }) + '</w:p>';
  };
  const xBody = (t, o = {}) => xPar(xRun(t, { size: 11, color: o.color }), { after: o.after != null ? o.after : 0, keepNext: !!o.keepNext });

  const buildResumeDocxParas = () => {
    const c = data.contact;
    const P = [];

    P.push(xPar(xRun((data.name || "First Last").toUpperCase(), { bold: true, size: 20, color: "1F3864" }), { align: "center", after: 120 }));

    const contactParts = [c.cityState, c.phone, c.email].filter(Boolean).map(x => xRun(x, { size: 11, color: "595959" }));
    if (c.linkedin) contactParts.push(xHyperlink("LinkedIn", c.linkedin));
    if (c.portfolio) {
      const p = String(c.portfolio || "");
      const label = /github\.com/i.test(p) ? "GitHub" : "Portfolio";
      contactParts.push(xHyperlink(label, p));
    }
    const contactRuns = [];
    contactParts.forEach((run, i) => { if (i) contactRuns.push(xRun("  |  ", { size: 11, color: "595959" })); contactRuns.push(run); });
    if (contactRuns.length) P.push(xPar(contactRuns, { align: "center", after: 240 }));

    for (const key of data.order) {
      if (data.hidden[key]) continue;

      if (key === "summary") {
        if (!data.summary.trim()) continue;
        P.push(xHeader("Professional Summary"));
        P.push(xBody(data.summary, { after: 120 }));
      }

      if (key === "skills") {
        const s = data.skills;
        if (!s.technical && !s.dataVisualization && !s.tools && !s.domain) continue;
        P.push(xHeader("Skills"));
        if (s.technical) P.push(xPar([xRun("Technical Skills: ", { bold: true, size: 11 }), xRun(s.technical, { size: 11 })], { after: 60 }));
        if (s.dataVisualization) P.push(xPar([xRun("Data Visualization: ", { bold: true, size: 11 }), xRun(s.dataVisualization, { size: 11 })], { after: 60 }));
        if (s.tools) P.push(xPar([xRun("Tools & Platforms: ", { bold: true, size: 11 }), xRun(s.tools, { size: 11 })], { after: 60 }));
        if (s.domain) P.push(xPar([xRun("Domain Knowledge: ", { bold: true, size: 11 }), xRun(s.domain, { size: 11 })], { after: 60 }));
      }

      if (key === "experience") {
        const items = data.experience.filter((e) => e.title || e.org);
        if (!items.length) continue;
        P.push(xHeader("Experience"));
        items.forEach((e, idx) => {
          P.push(xTabRow(e.title || "", [e.start, e.end].filter(Boolean).join(" – "), { lb: true, after: 0, keepNext: true }));
          P.push(xTabRow(formatOrgLocation(e.org, e.location), "", { after: 0, keepNext: true }));
          e.bullets.filter((b) => b.trim()).forEach((b) => P.push(xBullet(b)));
          
        });
      }

      if (key === "projects") {
        const items = data.projects.filter((p) => p.name);
        if (!items.length) continue;
        P.push(xHeader("Projects"));
        items.forEach((p, idx) => {
          P.push(xTabRow(p.name || "", p.date || "", { lb: true, after: 0, keepNext: true }));
          const sp = splitProjectLines(p.bullets);
          if (sp.context) P.push(xBody(sp.context, { after: 0, keepNext: true }));
          if (sp.toolsValue) P.push(xPar([xRun("Technologies: ", { bold: true, size: 11 }), xRun(sp.toolsValue, { size: 11 })], { after: 0, keepNext: true }));
          sp.accomplishments.filter((b) => b.trim()).forEach((b) => P.push(xBullet(b)));
          
        });
      }

      if (key === "education") {
        const items = data.education.filter((ed) => ed.degree || ed.school);
        if (!items.length) continue;
        P.push(xHeader("Education"));
        items.forEach((ed) => {
          P.push(xTabRow(ed.school || "", ed.location || "", { lb: true, after: 0, keepNext: true }));
          const dm = splitDegreeMinor(ed.degree || "");
          P.push(xTabRow(dm.degree, ed.grad || "", { lb: true, after: 0, keepNext: true }));
          if (dm.minor) P.push(xBody(dm.minor, { after: 0, keepNext: true }));
          const ex = [];
          if (ed.gpa) ex.push("GPA: " + ed.gpa);
          if (ex.length) P.push(xBody(ex.join(" | "), { after: ed.coursework ? 0 : 120, keepNext: !!ed.coursework }));
          if (ed.coursework) P.push(xBody("Relevant Coursework: " + ed.coursework, { after: 120 }));
        });
      }

      if (key === "publications") {
        const items = data.publications.filter((x) => x.citation && !/^\s*\d{4}\s*$/.test(x.citation));
        if (!items.length) continue;
        P.push(xHeader("Publications"));
        items.forEach((x) => P.push(xBody(x.citation || "", { after: 60 })));
      }

      if (key === "awards") {
        const items = data.awards.filter((x) => x.name);
        if (!items.length) continue;
        P.push(xHeader("Awards & Honors"));
        items.forEach((x) => {
          const tail = [x.issuer, x.date ? "(" + x.date + ")" : ""].filter(Boolean).join(" ");
          P.push(xBullet((x.name || "") + (tail ? " — " + tail : "")));
        });
      }

      if (key === "activities") {
        const items = data.activities.filter((a) => a.role || a.org);
        if (!items.length) continue;
        P.push(xHeader("Leadership & Activities"));
        items.forEach((a, idx) => {
          P.push(xTabRow(a.role || "", [a.start, a.end].filter(Boolean).join(" – "), { lb: true, after: 0, keepNext: true }));
          if (a.org) P.push(xTabRow(a.org, "", { after: 0, keepNext: true }));
          a.bullets.filter((b) => b.trim()).forEach((b) => P.push(xBullet(b)));
          
        });
      }

      if (key === "certifications") {
        const items = data.certifications.filter((x) => x.name);
        if (!items.length) continue;
        P.push(xHeader("Certifications"));
        items.forEach((x) => {
          const tail = [x.issuer, x.date ? "(" + x.date + ")" : ""].filter(Boolean).join(" ");
          P.push(xBody((x.name || "") + (tail ? " — " + tail : ""), { after: 60 }));
        });
      }

      if (key === "volunteer") {
        const items = data.volunteer.filter((v) => v.role || v.org);
        if (!items.length) continue;
        P.push(xHeader("Volunteer Experience"));
        items.forEach((v, idx) => {
          P.push(xTabRow(v.role || "", [v.start, v.end].filter(Boolean).join(" – "), { lb: true, after: 0, keepNext: true }));
          P.push(xTabRow(formatOrgLocation(v.org, v.location), "", { after: 0, keepNext: true }));
          v.bullets.filter((b) => b.trim()).forEach((b) => P.push(xBullet(b)));
          
        });
      }
    }
    return P;
  };
