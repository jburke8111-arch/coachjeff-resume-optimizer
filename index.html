function escapeRegExp(s) {
  return String(s || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}
function skillCategory(skill) {
  const s = String(skill || "").toLowerCase().trim();
  if (TOOL_PLATFORM_TERMS.has(s)) return "tool";
  if (/(platform|software|suite|system|systems|cloud|github|git|excel|power bi|tableau|salesforce|workday|adp|jira|canva|figma|aws|azure|docker|epic|ehr|autocad|solidworks|matlab|spss|jupyter|linux|react|node\.js|lexisnexis|westlaw|crm|hris)/i.test(skill)) return "tool";
  return "technical";
}
function skillMentionCount(jobPost, skill) {
  const text = String(jobPost || "").toLowerCase();
  const s = String(skill || "").toLowerCase().trim();
  if (!text || !s) return 0;
  const re = new RegExp("(^|[^a-z0-9+#.\\-])" + escapeRegExp(s) + "([^a-z0-9+#.\\-]|$)", "g");
  return (text.match(re) || []).length;
}
function sectionMentionType(jobPost, skill) {
  const text = String(jobPost || "");
  const lowerSkill = String(skill || "").toLowerCase().trim();
  if (!text || !lowerSkill) return "";
  const requiredRe = /(required qualifications|required skills|minimum qualifications|basic qualifications|must have|requirements|you must|required)/i;
  const preferredRe = /(preferred qualifications|preferred skills|nice to have|nice-to-have|plus|preferred|desired)/i;
  const chunks = text.split(/\n{2,}|(?=required qualifications|minimum qualifications|basic qualifications|preferred qualifications|preferred skills|nice to have|requirements|required skills|must have)/i);
  let inRequired = false;
  let inPreferred = false;
  chunks.forEach(chunk => {
    if (chunk.toLowerCase().includes(lowerSkill)) {
      if (requiredRe.test(chunk)) inRequired = true;
      if (preferredRe.test(chunk)) inPreferred = true;
    }
  });
  if (inRequired) return "Required";
  if (inPreferred) return "Preferred";
  return "";
}
function sortSkillsByJobPost(skills, jobPost) {
  const originalIndex = new Map(skills.map((s, i) => [String(s).toLowerCase(), i]));
  return [...skills].sort((a, b) => {
    const countB = skillMentionCount(jobPost, b);
    const countA = skillMentionCount(jobPost, a);
    if (countB !== countA) return countB - countA;
    const typeB = sectionMentionType(jobPost, b) === "Required" ? 2 : sectionMentionType(jobPost, b) === "Preferred" ? 1 : 0;
    const typeA = sectionMentionType(jobPost, a) === "Required" ? 2 : sectionMentionType(jobPost, a) === "Preferred" ? 1 : 0;
    if (typeB !== typeA) return typeB - typeA;
    return (originalIndex.get(String(a).toLowerCase()) || 0) - (originalIndex.get(String(b).toLowerCase()) || 0);
  });
}

function normSkill(s) { return String(s || "").trim().replace(/\s+/g, " "); }
function addUniqueCsv(existing, item) {
  const clean = normSkill(item);
  if (!clean) return existing || "";
  const parts = String(existing || "").split(/[,;|]/).map(normSkill).filter(Boolean);
  const lower = new Set(parts.map(x => x.toLowerCase()));
  if (!lower.has(clean.toLowerCase())) parts.push(clean);

}
function tokenizeImportant(text) {
  const freq = {};
  (String(text || "").toLowerCase().match(/[a-z][a-z0-9+#.\-]{2,}/g) || []).forEach(w => {
    const clean = w.replace(/^[.\-]+|[.\-]+$/g, "");
    if (clean.length < 3 || KEYWORD_STOPWORDS.has(clean)) return;
    freq[clean] = (freq[clean] || 0) + 1;
  });
  return freq;
}
function collectResumeText(data) {
  const parts = [data.name, data.summary, data.skills && data.skills.technical, data.skills && data.skills.dataVisualization, data.skills && data.skills.tools, data.skills && data.skills.domain];
  ["experience", "projects", "education", "activities", "certifications", "awards", "publications", "volunteer"].forEach(k => {
    (data[k] || []).forEach(item => Object.keys(item).forEach(key => {
      if (key === "id") return;
      const v = item[key];
      if (Array.isArray(v)) parts.push(v.join(" ")); else parts.push(v);
    }));
  });
  return parts.filter(Boolean).join(" ");
}

function normalizeImportedResumeText(rawText) {
  let t = String(rawText || "").replace(/\r/g, "\n");

  // Word/PDF exports are full of non-breaking spaces, narrow spaces, and
  // "fancy" dashes. Normalize them to plain ASCII so downstream regexes that
  // assume ordinary spaces/hyphens match reliably (e.g. "Cypress,\u00a0CA").
  t = t.replace(/[\u00a0\u2007\u202f\u2009\u200a\u2002\u2003]/g, " ");
  t = t.replace(/[\u2013\u2014\u2212]/g, "–");

  // Split common contact fields only at boundaries, not inside emails.
  t = t.replace(/(https?:\/\/[^\s]+)\s*[–—-]\s*([a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,})/gi, "$1\n$2");
  t = t.replace(/([a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,})\s*[–—-]\s*(\(?\d{3}\)?[\s.-]?\d{3}[\s.-]?\d{4})/gi, "$1\n$2");
  t = t.replace(/(linkedin\.com\/in\/[^\s]+)\s+([a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,})/gi, "$1\n$2");

  // Break apart glued name+linkedin and name+location patterns.
  t = t.replace(/([A-Za-z]{2,})https?:\/\//g, "$1\nhttps://");
  t = t.replace(/([A-Za-z]{2,})linkedin\.com/gi, "$1\nlinkedin.com");
  t = t.replace(/([a-z])([A-Z][a-z]+,\s*(?:Texas|TX|Florida|FL|New York|NY|California|CA|Ohio|OH|Georgia|GA|Virginia|VA|Maryland|MD|Illinois|IL|Arizona|AZ|Washington|WA|USA|United States))/g, "$1\n$2");
  t = t.replace(/([A-Za-z]{2,})([A-Z][a-z]+,\s*[A-Z]{2})/g, "$1\n$2");

  // Normalize contact separators when they separate contact items.
  t = t.replace(/\s*[|•]\s*(?=(?:\(?\d{3}\)?[\s.-]?\d{3}[\s.-]?\d{4})|[a-z0-9._%+\-]+@|(?:https?:\/\/)?(?:www\.)?linkedin|github\.com)/gi, "\n");
  t = t.replace(/([a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,})\s*[|•]\s*/gi, "$1\n");
  t = t.replace(/(\(?\d{3}\)?[\s.-]?\d{3}[\s.-]?\d{4})\s*[|•]\s*/g, "$1\n");

  t = t.replace(/[_\-=—–]{8,}/g, "\n");
  return t.replace(/\n{3,}/g, "\n\n").trim();
}

function _cleanLine(s) { return String(s || "").trim(); }


function fileNameLooksLikeEvaluationReport(fileName = "") {
  const name = String(fileName || "").toLowerCase();
  return /(evaluation|readiness|report|assessment|analysis|ats\s*key\s*points|resume\s*check|scorecard)/i.test(name);
}

function looksLikeResumeEvaluationReport(rawText, fileName = "") {
  const text = String(rawText || "").toLowerCase();
  const name = String(fileName || "").toLowerCase();

  // Filename alone is enough to warn because these are commonly generated reports, not resumes.
  if (fileNameLooksLikeEvaluationReport(name)) return true;

  // Strong report phrases: any one of these should block import.
  const strongSignals = [
    "full resume evaluation",
    "ats key points",
    "quick summary",
    "resume readiness check",
    "formatting & ats compatibility",
    "formatting and ats compatibility",
    "content readiness",
    "keyword match",
    "estimated score",
    "readiness score",
    "resume score",
    "ats-safe",
    "ats friendly section headers",
    "ats-friendly section headers"
  ];
  if (strongSignals.some(s => text.includes(s))) return true;

  // Combination rule for softer signals.
  const softSignals = [
    "avoid tables",
    "text boxes",
    "overly complex formatting",
    "section headers",
    "mapping preview",
    "bullet quality",
    "missing keywords",
    "recruiter summary",
    "skills match",
    "job match"
  ];
  const softHits = softSignals.filter(s => text.includes(s)).length;
  return softHits >= 2;
}

function _headingKey(line) {
  let s = _cleanLine(line).replace(/[:\-–—]+$/g, "").toLowerCase();

    const relPaths = Object.keys(zip.files).filter(p => /^word\/.*_rels\/.*\.rels$/i.test(p) || /^word\/_rels\/document\.xml\.rels$/i.test(p));
    const urls = [];
    for (const p of relPaths) {
      const xml = await zip.file(p).async("text");
      const doc = new DOMParser().parseFromString(xml, "application/xml");
      Array.from(doc.getElementsByTagName("Relationship")).forEach(rel => {
        const target = rel.getAttribute("Target") || "";
        const type = rel.getAttribute("Type") || "";
        if (/hyperlink/i.test(type) && /^https?:\/\//i.test(target)) urls.push(target);
      });
    }
    return Array.from(new Set(urls));
  } catch (e) {
    return [];
  }
}
function summarizeImportedLinks(urls) {
  const clean = Array.from(new Set((urls || []).filter(Boolean)));
  const linkedIn = clean.find(u => /linkedin\.com\/in\//i.test(u)) || "";
  const github = clean.find(u => /github\.com\//i.test(u)) || "";
  const portfolio = clean.find(u => !/linkedin\.com/i.test(u) && !/github\.com/i.test(u) && !/(gmail|outlook|hotmail|yahoo|icloud)\.com/i.test(u)) || "";
  return { linkedIn, github, portfolio, all: clean };
}

async function ensurePdfImportLibs() {
  await loadScriptOnce(
    ["https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js", "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"],
    () => typeof window.pdfjsLib !== "undefined"
  );
  if (window.pdfjsLib && window.pdfjsLib.GlobalWorkerOptions) {
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
  }
}

async function extractPdfTextFromFile(file) {
  await ensurePdfImportLibs();
  const arrayBuffer = await file.arrayBuffer();
  const loadingTask = window.pdfjsLib.getDocument({ data: arrayBuffer });
  const pdf = await loadingTask.promise;
  const pages = [];
  for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
    const page = await pdf.getPage(pageNum);
    const content = await page.getTextContent();
    const strings = (content.items || []).map(item => item.str || "").filter(Boolean);
    pages.push(strings.join(" ").replace(/\s{2,}/g, " "));
  }
  return pages.join("\n").trim();
}

async function extractTextFromImportedFile(file) {
  const name = (file && file.name || "").toLowerCase();
  if (!file) return "";
  if (name.endsWith(".txt")) return { resumeText: await file.text(), fileName: file.name || "", transfer: false };
  if (name.endsWith(".json")) {
    const raw = await file.text();
    const payload = JSON.parse(raw);
    if (payload && payload.source && String(payload.source).includes("Resume Readiness Check") && payload.resumeText) {
      return { resumeText: payload.resumeText || "", jobPost: payload.jobPost || "", fileName: file.name || "", transfer: true };
    }
    throw new Error("This JSON file is not a valid Resume Builder import file.");
  }
  if (name.endsWith(".docx")) {
    await ensureResumeImportLibs();
    const arrayBuffer = await file.arrayBuffer();
    const result = await mammoth.extractRawText({ arrayBuffer });
    const links = await extractDocxHyperlinks(arrayBuffer);
    const linkSummary = summarizeImportedLinks(links);
    return { resumeText: (result.value || "").trim(), fileName: file.name || "", transfer: false, links: linkSummary };
  }
  if (name.endsWith(".pdf")) {
    const pdfText = await extractPdfTextFromFile(file);
    if (!pdfText || pdfText.length < 30) throw new Error("PDF import could not extract enough text. If this is a scanned/image PDF, copy/paste the resume text or upload a DOCX version.");
    return { resumeText: pdfText, fileName: file.name || "", transfer: false, links: null };
  }
  throw new Error("Unsupported file type. Please upload a .docx, .pdf, .txt, or Resume Readiness Check .json file, or paste the resume text.");
}

function getSuggestedSkills(field, jobPost) {
  const base = [...(SKILL_BANK[field] || SKILL_BANK["General / Other"] || [])];
  const post = String(jobPost || "").toLowerCase();
  const allSkills = Array.from(new Set(Object.values(SKILL_BANK).flat()));
  allSkills.forEach(skill => {
    const s = skill.toLowerCase();
    if (post.includes(s) && !base.some(x => x.toLowerCase() === s)) base.unshift(skill);
  });
  const uniqueSkills = Array.from(new Set(base));
  return jobPost && jobPost.trim() ? sortSkillsByJobPost(uniqueSkills, jobPost) : uniqueSkills;
}
function analyzeBuilderOptimization(data) {
  const resumeText = collectResumeText(data);
  const resumeLower = resumeText.toLowerCase();
  const jobPost = data.jobPost || "";
  const fieldSkills = getSuggestedSkills(data.field, jobPost);
  const skillsAlready = fieldSkills.filter(s => resumeLower.includes(s.toLowerCase()));
  const suggestedMissing = fieldSkills.filter(s => !resumeLower.includes(s.toLowerCase())).slice(0, 12);
  let keyword = null;
  if (jobPost.trim()) {
    const jobFreq = tokenizeImportant(jobPost);
    const resumeWords = new Set(Object.keys(tokenizeImportant(resumeText)));
    const recurring = Object.keys(jobFreq).filter(w => jobFreq[w] >= 2);
    const ranked = (recurring.length >= 8 ? recurring : Object.keys(jobFreq)).sort((a,b) => jobFreq[b] - jobFreq[a]).slice(0, 25);
    const present = ranked.filter(w => resumeWords.has(w));
    const missing = ranked.filter(w => !resumeWords.has(w));
    const mentionedSkills = fieldSkills.filter(s => jobPost.toLowerCase().includes(s.toLowerCase()));
    const missingSkills = mentionedSkills.filter(s => !resumeLower.includes(s.toLowerCase()));
    const requiredSkills = mentionedSkills.filter(s => sectionMentionType(jobPost, s) === "Required");
    const preferredSkills = mentionedSkills.filter(s => sectionMentionType(jobPost, s) === "Preferred");
    const requiredMissing = requiredSkills.filter(s => !resumeLower.includes(s.toLowerCase()));
    const preferredMissing = preferredSkills.filter(s => !resumeLower.includes(s.toLowerCase()));
    const titleMatch = (jobPost.match(/(?:job title|position|role)\s*[:\-]\s*([^\n]{3,80})/i) || [])[1] || "Target Job";
    const matchPct = ranked.length ? Math.round((present.length / ranked.length) * 100) : 0;
    const projectedPct = Math.min(98, matchPct + Math.min(18, (missingSkills.length ? 8 : 4) + Math.min(10, missing.length)));
    const topSkills = mentionedSkills.slice(0, 10);
    const suggestions = [
      missingSkills.length ? "Add only truthful missing skills from the posting where the resume has real evidence: " + missingSkills.slice(0, 6).join(", ") + "." : "Keep the skills section aligned with the job posting; the strongest listed skills are already visible.",
      missing.length ? "Use employer language naturally in the summary, skills, projects, or experience: " + missing.slice(0, 6).join(", ") + "." : "Keyword coverage is strong; focus on proof and metrics rather than adding more terms.",
      "Reorder the skills section so the job posting's most repeated required tools and skills appear first.",
      "Rewrite 1-2 bullets to show the same problems, tools, or outcomes emphasized in the posting.",
      "Do not add unsupported keywords; every added term should connect to coursework, projects, experience, certifications, or volunteer work."
    ];
    keyword = { ranked, present, missing, mentionedSkills, missingSkills, requiredSkills, preferredSkills, requiredMissing, preferredMissing, topSkills, suggestions, titleMatch, matchPct, projectedPct };
  }
  return { resumeText, fieldSkills, skillsAlready, suggestedMissing, keyword };
}

function countRealBullets(bullets) {

function bulletRangeStatus(count, type) {

  return { level: "red", label: "Too many bullets for quick recruiter scanning", score: 62 };
}
function analyzeBulletDensity(data) {
  const expEntries = (data.experience || []).filter(e => e && (e.title || e.org || countRealBullets(e.bullets)));
  const projectEntries = (data.projects || []).filter(p => p && (p.name || countRealBullets(p.bullets)));
  const exp = expEntries.map(e => {
    const count = countRealBullets(e.bullets);
    return { name: e.title || e.org || "Experience entry", count, ...bulletRangeStatus(count, "experience") };
  });
  const projects = projectEntries.map(p => {
    const count = countRealBullets(p.bullets);
    return { name: p.name || "Project", count, ...bulletRangeStatus(count, "project") };
  });
  const all = [...exp, ...projects];
  const avg = all.length ? Math.round(all.reduce((sum, x) => sum + x.score, 0) / all.length) : 70;
  const notes = [];
  exp.filter(x => x.level !== "green").slice(0, 3).forEach(x => notes.push(x.name + ": " + x.count + " bullet" + (x.count === 1 ? "" : "s") + " — " + x.label + "."));
  projects.filter(x => x.level !== "green").slice(0, 3).forEach(x => notes.push(x.name + ": " + x.count + " bullet" + (x.count === 1 ? "" : "s") + " — " + x.label + "."));
  if (!notes.length && all.length) notes.push("Experience and project bullet counts are within recruiter-friendly ranges.");
  return {
    exp, projects, avgScore: avg,
    expAvg: exp.length ? (exp.reduce((s, x) => s + x.count, 0) / exp.length).toFixed(1) : "0.0",
    projectAvg: projects.length ? (projects.reduce((s, x) => s + x.count, 0) / projects.length).toFixed(1) : "0.0",
    notes
  };
}

function repeatedLeadingVerbs(bullets) {
  // Find the first word (leading verb) of each bullet and report any used more than once.
  const counts = {};
  (bullets || []).forEach(b => {
    const t = String(b || "").trim();
    if (!t) return;
    // Skip lines that aren't accomplishment bullets (tools/context lines).
    if (/^\s*(tools?|tech|technologies|stack|built with|skills used|methods?)\s*[:|]/i.test(t)) return;
    const m = t.match(/^([A-Za-z]+)/);
    if (!m) return;
    const verb = m[1].toLowerCase();
    // Ignore very short/common non-verb leaders.
    if (["a","an","the","and","of","to","in","on","for"].includes(verb)) return;
    counts[verb] = (counts[verb] || 0) + 1;
  });
  return Object.keys(counts)
    .filter(v => counts[v] > 1)
    .map(v => ({ verb: v, count: counts[v] }))
    .sort((a, b) => b.count - a.count);
}

function analyzeExperienceQuality(data) {
  const entries = (data.experience || []).filter(e => e && (e.title || e.org || (e.bullets || []).some(Boolean)));
  const bullets = entries.flatMap(e => (e.bullets || []).filter(Boolean));
  const quantified = bullets.filter(b => /\d|%|\$|million|thousand|k\+|[0-9]+\+/i.test(b)).length;
  const longBullets = bullets.filter(b => b.split(/\s+/).length > 38).length;
  const weakStarts = bullets.filter(b => /^(responsible for|was responsible for|worked on|helped|assisted|participated|involved in|was involved in|in charge of|handled|dealt with|contributed to|took part in|oversaw the|duties included|tasked with|successfully)\b/i.test(b.trim())).length;
  const missingAction = bullets.filter(b => !/^(analyzed|built|developed|created|led|managed|delivered|presented|quantified|implemented|engineered|recruited|coordinated|selected|conceptualized|authored|improved|identified|recommended|applied|designed|supported|evaluated|collaborated|organized|executed|optimized|translated|documented|spearheaded|launched|negotiated|researched|trained|streamlined|reduced|increased|generated|achieved|conducted|facilitated|founded|initiated|produced|secured|automated|redesigned|mentored|drafted|tested|deployed|maintained|configured|resolved|established|expanded|forecasted|modeled|programmed|published|spearhead|won|wrote)/i.test(b.trim())).length;
  const score = bullets.length
    ? Math.max(40, Math.min(100, Math.round(100 - longBullets * 5 - weakStarts * 8 - Math.max(0, bullets.length - quantified) * 2 - Math.min(missingAction, 4) * 3)))
    : 50;

  const notes = [];
  if (!entries.length) notes.push("No experience entries detected.");
  if (quantified < Math.ceil(bullets.length / 2) && bullets.length) notes.push("Add more numbers, scope, or outcomes where accurate.");
  if (longBullets) notes.push(longBullets + " bullet" + (longBullets === 1 ? "" : "s") + " may be too long.");
  if (weakStarts) notes.push("Replace weak starts such as “Responsible for” or “Helped” with stronger action verbs.");
  if (missingAction) notes.push("Some bullets may need stronger action verbs.");

  try {
    const bd = analyzeBulletDensity(data);
    bd.notes.slice(0, 3).forEach(n => { if (!notes.includes(n)) notes.push(n); });
  } catch (e) {}
  return { entries: entries.length, bullets: bullets.length, quantified, longBullets, weakStarts, missingAction, score, notes };
}

function analyzeSkillsClassification(data) {
  const technical = splitCsvSkills(data.skills && data.skills.technical);
  const dataViz = splitCsvSkills(data.skills && data.skills.dataVisualization);
  const tools = splitCsvSkills(data.skills && data.skills.tools);
  const domain = splitCsvSkills(data.skills && data.skills.domain);
  const all = [...technical, ...dataViz, ...tools, ...domain];

  const artifacts = all.filter(s => /^(tools\s*&|technical skills|tools\s*\/\s*platforms|data visualization|domain knowledge)$/i.test(s) || /:$/.test(s));
  const categoryCount = [technical, dataViz, tools, domain].filter(a => a.length).length;

  // Detect sub-category labels crammed into a single field, e.g.
  // "Programming & Data: SQL, Python, Analytics: Data Analysis, ..."
  // A colon in the MIDDLE of a field (not just trailing) signals the user
  // embedded their own headers instead of using the separate skill fields.
  const rawFields = [
    data.skills && data.skills.technical,
    data.skills && data.skills.dataVisualization,
    data.skills && data.skills.tools,
    data.skills && data.skills.domain
  ];
  const crammedFields = rawFields.filter(f => f && /\S\s*:\s*\S/.test(String(f)) && /:[^:]*,[^:]*:/.test(String(f)));
  const crammed = crammedFields.length > 0;

  const notes = [];
  if (crammedFields.length) notes.push("It looks like multiple skill groups are combined in one field (sub-headers like “Programming & Data:” appear mid-line). Split them across the Technical Skills, Tools & Platforms, and Domain Knowledge fields, or put each group on its own line, so recruiters can scan the categories cleanly.");
  if (artifacts.length) notes.push("Remove formatting artifacts: " + artifacts.join(", "));
  if (!crammed && categoryCount >= 3) notes.push("Original skill categories preserved (" + categoryCount + " categories identified).");
  if (!artifacts.length && !crammed && categoryCount >= 3) notes.push("No category conflicts detected.");

  const score = Math.max(60, Math.min(100, 96 - artifacts.length * 10 - (crammed ? 18 : 0) + Math.min(categoryCount, 4)));
  return {
    technicalCount: technical.length,
    dataVisualizationCount: dataViz.length,
    toolsCount: tools.length,
    domainCount: domain.length,
    artifacts,
    crammed,
    likelyMisplacedTools: [],
    likelyMisplacedCore: [],
    competencyTerms: [],
    notes,
    score
  };
}

  const expCount = countNonEmptyEntries(mapped.experience, ["title", "org", "bullets"]);
  const projCount = countNonEmptyEntries(mapped.projects, ["name", "bullets"]);
  const eduCount = countNonEmptyEntries(mapped.education, ["degree", "school"]);
  const actCount = countNonEmptyEntries(mapped.activities, ["role", "org", "bullets"]);
  const certCount = countNonEmptyEntries(mapped.certifications, ["name"]);
  const awardsCount = countNonEmptyEntries(mapped.awards, ["name"]);
  const pubsCount = countNonEmptyEntries(mapped.publications, ["citation"]);

  if (mapped.name || (mapped.contact && (mapped.contact.email || mapped.contact.phone))) created.push("Contact information detected");
  if (mapped.summary) created.push("Professional Summary detected");
  if (mapped.skills && (mapped.skills.technical || mapped.skills.dataVisualization || mapped.skills.tools || mapped.skills.domain)) {
    const skillTotal =
      splitCsvSkills(mapped.skills.technical).length +
      splitCsvSkills(mapped.skills.dataVisualization).length +
      splitCsvSkills(mapped.skills.tools).length +
      splitCsvSkills(mapped.skills.domain).length;
    created.push("Skills classified (" + skillTotal + ")");
  }
  if (expCount) created.push(expCount + " Experience entr" + (expCount === 1 ? "y" : "ies"));
  if (projCount) created.push(projCount + " Project entr" + (projCount === 1 ? "y" : "ies"));
  if (eduCount) created.push(eduCount + " Education entr" + (eduCount === 1 ? "y" : "ies"));
  if (actCount) created.push(actCount + " Leadership/Activity entr" + (actCount === 1 ? "y" : "ies"));
  if (certCount) created.push(certCount + " Certification entr" + (certCount === 1 ? "y" : "ies"));
  if (awardsCount) created.push(awardsCount + " Award/Honor entr" + (awardsCount === 1 ? "y" : "ies"));
  if (pubsCount) created.push(pubsCount + " Publication/Research entr" + (pubsCount === 1 ? "y" : "ies"));

  if (importLinks && importLinks.all && importLinks.all.length) changed.push(importLinks.all.length + " embedded hyperlink" + (importLinks.all.length === 1 ? "" : "s") + " extracted separately");

  if (mapped.skills && mapped.skills.importChanges && mapped.skills.importChanges.length) {
    mapped.skills.importChanges.filter(isUserMeaningfulImportChange).forEach(n => {
      if (/removed/i.test(n)) removed.push(n);
      else changed.push(n);
    });
  }

  (mapped.education || []).forEach(ed => {
    if (ed && ed.degree && ed.grad && ed.degree.toLowerCase().includes(String(ed.grad).toLowerCase())) review.push("Education degree field may still include graduation date");
    if (ed && ed.school && ed.location && ed.school.includes(ed.location)) review.push("Education school field may still include location");
    if (ed && (ed.degree || ed.school) && !ed.grad) review.push("Education entry missing graduation date");
  });

  (mapped.certifications || []).forEach(c => {
    if (c && c.name && !c.date) review.push("Certification imported without date");
  });

  if (mapped.contact && mapped.contact.relocationNoteFound) {
    review.push("Relocation note removed from location — a “relocating to…” line generally isn't necessary on a resume; list your current city and state, or the target city if you've already moved.");
  }

  (mapped.publications || []).forEach(p => {
    if (p && p.citation && !p.date) review.push("Publication/Research entry may need date review");
  });

  const missingCore = [];
  if (!mapped.summary) missingCore.push("summary");
  if (!expCount) missingCore.push("experience");
  if (!eduCount) missingCore.push("education");
  if (!mapped.skills || !(mapped.skills.technical || mapped.skills.dataVisualization || mapped.skills.tools || mapped.skills.domain)) missingCore.push("skills");

  let score = 100;
  score -= missingCore.length * 12;
  score -= Math.min(review.length, 6) * 4;
  if (!mapped.name) score -= 6;
  if (!mapped.contact || !mapped.contact.email) score -= 6;
  if (!mapped.contact || !mapped.contact.phone) score -= 4;
  score = Math.max(55, Math.min(100, score));

  let label = "Excellent";
  if (score < 70) label = "Significant Review Needed";
  else if (score < 85) label = "Review Recommended";
  else if (score < 95) label = "Good";

  return {
    score,
    label,
    created: Array.from(new Set(created)),
    changed: Array.from(new Set(changed)),
    removed: Array.from(new Set(removed)),
    review: Array.from(new Set(review)),
    counts: { expCount, projCount, eduCount, actCount, certCount, awardsCount, pubsCount }
  };
}

function analyzeProjectStrength(data) {
  const toolsLine = b => /^\s*(tools?|tech|technologies|stack|built with|tools?\s*&\s*technologies)\s*[:|]/i.test(String(b || ""));
  // Subtitle/org lines (e.g. "University of North Texas | ...") are context, not accomplishments.
  const metaLine = b => toolsLine(b) || /^(university|college|institute|school)\b/i.test(String(b || "").trim()) || (/\s\|\s/.test(String(b || "")) && !/\d/.test(String(b || "")));
  // A real project has a name AND at least one meaningful (non-meta) bullet.
  const projects = (data.projects || []).filter(p => p && (p.name && (p.bullets || []).some(b => b && b.trim() && !metaLine(b))));
  const techTerms = ["Python","SQL","API","APIs","React","Node","Power BI","Tableau","XGBoost","Logistic Regression","D3","Gemini","RAG","Machine Learning","NetworkX","TradingView","Figma","Agile","Excel","Azure","AWS","Docker"];
  // Accomplishment bullets exclude tools and subtitle/org lines.
  const bullets = projects.flatMap(p => (p.bullets || []).filter(b => b && b.trim() && !metaLine(b)));
  const quantified = bullets.filter(b => /\d|%|\$|million|thousand|k\+|[0-9]+\+/i.test(b)).length;
  const techDetected = projects.filter(p => {
    const hasToolsLine = (p.bullets || []).some(toolsLine);
    const t = [p.name, ...(p.bullets || [])].join(" ");
    return hasToolsLine || techTerms.some(term => t.toLowerCase().includes(term.toLowerCase()));
  }).length;
  const score = projects.length ? Math.max(55, Math.min(100, 72 + Math.min(18, quantified * 3) + Math.min(10, techDetected * 2))) : 60;
  const notes = [];
  if (!projects.length) notes.push("No projects detected.");
  if (projects.length && quantified < Math.ceil(bullets.length / 3)) notes.push("Add more measurable project outcomes where accurate.");
  if (projects.length && techDetected < projects.length) notes.push("Make sure each project names the tools, methods, or technologies used.");

  return { score, projects: projects.length, bullets: bullets.length, quantified, techDetected, notes };
}

function targetFieldFit(data) {
  const field = String(data.field || "");
  const resumeText = collectResumeText(data).toLowerCase();
  const required = (SKILL_BANK[field] || []).map(s => String(s || "").toLowerCase());
  if (!field || !required.length) return { score: 100, hits: [], missing: [], penalty: 0, note: "" };
  const hits = required.filter(s => resumeText.includes(s));
  const hitRatio = hits.length / required.length;
  let penalty = 0;
  if (hitRatio < 0.08) penalty = 22;
  else if (hitRatio < 0.16) penalty = 14;
  else if (hitRatio < 0.25) penalty = 7;
  const missing = required.filter(s => !resumeText.includes(s)).slice(0, 8);
  const score = Math.max(55, Math.round(100 - penalty - Math.max(0, 25 - Math.round(hitRatio * 100)) / 2));
  const note = penalty ? "Target field mismatch: the selected field is " + field + ", but the resume shows limited matching evidence. Scores are reduced until the resume or target field aligns." : "Target field evidence appears aligned with " + field + ".";
  return { score, hits, missing, penalty, note };
}

function leadershipEvidenceCount(data) {
  const leadershipWords = /\b(lead|led|leader|leadership|president|vice president|captain|chair|coordinator|mentor|trained|supervised|organized|founded|initiated|volunteer|community|team|collaborated|collaboration|facilitated|managed)\b/i;
  const pools = []
    .concat(data.activities || [])
    .concat(data.volunteer || [])
    .concat(data.awards || [])
    .concat(data.projects || [])
    .concat(data.experience || []);
  return pools.filter(item => leadershipWords.test(Object.keys(item || {}).map(k => Array.isArray(item[k]) ? item[k].join(" ") : item[k]).join(" "))).length;
}

function calculateResumeStrength(data, lastSkillImportNote) {
  const exp = analyzeExperienceQuality(data);
  const skills = analyzeSkillsClassification(data);
  const edu = analyzeEducationCleanup(data);
  const projects = analyzeProjectStrength(data);
  const order = recommendSectionOrder(data);
  const fieldFit = targetFieldFit(data);

  const hasSummary = String(data.summary || "").trim().length > 80;
  const hasContact = !!(data.name && data.contact && data.contact.email && data.contact.phone);
  const hasProjects = (data.projects || []).some(p => p.name && (p.bullets || []).some(Boolean));
  const hasLinks = !!(data.contact && (data.contact.linkedin || data.contact.portfolio));

  const summaryScore = hasSummary ? 95 : 70;
  const contactScore = hasContact ? 95 : 75;
  const projectsScore = projects.score;
  const orderScore = order.mismatch ? 85 : 95;

  const atsApprox = Math.max(70, Math.min(100, Math.round(contactScore * 0.25 + skills.score * 0.25 + edu.score * 0.15 + exp.score * 0.25 + orderScore * 0.10)));
  const readabilityApprox = Math.max(55, Math.min(100, Math.round(contactScore * 0.20 + exp.score * 0.30 + skills.score * 0.15 + projectsScore * 0.15 + orderScore * 0.20)));
  const rawOverall = Math.round(
    exp.score * 0.30 +
    skills.score * 0.20 +
    projectsScore * 0.15 +
    edu.score * 0.10 +
    atsApprox * 0.15 +
    readabilityApprox * 0.10
  );
  const overall = Math.max(55, Math.min(100, rawOverall - fieldFit.penalty));

  const changeNotes = analyzeSkillChangeExplanations(data, lastSkillImportNote);

  return {
    overall,
    exp,
    skills,
    edu,
    projects,
    order,
    hasSummary,
    hasContact,
    hasProjects,
    hasLinks,
    fieldFit,
    changeNotes
  };
}



function specificExperienceFeedback(data) {
  const entries = (data.experience || []).filter(e => e && (e.title || e.org || (e.bullets || []).some(Boolean)));
  const bullets = entries.flatMap(e => (e.bullets || []).filter(Boolean).map(b => ({ text: String(b || ""), entry: e })));
  const weak = bullets.filter(x => /^(responsible for|was responsible for|worked on|helped|assisted|participated|involved in|was involved in|in charge of|handled|dealt with|contributed to|took part in|oversaw the|duties included|tasked with|successfully)\b/i.test(x.text.trim()));
  const quantified = bullets.filter(x => /\d|%|\$|million|thousand|k\+|[0-9]+\+|years?|months?/i.test(x.text));
  const unquantified = bullets.length - quantified.length;
  const missingDates = entries.filter(e => (e.title || e.org) && (!e.start || !e.end)).length;
  const longBullets = bullets.filter(x => x.text.split(/\s+/).length > 38).length;

  const notes = [];
  if (bullets.length) notes.push((quantified.length >= Math.ceil(bullets.length / 2) ? "✓ " : "⚠ ") + quantified.length + " of " + bullets.length + " experience bullets contain measurable results.");
  if (unquantified > 0) notes.push("⚠ " + unquantified + " bullet" + (unquantified === 1 ? "" : "s") + " may need more measurable results.");
  if (weak.length > 0) notes.push("⚠ " + weak.length + " bullet" + (weak.length === 1 ? "" : "s") + " may use a weak opening phrase.");
  if (missingDates === 0 && entries.length) notes.push("✓ All experience entries include dates.");
  if (missingDates > 0) notes.push("⚠ " + missingDates + " experience entr" + (missingDates === 1 ? "y is" : "ies are") + " missing dates.");
  if (longBullets > 0) notes.push("⚠ " + longBullets + " bullet" + (longBullets === 1 ? "" : "s") + " may be too long for quick recruiter scanning.");
  return { notes, quantified: quantified.length, total: bullets.length, weak: weak.length, unquantified, missingDates, longBullets };
}

function specificProjectFeedback(data) {
  const toolsLine = b => /^\s*(tools?|tech|technologies|stack|built with|tools?\s*&\s*technologies)\s*[:|]/i.test(String(b || ""));
  const metaLine = b => toolsLine(b) || /^(university|college|institute|school)\b/i.test(String(b || "").trim()) || (/\s\|\s/.test(String(b || "")) && !/\d/.test(String(b || "")));
  const projects = (data.projects || []).filter(p => p && (p.name && (p.bullets || []).some(b => b && b.trim() && !metaLine(b))));
  const techPattern = /(python|sql|api|react|node|power bi|tableau|xgboost|logistic regression|machine learning|d3|rag|gemini|networkx|tradingview|excel|azure|aws|docker|linux|github|git|jupyter|vs code|figma|agile)/i;
  const projectTech = projects.filter(p => (p.bullets || []).some(toolsLine) || techPattern.test([p.name, ...(p.bullets || [])].join(" ")));
  const quantified = projects.filter(p => (p.bullets || []).some(b => !metaLine(b) && /\d|%|\$|million|thousand|k\+|[0-9]+\+/i.test(b)));
  const genericTitles = projects.filter(p => p.name && !techPattern.test(p.name) && p.name.split(/\s+/).length < 4);

  const notes = [];
  if (projects.length) notes.push((projectTech.length === projects.length ? "✓ " : "⚠ ") + projectTech.length + " of " + projects.length + " projects reference tools, methods, or technologies.");
  if (quantified.length) notes.push("✓ " + quantified.length + " project" + (quantified.length === 1 ? "" : "s") + " include measurable outcomes.");
  if (genericTitles.length) notes.push("⚠ " + genericTitles.length + " project title" + (genericTitles.length === 1 ? "" : "s") + " may be too generic.");
  if (projects.length && projectTech.length < projects.length) notes.push("⚠ Make sure each project names the tools, methods, or technologies used.");
  return { notes, projects: projects.length, withTech: projectTech.length, quantified: quantified.length, genericTitles: genericTitles.length };
}

function analyzeRecruiterReadability(data, resumeStrength) {
  const exp = analyzeExperienceQuality(data);
  const projects = analyzeProjectStrength(data);
  const skills = analyzeSkillsClassification(data);
  const edu = analyzeEducationCleanup(data);
  const order = recommendSectionOrder(data);

  const resumeText = collectResumeText(data);
  const wordCount = resumeText.split(/\s+/).filter(Boolean).length;
  const allBullets = [
    ...(data.experience || []).flatMap(e => e.bullets || []),
    ...(data.projects || []).flatMap(p => p.bullets || []),
    ...(data.activities || []).flatMap(a => a.bullets || []),
    ...(data.volunteer || []).flatMap(v => v.bullets || [])
  ].filter(Boolean);
  const longBullets = allBullets.filter(b => String(b).split(/\s+/).length > 38).length;
  const contactComplete = !!(data.name && data.contact && data.contact.email && data.contact.phone);
  const linksPresent = !!(data.contact && (data.contact.linkedin || data.contact.portfolio));
  const sectionOrderGood = !order.mismatch;

  let score = 100;
  if (!contactComplete) score -= 10;
  if (!linksPresent) score -= 4;
  if (!sectionOrderGood) score -= 7;
  score -= Math.min(18, longBullets * 3);
  if (exp.quantified < Math.ceil(Math.max(1, exp.bullets) / 3)) score -= 8;
  if (wordCount > 950) score -= 6;
  if (skills.artifacts && skills.artifacts.length) score -= 8;
  if (edu.issues && edu.issues.length) score -= 5;
  score = Math.max(55, Math.min(100, Math.round(score)));
  if (resumeStrength && typeof resumeStrength.overall === "number") {
    score = Math.round((score * 0.45) + (resumeStrength.overall * 0.55));
  }
  const fieldFit = targetFieldFit(data);
  if (fieldFit.penalty) score = Math.max(55, score - Math.min(12, fieldFit.penalty));

  const strengths = [];
  const suggestions = [];

  if (contactComplete) strengths.push("Contact information is easy to find.");
  else suggestions.push("Complete the name, email, and phone fields.");

  if (linksPresent) strengths.push("Professional links are included.");
  else suggestions.push("Add LinkedIn or GitHub/portfolio if available.");

  if (sectionOrderGood) strengths.push("Section order supports recruiter scanning.");
  else suggestions.push("Use the recommended section order or Apply Smart Order.");

  if (exp.quantified >= Math.ceil(Math.max(1, exp.bullets) / 3)) strengths.push("Good use of measurable outcomes.");
  else suggestions.push("Add more metrics, scope, or results where accurate.");

  if (!longBullets) strengths.push("Bullet length is recruiter-friendly.");
  else suggestions.push(longBullets + " bullet" + (longBullets === 1 ? "" : "s") + " may be too long for quick scanning.");

  if (skills.score >= 90 && !skills.crammed) strengths.push("Skills are organized clearly.");
  else suggestions.push(skills.crammed ? "Separate combined skill groups into the distinct skill fields so categories read clearly." : "Review skills categories for artifacts or misplaced items.");

  if (fieldFit.penalty) suggestions.unshift(fieldFit.note);

  return { score, strengths, suggestions, wordCount, longBullets };
}

function sectionRecruiterFeedback(data) {
  const exp = analyzeExperienceQuality(data);
  const projects = analyzeProjectStrength(data);
  const skills = analyzeSkillsClassification(data);
  const edu = analyzeEducationCleanup(data);
  const order = recommendSectionOrder(data);

  const feedback = [];

  // Combined Experience + Projects opening-verb pool: flag any leading verb
  // that opens more than one bullet across BOTH sections (inside or between
  // jobs/projects, or once in each section).
  const metaLineCombined = b => /^\s*(tools?|tech|technologies|stack|built with|tools?\s*&\s*technologies|skills used|methods?)\s*[:|]/i.test(String(b || "").trim()) || /^(university|college|institute|school)\b/i.test(String(b || "").trim()) || (/\s\|\s/.test(String(b || "")) && !/\d/.test(String(b || "")));
  const combinedBullets = []
    .concat((data.experience || []).flatMap(e => (e.bullets || []).filter(Boolean)))
    .concat((data.projects || []).flatMap(p => (p.bullets || []).filter(b => b && b.trim() && !metaLineCombined(b))));
  const combinedRepeatedVerbs = repeatedLeadingVerbs(combinedBullets);
  const repeatedVerbNote = combinedRepeatedVerbs.length
    ? "Vary repeated opening verbs across your Experience and Projects (" + combinedRepeatedVerbs.slice(0, 3).map(r => "“" + r.verb.charAt(0).toUpperCase() + r.verb.slice(1) + "”").join(", ") + "): start each bullet with a different action verb so they don't read repetitively."
    : "";

  feedback.push({
    section: "Professional Summary",
    score: String(data.summary || "").trim().length > 80 ? 92 : 72,
    strengths: String(data.summary || "").trim().length > 80 ? ["Summary gives recruiters a quick positioning statement."] : [],
    suggestions: String(data.summary || "").trim().length > 80 ? [] : ["Add a 2–4 line summary that states target role, strengths, and evidence."]
  });

  feedback.push({
    section: "Skills",
    score: skills.score,
    strengths: (skills.score >= 90 && !skills.crammed) ? ["Skills are organized into clear categories."] : [],
    suggestions: skills.notes && skills.notes.length ? skills.notes.slice(0, 3) : []
  });

  feedback.push({
    section: "Experience",
    score: exp.score,
    strengths: [
      exp.entries ? exp.entries + " experience entr" + (exp.entries === 1 ? "y" : "ies") + " included." : "",
      exp.quantified ? exp.quantified + " quantified bullet" + (exp.quantified === 1 ? "" : "s") + " included." : ""
    ].filter(Boolean),
    suggestions: (repeatedVerbNote ? [repeatedVerbNote] : []).concat(exp.notes.slice(0, 4))
  });

  feedback.push({
    section: "Projects",
    score: projects.score,
    strengths: [
      projects.projects ? projects.projects + " project entr" + (projects.projects === 1 ? "y" : "ies") + " included." : "",
      projects.techDetected ? "Technical tools/methods are visible in projects." : ""
    ].filter(Boolean),
    suggestions: projects.notes.slice(0, 4)
  });

  feedback.push({
    section: "Education",
    score: edu.score,
    strengths: edu.issues.length ? [] : ["Education is cleanly structured."],
    suggestions: edu.issues.slice(0, 4)
  });

  const fieldChosen = !!String(data.field || "").trim();
  if (!fieldChosen) {
    feedback.push({
      section: "Section Order",
      score: null,
      strengths: [],
      suggestions: ["Select your Career Goal above to evaluate section order — the recommended order depends on your field."]
    });
  } else {
    feedback.push({
      section: "Section Order",
      score: order.mismatch ? 90 : 100,
      strengths: order.mismatch ? [] : ["Current section order matches the recommended order for " + data.field + "."],
      suggestions: order.mismatch ? ["Consider Apply Smart Order for " + data.field + " and your resume content."] : []
    });
  }

  return feedback;
}

function atsCompatibilityScore(data, resumeStrength) {
  let score = 100;
  if (!data.name) score -= 5;
  if (!data.contact || !data.contact.email) score -= 5;
  if (!data.summary) score -= 5;
  if (!data.skills || !(data.skills.technical || data.skills.tools || data.skills.domain || data.skills.dataVisualization)) score -= 8;
  const bullets = [
    ...(data.experience || []).flatMap(e => e.bullets || []),
    ...(data.projects || []).flatMap(p => p.bullets || [])
  ].filter(Boolean);
  if (!bullets.length) score -= 8;
  if (resumeStrength && resumeStrength.edu && resumeStrength.edu.issues && resumeStrength.edu.issues.length) score -= 3;
  return Math.max(70, Math.min(100, Math.round(score)));
}
