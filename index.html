const TOOL_PLATFORM_TERMS = new Set([
  "excel","microsoft excel","microsoft office","power bi","tableau","salesforce","workday","adp","hris","applicant tracking systems","ats",
  "jupyter","github","git","aws","azure","docker","jira","canva","figma","adobe creative suite","google analytics",

].map(s => s.toLowerCase()));

function escapeRegExp(s) {
  return String(s || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}
function skillCategory(skill) {
  const s = String(skill || "").toLowerCase().trim();
  if (TOOL_PLATFORM_TERMS.has(s)) return "tool";
  if (/(platform|software|suite|system|systems|cloud|github|git|excel|power bi|tableau|salesforce|workday|adp|jira|canva|figma|aws|azure|docker|epic|ehr|autocad|solidworks|matlab|spss|jupyter|linux|react|node\.js|lexisnexis|westlaw|crm|hris)/i.test(skill)) return "tool";
  return "technical";
}
function skillMentionCount(jobPost, skill) {
  const text = String(jobPost || "").toLowerCase();
  const s = String(skill || "").toLowerCase().trim();
  if (!text || !s) return 0;
  const re = new RegExp("(^|[^a-z0-9+#.\\-])" + escapeRegExp(s) + "([^a-z0-9+#.\\-]|$)", "g");
  return (text.match(re) || []).length;
}
function sectionMentionType(jobPost, skill) {
  const text = String(jobPost || "");
  const lowerSkill = String(skill || "").toLowerCase().trim();
  if (!text || !lowerSkill) return "";
  const requiredRe = /(required qualifications|required skills|minimum qualifications|basic qualifications|must have|requirements|you must|required)/i;
  const preferredRe = /(preferred qualifications|preferred skills|nice to have|nice-to-have|plus|preferred|desired)/i;
  const chunks = text.split(/\n{2,}|(?=required qualifications|minimum qualifications|basic qualifications|preferred qualifications|preferred skills|nice to have|requirements|required skills|must have)/i);
  let inRequired = false;
  let inPreferred = false;
  chunks.forEach(chunk => {
    if (chunk.toLowerCase().includes(lowerSkill)) {
      if (requiredRe.test(chunk)) inRequired = true;
      if (preferredRe.test(chunk)) inPreferred = true;
    }
  });
  if (inRequired) return "Required";
  if (inPreferred) return "Preferred";
  return "";
}
function sortSkillsByJobPost(skills, jobPost) {
  const originalIndex = new Map(skills.map((s, i) => [String(s).toLowerCase(), i]));
  return [...skills].sort((a, b) => {
    const countB = skillMentionCount(jobPost, b);
    const countA = skillMentionCount(jobPost, a);
    if (countB !== countA) return countB - countA;
    const typeB = sectionMentionType(jobPost, b) === "Required" ? 2 : sectionMentionType(jobPost, b) === "Preferred" ? 1 : 0;
    const typeA = sectionMentionType(jobPost, a) === "Required" ? 2 : sectionMentionType(jobPost, a) === "Preferred" ? 1 : 0;
    if (typeB !== typeA) return typeB - typeA;
    return (originalIndex.get(String(a).toLowerCase()) || 0) - (originalIndex.get(String(b).toLowerCase()) || 0);
  });
}

const KEYWORD_STOPWORDS = new Set("a an the and or but of to in on at for with by from as is are was were be been being this that these those you your our their they them it its will would should could can may must have has had do does did not no if then than into over under about across after before between during through within without upon per via amid among against toward above below here there such only just very also able based both well get got like need needs needed want wants ideal join seek seeking looking make making take taking new use used using include includes including provide provides help helping ensure ensuring build building create creating develop developing analyze analyzing manage managing support supporting present presenting lead leading drive driving work works working experience team teams company companies job role roles position positions opportunity opportunities please apply applicant candidate required preferred responsibilities requirements qualifications skill skills ability abilities strong excellent good great plus etc years year month months day days week weeks fulltime full-time parttime part-time salary pay benefits remote hybrid onsite location locations employer employee employees equal opportunity diversity inclusion veteran disability authorization sponsorship resume cover letter application".split(/\s+/));
function normSkill(s) { return String(s || "").trim().replace(/\s+/g, " "); }
function addUniqueCsv(existing, item) {
  const clean = normSkill(item);
  if (!clean) return existing || "";
  const parts = String(existing || "").split(/[,;|]/).map(normSkill).filter(Boolean);
  const lower = new Set(parts.map(x => x.toLowerCase()));
  if (!lower.has(clean.toLowerCase())) parts.push(clean);
  return parts.join(", ");
}
function tokenizeImportant(text) {
  const freq = {};
  (String(text || "").toLowerCase().match(/[a-z][a-z0-9+#.\-]{2,}/g) || []).forEach(w => {
    const clean = w.replace(/^[.\-]+|[.\-]+$/g, "");
    if (clean.length < 3 || KEYWORD_STOPWORDS.has(clean)) return;
    freq[clean] = (freq[clean] || 0) + 1;
  });
  return freq;
}
function collectResumeText(data) {
  const parts = [data.name, data.summary, data.skills && data.skills.technical, data.skills && data.skills.dataVisualization, data.skills && data.skills.tools, data.skills && data.skills.domain];
  ["experience", "projects", "education", "activities", "certifications", "awards", "publications", "volunteer"].forEach(k => {
    (data[k] || []).forEach(item => Object.keys(item).forEach(key => {
      if (key === "id") return;
      const v = item[key];
      if (Array.isArray(v)) parts.push(v.join(" ")); else parts.push(v);
    }));
  });
  return parts.filter(Boolean).join(" ");
}

function _newId() { return Math.random().toString(36).slice(2, 10); }

// Detect whether the resume actually has professional links, checking BOTH the
// parsed contact fields AND the raw resume text. Google-Docs-exported resumes
// often show "Linkedin"/"Github" as anchor words whose URLs don't survive
// import — in that case the links ARE on the page, so the tool must not claim
// they're missing. Returns granular flags so callers can be specific.
function detectProfileLinks(data, rawImportText) {
  const c = (data && data.contact) || {};
  const fieldLinkedIn = /linkedin/i.test(String(c.linkedin || "")) || /linkedin/i.test(String(c.portfolio || ""));
  const fieldGithub = /github/i.test(String(c.portfolio || "")) || /github/i.test(String(c.linkedin || ""));
  const fieldPortfolio = !!(String(c.portfolio || "").trim());
  // Scan the header/contact area of the raw text (first ~400 chars) plus the
  // full reconstructed text, for anchor words or spelled-out URLs.
  let text = String(rawImportText || "");
  if (text.length < 40) { try { text = collectResumeText(data); } catch (e) {} }
  const head = text.slice(0, 600);
  const textLinkedIn = /\blinked ?in\b/i.test(head) || /linkedin\.com/i.test(text);
  const textGithub = /\bgit ?hub\b/i.test(head) || /github\.com/i.test(text);
  const textPortfolio = /\b[a-z0-9\-]+\.(?:dev|io|me|net|com)\/[A-Za-z0-9]/i.test(text) && !/gmail|outlook|yahoo|hotmail/i.test(head);
  const hasLinkedIn = fieldLinkedIn || textLinkedIn;
  const hasGithub = fieldGithub || textGithub;
  const hasPortfolio = fieldPortfolio || textPortfolio;
  return {
    hasLinkedIn, hasGithub, hasPortfolio,
    hasAny: hasLinkedIn || hasGithub || hasPortfolio,
    // "URL missing but anchor present" — a distinct, softer coaching case.
    linkedInTextOnly: textLinkedIn && !fieldLinkedIn,
    githubTextOnly: textGithub && !fieldGithub
  };
}

function normalizeImportedResumeText(rawText) {
  let t = String(rawText || "").replace(/\r/g, "\n");

  // Word/PDF exports are full of non-breaking spaces, narrow spaces, and
  // "fancy" dashes. Normalize them to plain ASCII so downstream regexes that
  // assume ordinary spaces/hyphens match reliably (e.g. "Cypress,\u00a0CA").
  t = t.replace(/[\u00a0\u2007\u202f\u2009\u200a\u2002\u2003]/g, " ");

function loadScriptOnce(urls, testFn) {
  if (testFn()) return Promise.resolve();
  return new Promise((resolve, reject) => {
    let i = 0;
    const tryNext = () => {
      if (i >= urls.length) { reject(new Error("load failed")); return; }
      const s = document.createElement("script");
      s.src = urls[i];
      s.onload = () => {
        let tries = 0;
        const check = () => { if (testFn()) resolve(); else if (tries++ > 60) { i++; tryNext(); } else setTimeout(check, 50); };
        check();
      };
      s.onerror = () => { i++; tryNext(); };
      document.head.appendChild(s);
    };
    tryNext();
  });
}

async function extractDocxHyperlinks(arrayBuffer) {
  try {
    if (typeof window.JSZip === "undefined") return [];
    const zip = await window.JSZip.loadAsync(arrayBuffer);
    const urls = [];
    // (1) Standard relationship targets (Word-authored links).
    const relPaths = Object.keys(zip.files).filter(p => /_rels\/.*\.rels$/i.test(p));
    for (const p of relPaths) {
      const xml = await zip.file(p).async("text");
      const doc = new DOMParser().parseFromString(xml, "application/xml");
      Array.from(doc.getElementsByTagName("Relationship")).forEach(rel => {
        const target = rel.getAttribute("Target") || "";
        const type = rel.getAttribute("Type") || "";
        if (/hyperlink/i.test(type) && /^https?:\/\//i.test(target)) urls.push(target);
      });
    }
    // (2) Field-code hyperlinks (common in Google-Docs-exported resumes):
    //     <w:instrText> HYPERLINK "https://..." </w:instrText>.
    // (3) Any raw URL sitting in document/footnote/header text or instrText.
    const bodyParts = Object.keys(zip.files).filter(p => /^word\/(document|header\d*|footer\d*|footnotes|endnotes)\.xml$/i.test(p));
    const URL_RE = /https?:\/\/[^\s"'<>\\]+/gi;
    for (const p of bodyParts) {
      const xml = await zip.file(p).async("text");
      // HYPERLINK field codes
      const fieldRe = /HYPERLINK\s+"([^"]+)"/gi;
      let m;
      while ((m = fieldRe.exec(xml))) { if (/^https?:\/\//i.test(m[1])) urls.push(m[1]); }
      // Bare URLs anywhere in the text (covers spelled-out links like
      // "linkedin.com/in/name" written as visible text, and www-less forms).
      const rawText = xml.replace(/<[^>]+>/g, " ");
      let u;
      while ((u = URL_RE.exec(rawText))) urls.push(u[0]);
      // Also catch domain-only forms authors type without http:// —
      // linkedin.com/in/..., github.com/..., a personal portfolio domain.
      const bareRe = /\b(?:linkedin\.com\/in\/[A-Za-z0-9\-_%]+|github\.com\/[A-Za-z0-9\-_.]+|[a-z0-9\-]+\.(?:dev|io|me|portfolio|net))\b/gi;
      let b;
      while ((b = bareRe.exec(rawText))) urls.push("https://" + b[0].replace(/^https?:\/\//i, ""));
    }
    // Normalize + de-dupe (case-insensitive, trailing punctuation stripped).
    const norm = urls
      .map(u => String(u || "").trim().replace(/[),.;]+$/, ""))
      .filter(u => /^https?:\/\//i.test(u));

    const out = [];
    norm.forEach(u => { const k = u.toLowerCase(); if (!seen.has(k)) { seen.add(k); out.push(u); } });
    return out;
  } catch (e) {
    return [];
  }

  const clean = Array.from(new Set((urls || []).filter(Boolean)));
  // Accept any linkedin.com URL (not just /in/), and any github.com URL.
  const linkedIn = clean.find(u => /linkedin\.com/i.test(u)) || "";
  const github = clean.find(u => /github\.com/i.test(u)) || "";
  const portfolio = clean.find(u => !/linkedin\.com/i.test(u) && !/github\.com/i.test(u) && !/(gmail|outlook|hotmail|yahoo|icloud)\.com/i.test(u) && !/^https?:\/\/(www\.)?(google|w3|schemas|microsoft)\./i.test(u)) || "";

async function extractPdfTextFromFile(file) {
  await ensurePdfImportLibs();
  const arrayBuffer = await file.arrayBuffer();
  const loadingTask = window.pdfjsLib.getDocument({ data: arrayBuffer });
  const pdf = await loadingTask.promise;
  const pages = [];
  for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
    const page = await pdf.getPage(pageNum);
    const content = await page.getTextContent();
    // PDF.js returns each text run as an item with a transform matrix; index 5 is
    // the Y position and index 4 is X. Text runs on the same visual line share a
    // Y (within a small tolerance). Joining everything with spaces destroys the
    // line structure the resume parser depends on (section headings, entry
    // headers, and bullet boundaries all live on separate lines), so we
    // reconstruct lines by grouping runs whose Y is within tolerance, then sort
    // each line left-to-right by X.
    const items = (content.items || []).filter(it => (it.str || "").length);
    const rows = [];
    const Y_TOL = 3; // points; same-line runs rarely differ by more than this
    items.forEach(it => {
      const tr = it.transform || it.transformMatrix || [1, 0, 0, 1, 0, 0];
      const x = tr[4] || 0;
      const y = tr[5] || 0;
      // Find an existing row at (approximately) this Y.
      let row = null;
      for (let r = rows.length - 1; r >= 0; r--) {
        if (Math.abs(rows[r].y - y) <= Y_TOL) { row = rows[r]; break; }
        // Rows are appended in reading order; if we've passed the tolerance band
        // by a wide margin we can stop scanning back.
        if (rows[r].y - y > Y_TOL * 6) break;
      }
      if (!row) { row = { y, runs: [] }; rows.push(row); }
      row.runs.push({ x, str: it.str });
    });
    // Sort rows top-to-bottom (PDF Y increases upward, so descending Y = top-down),
    // then each row left-to-right by X, and join runs into a line.
    rows.sort((a, b) => b.y - a.y);
    const lines = rows.map(row => {
      row.runs.sort((a, b) => a.x - b.x);
      return row.runs.map(rn => rn.str).join(" ").replace(/\s{2,}/g, " ").trim();
    }).filter(Boolean);
    pages.push(lines.join("\n"));
  }
  return pages.join("\n").trim();
}

async function extractTextFromImportedFile(file) {
  const name = (file && file.name || "").toLowerCase();
  if (!file) return "";
  if (name.endsWith(".txt")) return { resumeText: await file.text(), fileName: file.name || "", transfer: false };
  if (name.endsWith(".json")) {
    const raw = await file.text();
    const payload = JSON.parse(raw);
    if (payload && payload.source && String(payload.source).includes("Resume Readiness Check") && payload.resumeText) {
      return { resumeText: payload.resumeText || "", jobPost: payload.jobPost || "", fileName: file.name || "", transfer: true };
    }
    throw new Error("This JSON file is not a valid Resume Builder import file.");
  }
  if (name.endsWith(".docx")) {
    await ensureResumeImportLibs();
    const arrayBuffer = await file.arrayBuffer();
    const result = await mammoth.extractRawText({ arrayBuffer });
    const links = await extractDocxHyperlinks(arrayBuffer);
    const linkSummary = summarizeImportedLinks(links);
    return { resumeText: (result.value || "").trim(), fileName: file.name || "", transfer: false, links: linkSummary };
  }
  if (name.endsWith(".pdf")) {
    const pdfText = await extractPdfTextFromFile(file);
    if (!pdfText || pdfText.length < 30) throw new Error("PDF import could not extract enough text. If this is a scanned/image PDF, copy/paste the resume text or upload a DOCX version.");
    return { resumeText: pdfText, fileName: file.name || "", transfer: false, links: null };
  }
  throw new Error("Unsupported file type. Please upload a .docx, .pdf, .txt, or Resume Readiness Check .json file, or paste the resume text.");
}

    .replace(/\b(Technical Skills|Technical \/ Core Skills|Core Skills|Core Competencies|Data Visualization|Tools\s*&\s*Platforms|Tools\s*\/\s*Platforms|Tools|Platforms|Domain Knowledge|Programming Languages|Software)\s*:\s*/gi, "")
    .replace(/\bTools\s*&\b/gi, "")
    .replace(/\s{2,}/g, " ")
    .trim();
}


function countRealBullets(bullets) {
  return (bullets || []).filter(b => String(b || "").trim()).length;
}
function bulletRangeStatus(count, type) {
  if (type === "project") {
    if (count === 0) return { level: "red", label: "Missing accomplishment bullets", score: 45 };
    if (count === 1) return { level: "yellow", label: "Add another accomplishment bullet", score: 75 };
    if (count >= 2 && count <= 3) return { level: "green", label: "Ideal range (2–3 bullets)", score: 100 };
    if (count === 4) return { level: "yellow", label: "Consider trimming to strongest points", score: 85 };
    return { level: "red", label: "Too many bullets for quick recruiter scanning", score: 65 };
  }
  if (count === 0) return { level: "red", label: "Missing accomplishment bullets", score: 45 };
  if (count === 1) return { level: "yellow", label: "Consider adding another accomplishment bullet", score: 78 };
  if (count >= 2 && count <= 4) return { level: "green", label: "Ideal range (2–4 bullets)", score: 100 };
  if (count >= 5 && count <= 6) return { level: "yellow", label: "Consider trimming to strongest accomplishments", score: 82 };
  return { level: "red", label: "Too many bullets for quick recruiter scanning", score: 62 };
}
function analyzeBulletDensity(data) {
  const expEntries = (data.experience || []).filter(e => e && (e.title || e.org || countRealBullets(e.bullets)));
  const projectEntries = (data.projects || []).filter(p => p && (p.name || countRealBullets(p.bullets)));
  const exp = expEntries.map(e => {
    const count = countRealBullets(e.bullets);
    return { name: e.title || e.org || "Experience entry", count, ...bulletRangeStatus(count, "experience") };
  });
  const projects = projectEntries.map(p => {
    const count = countRealBullets(p.bullets);
    return { name: p.name || "Project", count, ...bulletRangeStatus(count, "project") };
  });
  const all = [...exp, ...projects];
  const avg = all.length ? Math.round(all.reduce((sum, x) => sum + x.score, 0) / all.length) : 70;
  const notes = [];
  exp.filter(x => x.level !== "green").slice(0, 3).forEach(x => notes.push(x.name + ": " + x.count + " bullet" + (x.count === 1 ? "" : "s") + " — " + x.label + "."));
  projects.filter(x => x.level !== "green").slice(0, 3).forEach(x => notes.push(x.name + ": " + x.count + " bullet" + (x.count === 1 ? "" : "s") + " — " + x.label + "."));
  if (!notes.length && all.length) notes.push("Experience and project bullet counts are within recruiter-friendly ranges.");
  return {
    exp, projects, avgScore: avg,
    expAvg: exp.length ? (exp.reduce((s, x) => s + x.count, 0) / exp.length).toFixed(1) : "0.0",
    projectAvg: projects.length ? (projects.reduce((s, x) => s + x.count, 0) / projects.length).toFixed(1) : "0.0",
    notes
  };
}

function repeatedLeadingVerbs(bullets) {
  // Find the first word (leading verb) of each bullet and report any used more than once.
  const counts = {};
  (bullets || []).forEach(b => {
    const t = String(b || "").trim();
    if (!t) return;
    // Skip lines that aren't accomplishment bullets (tools/context lines).
    if (/^\s*(tools?|tech|technologies|stack|built with|skills used|methods?)\s*[:|]/i.test(t)) return;
    const m = t.match(/^([A-Za-z]+)/);
    if (!m) return;
    const verb = m[1].toLowerCase();
    // Ignore very short/common non-verb leaders.
    if (["a","an","the","and","of","to","in","on","for"].includes(verb)) return;
    counts[verb] = (counts[verb] || 0) + 1;
  });
  return Object.keys(counts)
    .filter(v => counts[v] > 1)
    .map(v => ({ verb: v, count: counts[v] }))
    .sort((a, b) => b.count - a.count);
}

// ---- Shared quantification detector (v11.5) ----
// Decides whether a bullet contains a genuine *measurable result*, not just an
// incidental digit. Fixes two failure modes seen on strong technical resumes:
//   1) false positives — "CUDA C/C++", "Python 3", "Lonestar6", "COVID-19",
//      version numbers, and plain years were counted as quantification.
//   2) false negatives — real metrics phrased as ratios/multipliers ("2.68×",
//      "430x speedup") or named metrics weren't always credited.
function isQuantifiedBullet(raw) {
  const b = String(raw || "").trim();
  if (!b) return false;
  // Strip patterns that contain digits but are NOT measurable results, so they
  // don't get mistaken for quantification.
  const stripped = b
    .replace(/\bc\/c\+\+|c\+\+|c#/gi, " ")               // languages
    .replace(/\bpython\s*\d(\.\d+)?/gi, " ")             // "Python 3"
    .replace(/\b[a-z]+\d[a-z0-9]*\b/gi, " ")             // alphanumeric names: Lonestar6, GPT4, S3, ResNet50
    .replace(/\bcovid-?19\b/gi, " ")                     // named events
    .replace(/\bversion\s*\d+(\.\d+)*/gi, " ")           // version strings
    .replace(/\bv\d+(\.\d+)*/gi, " ")                    // v2, v3.1
    .replace(/\b(19|20)\d{2}\b/g, " ");                  // bare calendar years
  // Genuine measurable-result signals.
  const strongMetric =
    /\d+(\.\d+)?\s*(×|x)\b/i.test(stripped) ||           // 2.68×, 430x  (ratios/multipliers)
    /[%$]/.test(stripped) ||                             // percentages, dollars
    /\d+(\.\d+)?\s*(k\+?|m\+?|b\+?|million|thousand|billion)\b/i.test(stripped) ||
    /\b\d{2,}\+?\b/.test(stripped) ||                    // any standalone number ≥ 10 (users, records, hours…)
    /\b\d+(\.\d+)?\s*(users?|customers?|students?|records?|hours?|days?|weeks?|months?|people|teams?|projects?|models?|clients?|requests?|queries|images?|datasets?|gb|tb|ms|fps|reduction|increase|faster|improvement)/i.test(stripped) ||
    /\bgpa\b[\s:]*\d/i.test(b);                          // GPA counts even on original
  return strongMetric;
}

function analyzeExperienceQuality(data) {
  const entries = (data.experience || []).filter(e => e && (e.title || e.org || (e.bullets || []).some(Boolean)));
  const bullets = entries.flatMap(e => (e.bullets || []).filter(Boolean));
  const quantified = bullets.filter(b => isQuantifiedBullet(b)).length;
  const longBullets = bullets.filter(b => b.split(/\s+/).length > 38).length;
  const weakStarts = bullets.filter(b => /^(responsible for|was responsible for|worked on|helped|assisted|participated|involved in|was involved in|in charge of|handled|dealt with|contributed to|took part in|oversaw the|duties included|tasked with|successfully)\b/i.test(b.trim())).length;
  const missingAction = bullets.filter(b => !/^(analyzed|built|developed|created|led|managed|delivered|presented|quantified|implemented|engineered|recruited|coordinated|selected|conceptualized|authored|improved|identified|recommended|applied|designed|supported|evaluated|collaborated|organized|executed|optimized|translated|documented|spearheaded|launched|negotiated|researched|trained|streamlined|reduced|increased|generated|achieved|conducted|facilitated|founded|initiated|produced|secured|automated|redesigned|mentored|drafted|tested|deployed|maintained|configured|resolved|established|expanded|forecasted|modeled|programmed|published|spearhead|won|wrote)/i.test(b.trim())).length;
  const score = bullets.length
    ? Math.max(40, Math.min(100, Math.round(100 - longBullets * 5 - weakStarts * 8 - Math.max(0, bullets.length - quantified) * 2 - Math.min(missingAction, 4) * 3)))
    : 50;

  const notes = [];
  if (!entries.length) notes.push("No experience entries detected.");
  if (quantified < Math.ceil(bullets.length / 2) && bullets.length) notes.push("Add more numbers, scope, or outcomes where accurate.");
  if (longBullets) notes.push(longBullets + " bullet" + (longBullets === 1 ? "" : "s") + " may be too long.");
  if (weakStarts) notes.push("Replace weak starts such as “Responsible for” or “Helped” with stronger action verbs.");
  if (missingAction) notes.push("Some bullets may need stronger action verbs.");

  try {
    const bd = analyzeBulletDensity(data);
    bd.notes.slice(0, 3).forEach(n => { if (!notes.includes(n)) notes.push(n); });
  } catch (e) {}
  return { entries: entries.length, bullets: bullets.length, quantified, longBullets, weakStarts, missingAction, score, notes };
}

// ---- Verb-tense consistency (Coach Jeff eval Section 8 — highest-impact fix) ----
// Flags the most common and most credibility-damaging error on new-grad resumes:
// a bullet that opens in past tense but slips into present tense mid-sentence
// ("Built ... cuts processing time", "Architected ... enabled ... and cuts ...").
// Conservative by design — it only flags a clear past→present slip so it never
// nags a candidate who is legitimately describing a current, ongoing role.
function analyzeVerbTense(data) {
  // Verbs that, in "-s" form, are almost always present-tense slips on a resume
  // (not plural nouns). We match a whitelist to avoid false hits on words like
  // "systems", "analytics", "operations", "metrics".
  const PRESENT_S = /\b(cuts|reduces|increases|improves|builds|creates|develops|designs|manages|leads|delivers|implements|drives|enables|supports|maintains|handles|processes|generates|streamlines|optimizes|automates|analyzes|coordinates|oversees|produces|provides|boosts|saves|grows|adds|removes|updates|monitors|tracks|ensures|allows|helps|makes|takes|gives|runs|sets|keeps|holds|serves|meets|leads|owns)\b/i;
  // A leading past-tense action verb (regular -ed or common irregulars).
  const PAST_LEAD = /^(\w+ed|built|led|drove|made|took|gave|ran|set|kept|held|wrote|grew|won|met|oversaw|spearheaded|began|chose|brought|taught|sought)\b/i;
  const isMetaLine = t => /^\s*(tools?|tech|technologies|stack|built with|skills used|methods?)\s*[:|]/i.test(t);

  const entries = (data.experience || []).filter(e => e && (e.title || e.org || (e.bullets || []).some(Boolean)));
  const bullets = entries.flatMap(e => (e.bullets || []).filter(Boolean));
  const flagged = [];
  bullets.forEach(raw => {
    const t = String(raw || "").trim().replace(/^[•\-\u2013\u2014\s]+/, "");
    if (!t || isMetaLine(t)) return;
    const pastLead = PAST_LEAD.test(t);
    // Look for a present-tense "-s" verb AFTER the first word.
    const afterLead = t.replace(/^\S+\s*/, "");
    const slip = PRESENT_S.exec(afterLead);
    if (pastLead && slip) {
      flagged.push({ text: t, verb: slip[0].toLowerCase() });
    }
  });
  const total = bullets.length;
  const count = flagged.length;
  // Score: heavy penalty because this is the single most visible error to a
  // careful reviewer, mirroring the manual eval's 2/5 when tense is inconsistent.
  let score = 100;
  if (count === 1) score = 82;
  else if (count === 2) score = 68;
  else if (count >= 3) score = 55;
  const notes = [];
  if (count) {
    const uniqVerbs = [...new Set(flagged.map(f => f.verb))].slice(0, 3);
    const sample = uniqVerbs.map(v => "\u201C" + v + "\u201D").join(", ");
    notes.push(count + " experience bullet" + (count === 1 ? "" : "s") +
      " mix" + (count === 1 ? "es" : "") + " past and present tense (e.g. " + sample +
      "). Because these describe completed work, convert them to simple past (\u201Ccuts\u201D \u2192 \u201Ccut\u201D).");
  }

  // ---- Verb inflation pass (manual eval §8) ----
  // Flags "big leadership" verbs used on work that reads as solo. This is a
  // credibility check (scope vs. verb), distinct from tense consistency above.
  // Leadership verbs that imply directing others or ground-up ownership.
  const INFLATED = /^(spearheaded|architected|pioneered|orchestrated|championed|masterminded|helmed|led)\b/i;
  // Signals within a bullet or its entry that a real team/leadership scope exists,
  // which would justify the strong verb and suppress the flag.
  const TEAM_SIGNAL = /\b(team|teams|engineers?|developers?|analysts?|interns?|reports?|direct reports?|people|members?|committee|cross[- ]functional|stakeholders?|volunteers?|staff|colleagues?|club|chapter|cohort|group of \d+|\d+\s*(?:person|member|engineer|people))\b/i;
  const isMetaLineInfl = t => /^\s*(tools?|tech|technologies|stack|built with|skills used|methods?)\s*[:|]/i.test(t);

  const inflated = [];
  const scanForInflation = (bulletList, soloByDefault) => {
    (bulletList || []).forEach(raw => {
      const t = String(raw || "").trim().replace(/^[•\-\u2013\u2014\s]+/, "");
      if (!t || isMetaLineInfl(t)) return;
      const m = INFLATED.exec(t);
      if (!m) return;
      // Suppress when the bullet itself names a team/leadership scope.
      if (TEAM_SIGNAL.test(t)) return;
      // Experience bullets are only "solo" when nothing in the entry implies a team;
      // project bullets are treated as solo unless the bullet names a team.
      if (soloByDefault) {
        inflated.push({ text: t, verb: m[0].toLowerCase() });
      }
    });
  };

  // Experience: flag only entries with no team/report signal anywhere in the entry.
  entries.forEach(e => {
    const entryText = [(e.title || ""), (e.org || ""), ...((e.bullets || []))].join(" ");
    const entryHasTeam = TEAM_SIGNAL.test(entryText);
    scanForInflation(e.bullets, !entryHasTeam);
  });
  // Projects: solo by default (the classic inflated-verb case in the manual eval).
  const projectEntries = (data.projects || []).filter(p => p && (p.name || (p.bullets || []).some(Boolean)));
  projectEntries.forEach(p => scanForInflation(p.bullets, true));

  const inflatedCount = inflated.length;
  if (inflatedCount) {
    const uniqInfl = [...new Set(inflated.map(f => f.verb))].slice(0, 3);
    const sampleInfl = uniqInfl.map(v => "\u201C" + v.charAt(0).toUpperCase() + v.slice(1) + "\u201D").join(", ");
    notes.push(inflatedCount + " bullet" + (inflatedCount === 1 ? "" : "s") +
      " use" + (inflatedCount === 1 ? "s" : "") + " a strong leadership verb (" + sampleInfl +
      ") on work that reads as solo. Reserve these for genuine leadership or ground-up design; \u201CBuilt/Designed/Developed\u201D reads as more credible on individual work.");
  }

  return { count, total, score, flagged: flagged.slice(0, 5), notes, inflatedCount, inflated: inflated.slice(0, 5) };
}

// ---- Run-on / comma-chained bullet detection (Coach Jeff eval Section 7) ----
// Catches bullets that chain multiple outcomes with commas, which buries the
// strongest metric. Flags a bullet as run-on when it is long AND stacks 2+
// result clauses joined by commas ("...cuts time 60%, streamlined workflows,
// improved efficiency 40%").
function analyzeRunOnBullets(data) {
  const isMetaLine = t => /^\s*(tools?|tech|technologies|stack|built with|skills used|methods?)\s*[:|]/i.test(t);
  const entries = (data.experience || []).filter(e => e && (e.title || e.org || (e.bullets || []).some(Boolean)));
  const projects = (data.projects || []).filter(p => p && (p.name || (p.bullets || []).some(Boolean)));
  const bullets = [
    ...entries.flatMap(e => (e.bullets || []).filter(Boolean)),
    ...projects.flatMap(p => (p.bullets || []).filter(Boolean))
  ];
  const flagged = [];
  bullets.forEach(raw => {
    const t = String(raw || "").trim().replace(/^[•\-\u2013\u2014\s]+/, "");
    if (!t || isMetaLine(t)) return;
    const words = t.split(/\s+/).length;
    const commas = (t.match(/,/g) || []).length;
    // 2+ commas and reasonably long, OR 3+ commas at any length = a chain.
    if ((commas >= 2 && words >= 18) || commas >= 3) {
      flagged.push(t);
    }
  });
  const count = flagged.length;
  let score = 100;
  if (count === 1) score = 88;
  else if (count === 2) score = 78;
  else if (count >= 3) score = 68;
  const notes = [];
  if (count) {
    notes.push(count + " bullet" + (count === 1 ? "" : "s") +
      " chain" + (count === 1 ? "s" : "") +
      " several outcomes with commas, which dilutes your strongest number. Lead each bullet with the single most impressive result and move or drop the rest.");
  }
  return { count, score, flagged: flagged.slice(0, 4), notes };
}

// ---- Metric density (manual eval §10, §21, Risk Flag #1) ----
// The comma-chain check above catches list-style run-ons; this catches the
// OTHER density problem the manual audit flags: a single bullet packing multiple
// distinct quantified claims ("three quantified claims in a single line"), which
// tires the eye and buries the strongest number. The coaching fix is "one
// headline metric per bullet." We count DISTINCT metrics, treating a before→after
// range ("from 72% to 98%") as a single claim so we never penalize good writing.
function analyzeMetricDensity(data) {
  const isMetaLine = t => /^\s*(tools?|tech|technologies|stack|built with|skills used|methods?)\s*[:|]/i.test(t);
  const entries = (data.experience || []).filter(e => e && (e.title || e.org || (e.bullets || []).some(Boolean)));
  const projects = (data.projects || []).filter(p => p && (p.name || (p.bullets || []).some(Boolean)));
  const bullets = [
    ...entries.flatMap(e => (e.bullets || []).filter(Boolean)),
    ...projects.flatMap(p => (p.bullets || []).filter(Boolean))
  ];

  const countMetrics = (raw) => {
    let t = String(raw || "");
    // Collapse before→after ranges to a single token so "from 72% to 98%",
    // "72%-98%", "72 to 98%" count as ONE claim, not two.
    t = t.replace(/\bfrom\s+\d+(\.\d+)?%?\s+to\s+\d+(\.\d+)?%?/gi, " RANGE ");
    t = t.replace(/\b\d+(\.\d+)?%?\s*(?:[-\u2013\u2014]|to)\s*\d+(\.\d+)?%/gi, " RANGE ");
    // Single combined metric matcher. Order matters: the more specific "sub-100ms"
    // alternative is tried before the bare "100ms" one, and we walk the string with
    // a global regex so overlapping spans are consumed once (no double-counting a
    // number that satisfies two patterns).
    const metricRe = /\bsub-\s*\d+\s*[a-z]{1,3}\b|\d+(?:\.\d+)?\s*%|\d+(?:\.\d+)?\s*(?:ms|x|k\+?|m\+?|gb|tb|mb|fps|rps|qps)\b|\d{2,}\s*\+|\bRANGE\b/gi;
    const matches = t.match(metricRe) || [];
    return matches.length;
  };

  const flagged = [];
  bullets.forEach(raw => {
    const t = String(raw || "").trim().replace(/^[•\-\u2013\u2014\s]+/, "");
    if (!t || isMetaLine(t)) return;
    const metrics = countMetrics(t);
    if (metrics >= 3) flagged.push({ text: t, metrics }); // 3+ distinct claims = overload
  });
  const count = flagged.length;
  let score = 100;
  if (count === 1) score = 90;
  else if (count === 2) score = 82;
  else if (count >= 3) score = 72;
  const notes = [];
  if (count) {
    notes.push(count + " bullet" + (count === 1 ? "" : "s") +
      " pack" + (count === 1 ? "s" : "") + " three or more separate numbers into one line, which tires the eye and buries your strongest result. Keep one headline metric per bullet and move or drop the rest.");
  }
  return { count, score, flagged: flagged.slice(0, 4), notes };
}

// ---- Summary quality (manual eval §13) ----
// Reads the ACTUAL summary text and flags the specific weaknesses the manual
// audit calls out — rather than a generic "rewrite this." Findings: buzzword
// density, missing article ("bridging gap" -> "bridging the gap"), abstraction
// with no concrete proof point (no number/metric), first-person filler, and
// length problems. Each finding names the exact phrase so the fix is obvious.
function analyzeSummaryQuality(data) {
  const summary = String(data.summary || "").trim();
  const findings = [];
  const suggestions = [];
  if (summary.length < 40) {
    return {
      present: summary.length > 0,
      findings: summary.length ? ["Your summary is very short — expand it to 2–3 lines that name your target role, top strengths, and one concrete proof point."] : [],
      suggestions: [],
      hasMetric: false,
      score: summary.length ? 70 : 55,
      count: summary.length ? 1 : 0
    };
  }

  const words = summary.split(/\s+/).filter(Boolean);
  const wordCount = words.length;

  // (1) Buzzword / abstraction density. These read as impressive but say little;
  // the manual audit flags exactly this ("sound impressive but say little concrete").
  const BUZZWORDS = /\b(proven track record|results?-driven|detail-oriented|team player|hard-working|hardworking|go-getter|self-starter|passionate|dynamic|synergy|leverage|leveraging|cutting-edge|state-of-the-art|world-class|best-in-class|thought leader|game-changer|value-add|move the needle|deep expertise|expert in|seasoned|highly motivated|extensive experience|track record|end-to-end lifecycle|high-availability|production-grade|robust|scalable solutions|real-time solutions)\b/gi;
  const buzzHits = [...new Set((summary.match(BUZZWORDS) || []).map(s => s.toLowerCase()))];
  if (buzzHits.length >= 2) {
    findings.push("Your summary leans on buzzwords that sound impressive but say little concrete: " +
      buzzHits.slice(0, 3).map(b => "\u201C" + b + "\u201D").join(", ") +
      ". Replace one or two with a specific, verifiable result.");
  }

  // (2) Missing article before "gap" — the manual audit's exact §13 catch
  // ("bridging gap" -> "bridging the gap"). Also common: "bridge gap".
  if (/\bbridg(?:ing|e)\s+gap\b/i.test(summary)) {
    findings.push("Small grammar slip: \u201Cbridging gap\u201D is missing an article \u2014 write \u201Cbridging the gap.\u201D");
  }
  // A couple of other frequent missing-article patterns in summaries. Skip the
  // "lifecycle" article nudge if we already flagged "end-to-end lifecycle" as a
  // buzzword above, to avoid two findings pointing at the same phrase.
  const lifecycleAlreadyFlagged = buzzHits.includes("end-to-end lifecycle");
  if (!lifecycleAlreadyFlagged && /\b(specializing in|focus on|expert in)\s+(?:end-to-end\s+)?lifecycle\b/i.test(summary)) {
    findings.push("\u201Clifecycle\u201D needs an article \u2014 e.g. \u201Cthe end-to-end lifecycle of ...\u201D reads more naturally.");
  }

  // (3) No concrete proof point. A strong summary carries at least one number,
  // percentage, or hard credential (GPA, years). Its absence is the manual
  // audit's "no specific hook" note.
  const hasMetric = /\b\d+(\.\d+)?\s*%|\b\d{2,}\b|\bGPA\b|\b\d+\+?\s*(years?|yrs?)\b/i.test(summary);
  if (!hasMetric) {
    findings.push("Your summary states what you do but offers no concrete hook \u2014 no metric, GPA, years, or standout result. Add one proof point (e.g. a headline number from your best bullet) so the opening lands.");
  }

  // (4) First-person filler / weak openers.
  if (/^\s*(i\s+am|i'm|as a|seeking|looking for|motivated|hardworking)\b/i.test(summary)) {
    findings.push("Open with your professional identity and value, not \u201CI am\u201D or \u201Cseeking\u201D \u2014 lead with the role and a proof point.");
  }

  // (5) Length: too long buries the point; the sweet spot is ~2–3 lines.
  if (wordCount > 70) {
    findings.push("Your summary runs long (" + wordCount + " words). Tighten to 2\u20133 lines so a recruiter absorbs it in one glance.");
  }

  if (findings.length) {
    suggestions.push("Lead with what you are, add one concrete proof point, and cut the abstraction. Example shape: \u201C[Role/credential] who [does X] \u2014 [headline metric or result].\u201D");
  }

  let score = 92;
  score -= Math.min(30, findings.length * 8);
  if (!hasMetric) score -= 4;
  score = Math.max(55, score);

  return { present: true, findings: findings.slice(0, 5), suggestions, hasMetric, score, count: findings.length };
}
// 16, 19, 22, 24). These run on the RAW resume text rather than the parsed
// structure, so they stay reliable even when section parsing mis-buckets a
// bullet. Every finding is grounded in something literally present on the
// page — the tool never claims what it can't see.
// ============================================================================

// Return the best available raw resume text for text-level scanning. Prefers
// the untouched imported text; falls back to text reconstructed from the
// structured builder data so typed-in resumes are covered too.
function resumeScanText(data, rawImportText) {
  const raw = String(rawImportText || "").trim();
  if (raw.length > 40) return raw;
  return collectResumeText(data);
}

// ---- 1. Mechanics pass (Sections 6 & 7): typos a careful recruiter catches ----
// Detects the specific, high-signal credibility errors from the manual eval:
// missing hyphen in common compounds ("faulttolerant"), double periods,
// brand-casing ("Linkedin"/"Github"), and mid-name "Of" capitalization
// ("University Of"). Conservative patterns — each targets a real, common error
// rather than guessing, so false positives stay low.
function analyzeMechanics(data, rawImportText) {
  const text = resumeScanText(data, rawImportText);
  const findings = [];
  const seen = new Set();
  const add = (label, detail, example) => {
    const key = label + "|" + (example || "");
    if (seen.has(key)) return;
    seen.add(key);
    findings.push({ label, detail, example: example || "" });
  };

  // (a) Missing-hyphen compounds. These read as typos and are quick wins.
  const COMPOUND = [
    ["faulttolerant", "fault-tolerant"],
    ["realtime", "real-time"],
    ["fullstack", "full-stack"],
    ["frontend", "front-end"],
    ["backend", "back-end"],
    ["endtoend", "end-to-end"],
    ["opensource", "open-source"],
    ["multithreaded", "multi-threaded"],
    ["costeffective", "cost-effective"],
    ["datadriven", "data-driven"],
    ["decisionmaking", "decision-making"],
    ["problemsolving", "problem-solving"]
  ];
  COMPOUND.forEach(([bad, good]) => {
    // Match the run-together form as a whole word, case-insensitive. "backend"
    // and "frontend" are widely accepted, so only flag them softly (still a
    // house-style nudge, not a hard error) by grouping them under the same fix.
    const re = new RegExp("\\b" + bad + "\\b", "i");
    if (re.test(text)) add(
      "Hyphenation",
      "\u201C" + bad + "\u201D reads as a typo to a careful reviewer \u2014 use \u201C" + good + "\u201D.",
      bad + " \u2192 " + good
    );
  });

  // (b) Double period / stray double punctuation (not ellipsis "...").
  if (/[A-Za-z0-9%)][.]\s*[.](?!\.)/.test(text) || /[A-Za-z0-9%)]\.\.(?!\.)/.test(text)) {
    add("Punctuation", "There's a double period (\u201C..\u201D) on the page. Remove the extra period.", "..  \u2192  .");
  }
  // Space-before-punctuation and doubled commas — small but recruiter-visible.
  if (/\s[,;.](?=\s|$)/.test(text)) add("Punctuation", "A space appears before a comma or period somewhere \u2014 close it up.", " ,  \u2192  ,");
  if (/,,/.test(text)) add("Punctuation", "A doubled comma (\u201C,,\u201D) appears on the page. Remove the extra comma.", ",,  \u2192  ,");

  // (c) Brand casing: LinkedIn / GitHub. Only flag the wrong casing.
  if (/\bLinkedin\b/.test(text) || /\blinkedIn\b/.test(text.replace(/\blinkedin\.com/gi, ""))) {
    if (/\bLinkedin\b/.test(text)) add("Brand casing", "\u201CLinkedin\u201D should be \u201CLinkedIn\u201D (capital I).", "Linkedin \u2192 LinkedIn");
  }
  if (/\bGithub\b/.test(text)) add("Brand casing", "\u201CGithub\u201D should be \u201CGitHub\u201D (capital H).", "Github \u2192 GitHub");

  // (d) Mid-name capitalization: "University Of", "College Of", "Institute Of".
  if (/\b(University|College|Institute|School|Department|Bureau)\s+Of\b/.test(text)) {
    add("Capitalization", "In a proper name, \u201COf\u201D should be lowercase (e.g. \u201CUniversity of ...\u201D).", "University Of \u2192 University of");
  }
  // "And" mid-name is the same class of error.
  if (/\b[A-Z][a-z]+\s+And\s+[A-Z][a-z]+/.test(text) && /\b(University|College|Institute|School|Department)\b/.test(text)) {
    add("Capitalization", "Check mid-name \u201CAnd\u201D \u2014 it's usually lowercase inside a proper name (\u201C... and ...\u201D).", "And \u2192 and");
  }

  // (e) Common word-form typos in resume/coursework context. "Advance" is a real
  // word, so only flag it when used as an adjective before a subject noun
  // (e.g. "Advance Machine Learning" should be "Advanced ..."). This mirrors the
  // manual audit's §6 catch and avoids false hits on "advance the project".
  if (/\bAdvance\s+(Machine\s+Learning|Statistics|Calculus|Algorithms?|Data|Database|Programming|Python|Analytics|Mathematics|Economics|Accounting|Physics|Financial|Computer)\b/.test(text)) {
    add("Word form", "\u201CAdvance\u201D should be \u201CAdvanced\u201D before a course/subject name (e.g. \u201CAdvanced Machine Learning\u201D).", "Advance \u2192 Advanced");
  }
  // A few other high-frequency resume misspellings, matched as whole words.
  const WORD_TYPOS = [
    ["Manangement", "Management"],
    ["Managment", "Management"],
    ["Enviroment", "Environment"],
    ["Responsibilites", "Responsibilities"],
    ["Acheived", "Achieved"],
    ["Recieved", "Received"],
    ["Collaboratation", "Collaboration"],
    ["Developement", "Development"],
    ["Sucessful", "Successful"],
    ["Analyis", "Analysis"]
  ];
  WORD_TYPOS.forEach(([bad, good]) => {
    if (new RegExp("\\b" + bad + "\\b", "i").test(text)) {
      add("Spelling", "\u201C" + bad + "\u201D looks like a typo \u2014 did you mean \u201C" + good + "\u201D?", bad + " \u2192 " + good);
    }
  });

  let score = 100;
  if (findings.length === 1) score = 88;
  else if (findings.length === 2) score = 78;
  else if (findings.length >= 3) score = Math.max(60, 78 - (findings.length - 2) * 6);

  const notes = [];
  if (findings.length) {
    const list = findings.slice(0, 4).map(f => f.example || f.detail).join("; ");
    notes.push(findings.length + " small mechanical error" + (findings.length === 1 ? "" : "s") +
      " that a careful recruiter will notice: " + list + ". These are fast fixes, but each one quietly signals carelessness \u2014 clean them up before you apply.");
  }
  return { findings: findings.slice(0, 8), count: findings.length, score, notes };
}

// ---- 2. Metric credibility (Sections 14 & 21): can you defend this number? ----
// Flags metrics that read as invented or unverifiable so the candidate can
// soften or anchor them BEFORE a recruiter mentally discounts the whole resume.
// Targets absolute perfection claims (100%, 99.9%) and synthetic-context metrics
// (metrics attached to "simulated"/"synthetic"/personal-project language).
function analyzeMetricCredibility(data, rawImportText) {
  const isMetaLine = t => /^\s*(tools?|tech|technologies|stack|built with|skills used|methods?)\s*[:|]/i.test(String(t || "").trim());
  const bullets = [
    ...(data.experience || []).flatMap(e => (e.bullets || [])),
    ...(data.projects || []).flatMap(p => (p.bullets || []))
  ].map(b => String(b || "").trim()).filter(b => b && !isMetaLine(b));

  // If parsing collapsed the bullets, fall back to sentence-splitting raw text.
  let units = bullets;
  if (units.length < 2) {
    const text = resumeScanText(data, rawImportText);
    units = text.split(/(?:[.;]\s+|\n)/).map(s => s.trim()).filter(s => s.length > 20 && /\d/.test(s));
  }

  const flagged = [];
  const seen = new Set();
  const push = (text, reason) => {
    const key = text.slice(0, 60);
    if (seen.has(key)) return;
    seen.add(key);
    flagged.push({ text: text.length > 140 ? text.slice(0, 137) + "\u2026" : text, reason });
  };

  units.forEach(b => {
    // Absolute-perfection claims that recruiters distrust.
    if (/\b100\s*%/.test(b) && !/\b100\s*%\s*(of\s+the\s+)?(test|unit)?\s*coverage/i.test(b)) {
      push(b, "\u201C100%\u201D reads as an absolute claim. Soften to what you can prove (e.g. \u201Cstrong/consistent\u2026\u201D or name the measurement).");
    }
    if (/\b99\.9+\s*%/.test(b) || /\b99\s*%\s*uptime/i.test(b)) {
      push(b, "\u201C99.9% uptime\u201D on a personal or academic project reads as inflated. Say \u201Cin local stress testing\u201D or drop the figure.");
    }
    // High-precision percentage improvements with no measurement context.
    const pctImp = b.match(/\b(\d{2,3})\s*%\s*(improve|increase|reduc|decreas|boost|faster|gain|growth|optimi)/i);
    if (pctImp) {
      const n = parseInt(pctImp[1], 10);
      const hasContext = /(benchmark|measured|tracked|A\/B|baseline|from\s+\d|to\s+\d|over\s+\d|in\s+testing|in\s+simulation)/i.test(b);
      if (n >= 30 && !hasContext) {
        push(b, "A " + n + "% improvement with no baseline or measurement reads as a guess. Anchor it (\u201C~" + n + "% in benchmark tests\u201D) or explain how you measured it.");
      }
    }
    // Metrics attached to simulated / synthetic work stated as if real.
    if (/(simulat|synthetic|mock|dummy|local\s+stress|personal\s+project)/i.test(b) && /\d/.test(b) && /(uptime|consistency|accuracy|throughput|latency|requests|users|traffic)/i.test(b)) {
      push(b, "This number comes from simulated/synthetic conditions \u2014 state that explicitly (\u201Cin simulation\u201D / \u201Cin local benchmarks\u201D) so it reads as honest, not inflated.");
    }
  });

  const count = flagged.length;
  let score = 100;
  if (count === 1) score = 86;
  else if (count === 2) score = 74;
  else if (count >= 3) score = Math.max(58, 74 - (count - 2) * 6);

  const notes = [];
  if (count) {
    notes.push(count + " metric" + (count === 1 ? "" : "s") +
      " on your resume may read as invented or unverifiable to a recruiter. The fix isn't to remove numbers \u2014 it's to make each one defensible: anchor it to how you measured it, or soften absolute claims. If you can't explain a figure end-to-end in an interview, soften or cut it.");
  }
  return { flagged: flagged.slice(0, 5), count, score, notes };
}

// ---- 3. Title-vs-content mismatch (Section 15) ----
// Catches a role titled e.g. "Machine Learning Engineer Intern" whose bullets
// describe only unrelated work (APIs, pipelines) — an ATS-keyword and
// interview-risk problem the manual eval flags explicitly.
function analyzeTitleContentMatch(data) {
  const ROLE_KEYWORDS = {
    "machine learning|ml engineer|ml intern|deep learning": /\b(model|training|trained|neural|tensor|pytorch|scikit|sklearn|inference|classifier|regression|nlp|computer vision|ml\b|machine learning|dataset|feature engineering|fine-tun)\b/i,
    "data scien|data analyst": /\b(model|regression|statistic|hypothesis|dataset|pandas|numpy|visualiz|dashboard|sql|analy|forecast|cluster|a\/b)\b/i,
    "front[- ]?end|ui engineer|ux engineer": /\b(react|vue|angular|css|html|component|responsive|ui|ux|frontend|front-end|accessibility|dom|typescript)\b/i,
    "devops|site reliability|sre|cloud engineer": /\b(kubernetes|docker|terraform|ci\/cd|pipeline|aws|gcp|azure|deploy|infrastructure|monitoring|ansible)\b/i,
    "security|infosec": /\b(vulnerab|penetration|encryption|threat|owasp|siem|firewall|authentication|secure|security)\b/i
  };
  const entries = (data.experience || []).filter(e => e && (e.title || (e.bullets || []).some(Boolean)));
  const flagged = [];
  entries.forEach(e => {
    const title = String(e.title || "").toLowerCase();
    const body = (e.bullets || []).join(" ");
    if (!body.trim()) return;
    for (const rolePat in ROLE_KEYWORDS) {
      if (new RegExp(rolePat, "i").test(title)) {
        if (!ROLE_KEYWORDS[rolePat].test(body)) {
          flagged.push({
            title: e.title || "This role",
            note: "Your \u201C" + (e.title || "role") + "\u201D title isn't backed by matching content in its bullets. Add one bullet that shows the core work the title implies, or adjust the title to match what you actually did \u2014 otherwise it confuses ATS keyword matching and invites interview questions you may not want."
          });
        }
        break;
      }
    }
  });
  const count = flagged.length;
  let score = count === 0 ? 100 : count === 1 ? 80 : 66;
  const notes = flagged.map(f => f.note);
  return { flagged: flagged.slice(0, 3), count, score, notes };
}

// ---- 4. Section-quality nudges (Sections 16, 19, 22) ----
// Content-quality checks the parser-based path misses: GPA threshold, ambiguous
// university campus, cert-gap vs. heavily-listed cloud skills, and buried awards.
function analyzeSectionQuality(data, rawImportText) {
  const text = resumeScanText(data, rawImportText);
  const notes = [];

  // (a) GPA threshold. If a GPA is present and >= 3.5, affirm listing it; if a
  // GPA is present but < 3.0, gently note that omitting it is an option.
  const gpaMatch = text.match(/\bgpa\b[\s:]*([0-4](?:\.\d{1,2})?)\s*(?:\/\s*([45](?:\.0)?))?/i);
  if (gpaMatch) {
    const gpa = parseFloat(gpaMatch[1]);
    const scale = gpaMatch[2] ? parseFloat(gpaMatch[2]) : 4;
    const norm = scale >= 5 ? (gpa / scale) * 4 : gpa;
    if (norm >= 3.5) notes.push({ kind: "good", text: "Your GPA (" + gpaMatch[1] + (gpaMatch[2] ? "/" + gpaMatch[2] : "") + ") is above the 3.5 bar recruiters look for \u2014 keep it on the resume; it's an asset." });
    else if (norm < 3.0) notes.push({ kind: "tip", text: "A GPA below ~3.0 is optional to list. If your projects and experience are strong, you can omit it and let them carry the resume." });
  }

  // (b) Ambiguous university campus (state-system schools with multiple campuses).
  // Case-insensitive on "of" so "University Of Massachusetts" is caught too.
  const AMBIG = /\bUniversity [Oo]f (Massachusetts|California|Texas|Illinois|Wisconsin|Colorado|Michigan|Minnesota|Maryland|Missouri|Washington|North Carolina|South Carolina)\b(?!\s+(?:at\s+)?[A-Z][a-z]|[- ]?(?:Amherst|Berkeley|Austin|Dallas|Chicago|Madison|Boulder|Ann Arbor|Twin Cities|College Park|Seattle|Chapel Hill|Columbia|Lowell|Boston|Dartmouth|San Diego|Los Angeles|Irvine|Davis|Riverside))/;
  const am = text.match(AMBIG);
  if (am) notes.push({ kind: "tip", text: "\u201C" + am[0] + "\u201D is ambiguous \u2014 that system has several campuses. Name yours (e.g. \u201C" + am[0] + " Amherst\u201D) so recruiters and ATS place it correctly." });

  // (c) Cert gap vs. heavily-listed cloud skills.
  const listsAWS = /\bAWS\b/i.test(text);
  const listsAzure = /\bAzure\b/i.test(text);
  const listsGCP = /\b(GCP|Google Cloud)\b/i.test(text);
  const hasCloudCert = /\b(AWS Certified|Solutions Architect|Cloud Practitioner|Azure Fundamentals|AZ-\d|Professional Cloud|Google Cloud Certified)\b/i.test(text);
  const cloudMentions = (listsAWS ? 1 : 0) + (listsAzure ? 1 : 0) + (listsGCP ? 1 : 0);
  const awsCount = (text.match(/\bAWS\b/gi) || []).length;
  if ((cloudMentions && awsCount >= 3 && !hasCloudCert)) {
    notes.push({ kind: "tip", text: "You lean on cloud skills (AWS appears " + awsCount + "\u00D7) but list no cloud certification. An AWS Cloud Practitioner or Solutions Architect Associate turns a listed skill into verifiable proof \u2014 a real differentiator for cloud-focused roles. Only add it once earned (\u201Cin progress\u201D is fine)." });
  }

  // (d) Buried awards: an award/honor mentioned inside education/experience text
  // rather than surfaced. Detects distinguished honors that deserve visibility.
  const awardMention = /\b(Distinguished|Dean's List|President's List|Valedictorian|Summa Cum Laude|Magna Cum Laude|Cum Laude|Leadership (Medal|Award)|First Place|1st Place|Hackathon Winner|Scholarship|Fellowship|Honor(s|able)|Award|Medal)\b/i;
  const hasAwardsSection = (data.awards || []).some(a => String((a && a.name) || "").trim().length > 3);
  if (!hasAwardsSection && awardMention.test(text)) {
    const m = text.match(awardMention);
    notes.push({ kind: "tip", text: "You mention an honor (\u201C" + (m ? m[0] : "award") + "\u201D) but don't have a dedicated Awards line. A standout award is a genuine differentiator \u2014 give it its own line so it isn't buried." });
  }

  const tips = notes.filter(n => n.kind === "tip");
  let score = 100 - Math.min(30, tips.length * 8);
  return { notes, tips, goodNotes: notes.filter(n => n.kind === "good"), count: tips.length, score };
}

// ---- 5. File-naming convention (Section 24) ----
// A quick-win coaching nudge: recommend FirstName_LastName_Resume_Role.pdf.
function analyzeFileNaming(data, importedFileName) {
  const name = String(importedFileName || "").trim();
  if (!name) return { note: "", ok: null };
  const base = name.replace(/\.(pdf|docx?|txt)$/i, "");
  const looksGood = /^[A-Z][a-z]+[_ ][A-Z][a-z]+.*resume/i.test(base) || /resume/i.test(base) && /_/.test(base);
  const generic = /^(resume|cv|my ?resume|final|document|untitled|new)\b/i.test(base) || base.length < 4;
  const first = (String(data.name || "").trim().split(/\s+/)[0] || "FirstName");
  const last = (String(data.name || "").trim().split(/\s+/).slice(-1)[0] || "LastName");
  const suggested = first + "_" + last + "_Resume_" + (String(data.field || "Role").replace(/[^A-Za-z]/g, "") || "Role") + ".pdf";
  if (generic || !looksGood) {
    return {
      ok: false,
      note: "Save your file as " + suggested + " (FirstName_LastName_Resume_Role). Generic names like \u201C" + name + "\u201D are harder for a recruiter to file and find later.",
      suggested
    };
  }
  return { ok: true, note: "", suggested };
}

// ---- 6. Honest parser-limitation disclosure ----
// The tool reads parsed TEXT, not the rendered page, so it cannot see margins,
// exact font sizes, line-level spacing/density, or word-breaks. Rather than
// stay silent (and let a student assume those were checked), we say so plainly
// and point them to the one human-eye pass that still matters.
function parserLimitationNote() {
  return {
    title: "What this tool can't check (do a 30-second human-eye pass)",
    items: [
      "Page margins vs. the 0.75\u2033 standard \u2014 open the file and confirm nothing runs edge-to-edge.",
      "Exact font sizes and the name/heading hierarchy (name ~20pt bold, headings ~13pt, body 11pt).",
      "White space and visual density \u2014 add ~6pt between entries and ~12pt between sections so the page can breathe.",
      "Words broken across lines (e.g. a hyphen splitting a term mid-line) \u2014 these only show in the rendered layout.",
      "That the exported PDF has selectable text (not a scanned image), so ATS can read it."
    ],
    why: "This optimizer analyzes your resume's text, not its printed layout, so these visual details need a quick look from you. Everything above is a 30-second check that catches the last things a recruiter sees before you do."
  };
}

// ---- Category scorecard + market-readiness classification ----
// Condenses the manual eval's 32-section scorecard into 6 recruiter-facing
// categories plus a NEAR-READY / MARKET-READY / NEEDS-WORK tier, so the
// automated report tells a student WHERE they're weak, not just an overall %.
function buildResumeScorecard(data, resumeStrength, verbTense, runOn, mechanics, metricCred) {
  const rs = resumeStrength || {};
  const exp = rs.exp || {};
  const skills = rs.skills || {};
  const order = rs.order || {};
  const hasSummary = String(data.summary || "").trim().length > 80;
  const expBullets = exp.bullets || 0;
  const expQuant = exp.quantified || 0;

  const clamp = n => Math.max(20, Math.min(100, Math.round(n)));
  const pct = n => n; // scores are already 0–100

  // Metric-credibility findings pull down the Content score, because an
  // inflated-looking number damages content credibility more than a missing one.
  const metricPenalty = metricCred ? Math.min(22, (metricCred.count || 0) * 8) : 0;
  const contentScore = clamp(
    (expBullets ? 55 + Math.round((expQuant / Math.max(1, expBullets)) * 45) : 60) - metricPenalty
  );
  const skillsScore = clamp(typeof skills.score === "number" ? skills.score : 75);
  const atsScore = clamp((typeof rs.overall === "number" ? rs.overall : 75));
  const tenseScore = clamp(verbTense ? verbTense.score : 100);
  const orderScore = clamp(order.mismatch ? 72 : 92);
  const summaryScore = clamp(hasSummary ? 90 : 55);
  // Mechanics (typos, casing, punctuation) belong to Formatting & Polish along
  // with run-on bullets — both are "does this read clean" signals.
  const formattingScore = clamp(Math.round(((runOn ? runOn.score : 100) * 0.5) + ((mechanics ? mechanics.score : 100) * 0.5)));

  const categories = [
    { key: "Content & Quantification", score: contentScore },
    { key: "Skills Depth & Relevance", score: skillsScore },
    { key: "ATS Structure & Parsing", score: atsScore },
    { key: "Verb / Tense Consistency", score: tenseScore },
    { key: "Section Ordering", score: orderScore },
    { key: "Summary & Positioning", score: summaryScore },
    { key: "Formatting & Polish", score: formattingScore }
  ];
  // Convert to a 0–5 dot rating for display parity with the manual eval.
  categories.forEach(c => { c.dots = Math.max(1, Math.min(5, Math.round(c.score / 20))); });

  const overall = Math.round(categories.reduce((s, c) => s + c.score, 0) / categories.length);
  let tier, tierNote;
  if (overall >= 85) {
    tier = "MARKET-READY / COMPETITIVE";
    tierNote = "Strong across the board — this resume competes well for your target roles. Remaining edits are precision, not repair.";
  } else if (overall >= 72) {
    tier = "NEAR-READY";
    tierNote = "A strong foundation held back by a few fixable items — not structural problems. Clear the top fixes and this moves to MARKET-READY.";
  } else {
    tier = "NEEDS-WORK";
    tierNote = "The content is worth building on, but positioning and evidence need work before applying to competitive roles.";
  }
  return { categories, overall, tier, tierNote };
}

// ---- Resume Risk Flags (manual eval §29) ----
// Consolidates the highest-signal credibility risks into one block so the
// candidate sees their vulnerabilities together, not scattered.
function buildRiskFlags(data, ctx) {
  const { verbTense, runOn, mechanics, metricCred, metricDensity } = ctx || {};
  const flags = [];

  if (metricCred && metricCred.count) {
    flags.push({
      title: "Metric credibility",
      note: metricCred.count + " number" + (metricCred.count === 1 ? "" : "s") +
        " may read as inflated or unverifiable. Anchor each to how it was measured, or soften absolute claims you can't defend end-to-end in an interview."
    });
  }
  // Metric overload covers two density problems the manual audit flags: comma-
  // chained result lists (runOn) and single bullets packing 3+ distinct numbers
  // (metricDensity). Either triggers the same coaching fix: one headline metric.
  const overloadCount = Math.max(
    (runOn && runOn.count) || 0,
    (metricDensity && metricDensity.count) || 0
  );
  if (overloadCount) {
    flags.push({
      title: "Metric overload",
      note: overloadCount + " bullet" + (overloadCount === 1 ? "" : "s") +
        " pack multiple results into one line, which tires the eye and buries your strongest number. Lead each bullet with one headline metric and move or drop the rest."
    });
  }
  // Verb inflation (populated once analyzeVerbTense returns `inflatedCount`).
  if (verbTense && verbTense.inflatedCount) {
    flags.push({
      title: "Verb inflation",
      note: "\u201CSpearheaded\u201D / \u201CArchitected\u201D on solo work can read as overreach to a skeptical reviewer. Reserve them for genuine leadership or ground-up design; use \u201CBuilt/Designed/Developed\u201D otherwise."
    });
  }
  // Experience thinness: only one real experience entry.
  const expEntries = (data.experience || []).filter(e => e && (e.title || e.org || (e.bullets || []).some(Boolean)));
  if (expEntries.length <= 1) {
    flags.push({
      title: "Experience thinness",
      note: "Only one paid role is visible; research and projects carry the weight. Normal for a new grad — be ready to address it, and make sure projects read as evidence, not a list."
    });
  }
  if (mechanics && mechanics.count) {
    flags.push({
      title: "Small typos & casing",
      note: mechanics.count + " minor issue" + (mechanics.count === 1 ? "" : "s") +
        " (casing, spelling, spacing, brand names). Individually trivial, but together they signal less polish than the content deserves. Five-minute fix, outsized payoff."
    });
  }
  return flags;
}


// ---- Five Major Areas Review (manual-audit coverage) ----
// Keeps the optimizer concise while ensuring it does not miss the five major
// high-level areas surfaced by the detailed manual resume evaluation.
function buildFiveMajorAreasReview(data, ctx) {
  const { mechanics, metricCred, runOn, metricDensity, sectionQuality, scorecard, recruiterReview } = ctx || {};
  const formattingCategory = scorecard && Array.isArray(scorecard.categories)
    ? scorecard.categories.find(c => c.key === "Formatting & Polish") : null;
  const formatScore = formattingCategory ? formattingCategory.score : 85;
  const overloadCount = Math.max((runOn && runOn.count) || 0, (metricDensity && metricDensity.count) || 0);
  const sectionIssueCount = (sectionQuality && sectionQuality.count) || 0;
  const confidence = (recruiterReview && recruiterReview.confidence) || 0;

  return [
    {
      title: "Resume credibility",
      status: metricCred && metricCred.count ? "Needs attention" : "Strong",
      note: metricCred && metricCred.count
        ? (metricCred.count + " metric claim" + (metricCred.count === 1 ? " may" : "s may") + " feel difficult to verify. Keep the numbers, but be ready to explain the measurement method and soften absolute claims that cannot be defended.")
        : "The accomplishments and metrics generally read as believable. Continue using only numbers you can explain clearly in an interview."
    },
    {
      title: "Formatting consistency",
      status: (formatScore < 85 || sectionIssueCount) ? "Review" : "Strong",
      note: (formatScore < 85 || sectionIssueCount)
        ? "The overall structure is ATS-friendly, but spacing, section consistency, or entry formatting may need a final visual cleanup before export."
        : "The structure and formatting are consistent enough for an ATS-friendly, recruiter-readable resume."
    },
    {
      title: "Writing mechanics",
      status: mechanics && mechanics.count ? "Needs attention" : "Strong",
      note: mechanics && mechanics.count
        ? (mechanics.count + " small spelling, capitalization, punctuation, spacing, or brand-name issue" + (mechanics.count === 1 ? " was" : "s were") + " detected. These are quick fixes with an outsized effect on polish.")
        : "No meaningful spelling, capitalization, punctuation, or spacing problems were detected."
    },
    {
      title: "Visual density",
      status: overloadCount ? "Review" : "Balanced",
      note: overloadCount
        ? (overloadCount + " bullet" + (overloadCount === 1 ? " is" : "s are") + " carrying too many results or metrics. Lead with one headline result and preserve enough white space for a fast scan.")
        : "The resume presents substantial information without obvious metric overload. Preserve clear spacing between sections and entries."
    },
    {
      title: "Recruiter perception",
      status: confidence >= 85 ? "Positive" : confidence >= 72 ? "Promising" : "Mixed",
      note: confidence >= 85
        ? "The resume creates a strong first impression. The remaining work is precision: make the target role unmistakable and keep the strongest evidence easy to find."
        : confidence >= 72
          ? "The foundation is promising, but a recruiter may need to work too hard to identify the target role or strongest evidence. Tighten positioning and prioritize the most relevant proof."
          : "The resume contains useful material, but direction and evidence need to become clearer before a recruiter is likely to move quickly toward an interview."
    }
  ];
}

// ---- Interview Conversion estimate (manual eval §31) ----
// A RELATIVE, caveated read — never a promised hit rate. Blends recruiter
// confidence, overall score, and field fit into a qualitative band.
function buildConversionEstimate(recruiterReview, scorecard, fieldFit) {
  const conf = (recruiterReview && recruiterReview.confidence) || 0;
  const overall = (scorecard && scorecard.overall) || 0;
  const penalty = (fieldFit && fieldFit.penalty) || 0;
  const blend = Math.round(conf * 0.5 + overall * 0.5 - penalty);

  let band, note;
  if (blend >= 85) {
    band = "High";
    note = "Strong quantification, keyword coverage, and positioning should clear most ATS filters and catch a recruiter's eye for well-matched roles.";
  } else if (blend >= 72) {
    band = "Moderate-to-High";
    note = "The foundation is competitive. Clearing the top fixes — especially the risk flags above — should meaningfully raise your odds for suitable roles.";
  } else if (blend >= 60) {
    band = "Moderate";
    note = "There's real material here, but positioning and evidence need tightening before this competes for higher-demand postings.";
  } else {
    band = "Building";
    note = "Focus first on direction (summary + target role) and evidence (projects as experience). Those moves raise conversion faster than anything else.";
  }
  return {
    band, note,
    disclaimer: "This is a relative estimate for suitably-matched roles, not a promised hit rate — no tool or coach can guarantee a specific outcome. It reflects how well the resume is set up to convert, which is the part you control."
  };
}

function analyzeSkillsClassification(data) {
  const technical = splitCsvSkills(data.skills && data.skills.technical);
  const dataViz = splitCsvSkills(data.skills && data.skills.dataVisualization);
  const tools = splitCsvSkills(data.skills && data.skills.tools);
  const domain = splitCsvSkills(data.skills && data.skills.domain);
  const all = [...technical, ...dataViz, ...tools, ...domain];

  const artifacts = all.filter(s => /^(tools\s*&|technical skills|tools\s*\/\s*platforms|data visualization|domain knowledge)$/i.test(s) || /:$/.test(s));
  const categoryCount = [technical, dataViz, tools, domain].filter(a => a.length).length;

  // Detect sub-category labels crammed into a single field, e.g.
  // "Programming & Data: SQL, Python, Analytics: Data Analysis, ..."
  // A colon in the MIDDLE of a field (not just trailing) signals the user
  // embedded their own headers instead of using the separate skill fields.
  const rawFields = [
    data.skills && data.skills.technical,
    data.skills && data.skills.dataVisualization,
    data.skills && data.skills.tools,
    data.skills && data.skills.domain
  ];
  const crammedFields = rawFields.filter(f => f && /\S\s*:\s*\S/.test(String(f)) && /:[^:]*,[^:]*:/.test(String(f)));
  const crammed = crammedFields.length > 0;

  const notes = [];
  if (crammedFields.length) notes.push("It looks like multiple skill groups are combined in one field (sub-headers like “Programming & Data:” appear mid-line). Split them across the Technical Skills, Tools & Platforms, and Domain Knowledge fields, or put each group on its own line, so recruiters can scan the categories cleanly.");
  if (artifacts.length) notes.push("Remove formatting artifacts: " + artifacts.join(", "));
  if (!crammed && categoryCount >= 3) notes.push("Original skill categories preserved (" + categoryCount + " categories identified).");
  if (!artifacts.length && !crammed && categoryCount >= 3) notes.push("No category conflicts detected.");

  const score = Math.max(60, Math.min(100, 96 - artifacts.length * 10 - (crammed ? 18 : 0) + Math.min(categoryCount, 4)));
  return {
    technicalCount: technical.length,
    dataVisualizationCount: dataViz.length,
    toolsCount: tools.length,
    domainCount: domain.length,
    artifacts,
    crammed,
    likelyMisplacedTools: [],
    likelyMisplacedCore: [],
    competencyTerms: [],
    notes,
    score
  };
}

function analyzeEducationCleanup(data) {
  const edu = (data.education || []).filter(e => e && (e.degree || e.school || e.location || e.grad));
  let issues = [];
  edu.forEach(e => {
    if (e.school && e.location && e.school.includes(e.location)) issues.push("School field appears to include location.");
    if (e.degree && e.grad && e.degree.includes(e.grad)) issues.push("Degree field appears to include graduation date.");
    if (!e.degree) issues.push("Missing degree.");
    if (!e.school) issues.push("Missing school.");
    if (!e.grad) issues.push("Missing graduation date.");
  });
  issues = Array.from(new Set(issues));
  const score = Math.max(60, Math.min(100, 100 - issues.length * 8));
  return { count: edu.length, issues, score };
}

function recommendSectionOrder(data) {
  const recommended = smartRecommendedOrder(data);
  const current = (data.order || []).filter(k => !(data.hidden && data.hidden[k]));
  // Compare only sections the resume actually has: filter the recommended list
  // down to present sections, then check whether the current order matches that
  // relative sequence. Previously we compared the full recommended top-6, which
  // included sections the resume doesn't have (e.g. "volunteer"), so a correctly
  // ordered resume was flagged as a mismatch and penalized.
  const currentSet = new Set(current);
  const recommendedPresent = recommended.filter(k => currentSet.has(k));
  const mismatch = recommendedPresent.some((k, i) => current[i] !== k);
  return { recommended, current, mismatch };
}

function analyzeSkillChangeExplanations(data, lastSkillImportNote) {
  const notes = [];
  if (data.skills && data.skills.importChanges && data.skills.importChanges.length) {
    data.skills.importChanges.filter(isUserMeaningfulImportChange).forEach(n => notes.push(n));
  }
  if (lastSkillImportNote && lastSkillImportNote.length) {
    lastSkillImportNote.forEach(x => notes.push((x.item || x) + " was reviewed during skills import."));
  }
  const skillReview = analyzeSkillsClassification(data);
  skillReview.artifacts.forEach(x => notes.push(x + " looks like an import/formatting artifact, not a skill."));
  return Array.from(new Set(notes));
}


function smartRecommendedOrder(data) {
  const hasProjects = (data.projects || []).some(p => p.name || (p.bullets || []).some(Boolean));
  const hasExperience = (data.experience || []).some(e => e.title || e.org || (e.bullets || []).some(Boolean));
  const hasPublications = (data.publications || []).some(p => p.citation);
  const hasAwards = (data.awards || []).some(a => a.name);
  const hasLeadership = (data.activities || []).some(a => a.role || a.org || (a.bullets || []).some(Boolean));
  const hasCerts = (data.certifications || []).some(c => c.name);
  const field = String(data.field || "").toLowerCase();

  if (/technology|computer|cs|engineering|data|analytics|ai|machine/.test(field)) {
    // Stage-aware (manual eval §11): a new grad with a strong GPA leads with
    // Education, then Skills as the keyword block. Experienced candidates lead
    // with Skills + applied work, keeping Education lower. We compute the
    // new-grad signal directly (not via the advice branch) so the recommended
    // order is stable whether or not the resume already follows it.
    const eduList = (data.education || []).filter(e => e && (e.degree || e.school));
    const expList = (data.experience || []).filter(e => e && (e.title || e.org || (e.bullets || []).some(Boolean)));
    let bestGpaNorm = null;
    eduList.forEach(e => {
      const mm = String(e.gpa || "").match(/([0-9](?:\.\d{1,2})?)\s*(?:\/\s*([0-9]{1,2}(?:\.\d)?))?/);
      if (mm) {
        const v = parseFloat(mm[1]); const sc = mm[2] ? parseFloat(mm[2]) : 4;
        const norm = sc >= 5 ? (v / sc) * 4 : v;
        if (!isNaN(norm) && (bestGpaNorm === null || norm > bestGpaNorm)) bestGpaNorm = norm;
      }
    });
    const yrs = (collectResumeText(data).match(/\b20\d{2}\b/g) || []).map(Number);
    const maxYr = yrs.length ? Math.max(...yrs) : null;
    const nowYr = new Date().getFullYear();
    const newGradSig = ((maxYr !== null && maxYr >= nowYr - 1) || expList.length <= 1) && eduList.length > 0;
    const educationFirst = newGradSig && bestGpaNorm !== null && bestGpaNorm >= 3.5;

    const order = educationFirst ? ["summary", "education", "skills"] : ["summary", "skills"];
    if (hasProjects) order.push("projects");
    if (hasExperience) order.push("experience");
    if (!educationFirst) order.push("education");
    if (hasPublications) order.push("publications");
    if (hasCerts) order.push("certifications");
    if (hasAwards) order.push("awards");
    if (hasLeadership) order.push("activities");
    order.push("volunteer");
    return Array.from(new Set([...order, "projects", "experience", "education", "publications", "certifications", "awards", "activities", "volunteer"]));
  }

  return FIELD_PRESETS[data.field] ? [...FIELD_PRESETS[data.field]] : [...FIELD_PRESETS["Technology / CS / Engineering"]];
}

// ---- Stage-aware section-order advice (manual eval §11) ----
// The generic order engine above doesn't reason about career stage. This does:
// for a new grad whose degree is the leading credential (recent/upcoming
// graduation, strong GPA, thin paid experience), it recommends Education ->
// Skills near the top, WITH the manual audit's honest caveat that for
// experience-dominant (senior IC) targets the call flips. Only fires when it has
// a concrete, defensible recommendation to make.
function analyzeSectionOrderAdvice(data) {
  const eduEntries = (data.education || []).filter(e => e && (e.degree || e.school));
  const expEntries = (data.experience || []).filter(e => e && (e.title || e.org || (e.bullets || []).some(Boolean)));
  const current = (data.order || []).filter(k => !(data.hidden && data.hidden[k]));

  // Parse the strongest GPA present (normalize a /5 or /10 scale to /4).
  let bestGpa = null;
  eduEntries.forEach(e => {
    const m = String(e.gpa || "").match(/([0-9](?:\.\d{1,2})?)\s*(?:\/\s*([0-9]{1,2}(?:\.\d)?))?/);
    if (m) {
      const val = parseFloat(m[1]);
      const scale = m[2] ? parseFloat(m[2]) : 4;
      const norm = scale >= 5 ? (val / scale) * 4 : val;
      if (!isNaN(norm) && (bestGpa === null || norm > bestGpa)) bestGpa = norm;
    }
  });

  // Detect recent / upcoming graduation (new-grad signal).
  const allText = collectResumeText(data);
  const gradYears = (allText.match(/\b20\d{2}\b/g) || []).map(Number);
  const maxYear = gradYears.length ? Math.max(...gradYears) : null;
  const nowYear = new Date().getFullYear();
  const recentOrUpcomingGrad = maxYear !== null && maxYear >= (nowYear - 1);

  // "Thin" paid experience: 0–1 real employment entries (research/projects don't
  // count as employment for this purpose, matching the manual audit's framing).
  const thinExperience = expEntries.length <= 1;

  // Is Education currently sitting BELOW Skills?
  const idxEdu = current.indexOf("education");
  const idxSkills = current.indexOf("skills");
  const educationBelowSkills = idxEdu > -1 && idxSkills > -1 && idxEdu > idxSkills;

  const newGrad = (recentOrUpcomingGrad || thinExperience) && eduEntries.length > 0;
  const strongGpa = bestGpa !== null && bestGpa >= 3.5;

  // Only make the Education-first call when it's genuinely warranted AND actionable
  // (i.e., Education is currently below Skills).
  if (newGrad && strongGpa && educationBelowSkills) {
    return {
      applies: true,
      headline: "Move Education above Skills.",
      body: "As a " + (recentOrUpcomingGrad ? "recent/upcoming graduate" : "early-career candidate") +
        " with a strong GPA (" + bestGpa.toFixed(2).replace(/\.00$/, ".0") + "/4), your degree is your leading asset — recruiters for entry-level roles expect to see it early. Put Education right after your Summary, with Skills immediately below as the keyword block: Summary → Education → Skills → Experience → Projects.",
      caveat: "Judgment call: this is the safer default for new-grad applications. If you're targeting senior individual-contributor roles where hands-on experience dominates the decision, keep Experience higher instead.",
      recommendedTop: ["summary", "education", "skills", "experience", "projects"]
    };
  }

  // Secondary: strong new grad whose Education is already high — affirm it.
  if (newGrad && strongGpa && !educationBelowSkills && idxEdu > -1 && idxEdu <= 2) {
    return {
      applies: true,
      headline: "Your section order already leads with your strongest asset.",
      body: "Education is near the top, which is right for a new grad with a strong GPA — recruiters see your leading credential first. Keep Skills close behind as the keyword block.",
      caveat: "",
      recommendedTop: []
    };
  }

  return { applies: false };
}

function sectionOrderExplanation(data) {
  const field = String(data.field || "");
