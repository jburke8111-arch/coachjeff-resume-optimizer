    const concerns = [];
    const improvements = [];

    const addSignal = (text) => { if (text && signals.length < 3 && !signals.includes(text)) signals.push(text); };
    const addConcern = (text) => { if (text && concerns.length < 3 && !concerns.includes(text)) concerns.push(text); };
    const addImprove = (label, detail, impact = "High") => {
      if (label && improvements.length < 3 && !improvements.some(x => x.label === label)) improvements.push({ label, detail, impact });
    };

    let confidence = 55;

    if (hasSummary) { confidence += 8; addSignal("Professional summary gives the recruiter a starting point."); }
    else { confidence -= 8; addConcern("Career direction is not immediately clear."); addImprove("Clarify the professional summary", "State the target role, strongest skills, and one or two pieces of evidence.", "High"); }

    if (hasSkills && skillCount >= 8) { confidence += 10; addSignal("Skills section shows relevant tools and capabilities."); }
    else { confidence -= 6; addConcern("Skills section could be more complete or better organized."); addImprove("Organize the skills section", "Group technical skills, tools, and domain knowledge so they are easy to scan.", "Medium"); }

    if (hasExperience) { confidence += 12; addSignal("Work experience gives the resume credibility beyond coursework."); }
    else { confidence -= 10; addConcern("Limited work experience is visible."); }

    if (resumeStrength && resumeStrength.exp && expBulletCount) {
      if (resumeStrength.exp.quantified >= Math.ceil(expBulletCount / 3)) {
        confidence += 8;
        addSignal("Experience bullets include measurable evidence.");
      } else {
        confidence -= 5;
        addConcern("Several accomplishments are not yet quantified.");
        addImprove("Quantify experience bullets", "Add numbers, scope, frequency, tools, or outcomes where accurate.", "High");
      }
    }

    if (hasProjects) { confidence += 9; addSignal("Projects help demonstrate hands-on ability."); }
    else { confidence -= 5; addConcern("Projects are missing or not prominent."); addImprove("Add or strengthen projects", "Use projects to show tools, problem-solving, and outcomes.", "Medium"); }

    if (hasEducation) confidence += 6;
    else { confidence -= 5; addConcern("Education information is incomplete or hard to find."); }

    if (leadershipCount) confidence += 4;
    else addImprove("Add leadership or initiative", "Include campus, volunteer, team, mentoring, or project leadership if accurate.", "Low");

    confidence = Math.max(45, Math.min(98, Math.round(confidence)));

    let outcome = "🔴 Not Yet";
    let recommendation = "Not Yet";
    let move = "Not Yet";
    let outcomeDetail = "The resume needs substantial work before it would create recruiter confidence.";
    let emotionalRead = "I would not move forward yet, but the resume can be strengthened.";
    let queueAction = "set this resume aside for now, though the fixes to change my mind are very doable.";
    if (confidence >= 90) {
      outcome = "🟢 Interview";
      recommendation = "Interview";
      move = "Yes";
      outcomeDetail = "I would move this candidate forward for an interview based on the current resume.";
      emotionalRead = "I'd feel confident moving this candidate forward.";
      queueAction = "move this candidate forward for an interview.";
    } else if (confidence >= 80) {
      outcome = "🟡 Interview After Improvements";
      recommendation = "Interview After Improvements";
      move = "Maybe";
      outcomeDetail = "I see good potential, but I would strengthen the resume before applying to competitive roles.";
      emotionalRead = "I see strong potential, but I'd want a few fixes first.";
      queueAction = "lean toward moving this candidate forward, after a few improvements.";
    } else if (confidence >= 70) {
      outcome = "🟠 Borderline";
      recommendation = "Borderline";
      move = "Maybe";
      outcomeDetail = "There is potential, but the resume needs clearer evidence and positioning.";
      emotionalRead = "I'd keep reading, but I'd hesitate before scheduling an interview.";
      queueAction = "keep reading, but hesitate before scheduling an interview.";
    }

    const questions = [];
    if (hasProjects) questions.push("Tell me about one project you are most proud of and what you personally contributed.");
    if (hasExperience) questions.push("Which experience bullet best shows your impact, and how did you measure success?");
    if (hasSkills) questions.push("Which technical skill on your resume are you most confident using in a real work setting?");
    if (!hasSummary) questions.push("What type of role are you targeting, and why?");
    if (leadershipCount) questions.push("Tell me about a time you led or influenced a team.");
    while (questions.length < 3) questions.push("Walk me through the experience or project that best prepares you for this role.");

    if (!improvements.length && topPriorities && topPriorities.length) {
      topPriorities.slice(0,3).forEach(p => addImprove(p.label, p.detail, "Medium"));
    }
    if (!improvements.length) addImprove("Polish the resume story", "Make sure the summary, skills, experience, and projects all point toward the same target role.", "Medium");

    const improvedConfidence = Math.min(98, confidence + (confidence >= 90 ? 3 : 7));

    const finalSignals = signals.length ? signals.slice(0,3) : ["Resume content imported successfully.", "Core sections are present.", "There is enough information for a first-pass review."];
    const finalConcerns = concerns.length ? concerns.slice(0,3) : ["No major recruiter concerns surfaced in the first pass."];
    const finalImprovements = improvements.slice(0,3);

    // ---- v11.3.2 storytelling layer (presentation only; reuses values above) ----

    // The First Thing I Noticed — lead with the single strongest piece of evidence.
    let firstNoticed;
    if (hasExperience) {
      firstNoticed = "The first thing I noticed was your work experience. Real experience tells me you've already operated in a professional setting, and that gives the rest of your resume credibility right away.";
    } else if (hasProjects) {
      firstNoticed = "The first thing I noticed was your projects. Even without a long work history, hands-on projects show me you can apply what you know and actually build things, which is exactly what I'm looking for.";
    } else if (hasSkills && skillCount >= 8) {
      firstNoticed = "The first thing I noticed was your skills section. You've laid out a solid set of relevant tools and capabilities, so I immediately had a sense of what you bring to the table.";
    } else if (hasSummary) {
      firstNoticed = "The first thing I noticed was your professional summary. It gave me a quick starting point and a sense of the direction you're heading, which helps me read the rest of your resume with context.";
    } else {
      firstNoticed = "The first thing I noticed was that your core sections are in place. There's a foundation here for me to work from, even though I had to hunt a little to understand your story.";
    }

    // What Made Me Pause — top hesitation, specific and human.
    let paused;
    if (!hasSummary) {
      paused = "What made me pause: I can see strong content here, and the selected target is " + (data.field || "the target field") + ". The resume itself still needs to state that direction near the top so I do not have to piece it together while moving fast.";
    } else if (finalConcerns.length && !/no major recruiter concerns/i.test(finalConcerns[0])) {
      const c0 = finalConcerns[0].replace(/\.$/, "");
      paused = "What made me pause: " + c0.charAt(0).toLowerCase() + c0.slice(1) + ". When I'm moving quickly through a stack of resumes, something like this makes me slow down or set yours aside, so it's worth tightening before you apply.";
    } else {
      paused = "Honestly, nothing made me stop cold. There were a couple of spots where I had to read twice to be sure of your story, but no single thing pushed me to set your resume aside.";
    }

    // What Increased My Confidence — recruiter-like, evidence-framed.
    let confidenceText;
    if (hasSkills && skillCount >= 8) {
      confidenceText = "The skills section gave me evidence that this candidate has the tools I'd expect for an entry-level technical role. That matters because it's something concrete I can picture you talking through in an interview, not just a claim.";
    } else if (hasExperience) {
      confidenceText = "Your work experience increased my confidence because it shows me you've already operated in a real professional setting. That's concrete proof, and it's the kind of thing I'd want to dig into if we talked.";
    } else if (hasProjects) {
      confidenceText = "Your projects increased my confidence because they gave me real evidence of hands-on ability. I could see you applying what you know, which is exactly what I look for early in a candidate's story.";
    } else {
      const confTop0 = finalSignals[0] ? finalSignals[0].replace(/\.$/, "") : "your core sections are present";
      confidenceText = "What increased my confidence was that " + confTop0.charAt(0).toLowerCase() + confTop0.slice(1) + ". That gives me a foundation to work from as I read the rest.";
    }
    const confTop = finalSignals[0] ? finalSignals[0].replace(/\.$/, "") : "your core sections are present";

    // Recruiter Confidence Timeline — 30–60 second thought process, time-based (reuses flags, no new scoring).
    const clampConf = (n) => Math.max(30, Math.min(98, Math.round(n)));
    const c1 = clampConf(hasSummary ? confidence - 4 : confidence - 14);
    const c2 = clampConf(hasExperience ? c1 + 12 : c1 - 6);
    const c3 = clampConf(hasProjects ? c2 + 8 : c2 - 4);
    const c4 = clampConf((hasSkills && skillCount >= 8) ? c3 + 6 : c3 - 3);
    const c5 = confidence;
    const timeline = [
      {
        stage: "0–10 sec — First glance",
        pct: c1,
        up: hasSummary,
        note: hasSummary
          ? "First glance: your summary tells me quickly what role you're targeting, so I can read with context."
          : "First glance: the selected target is " + (data.field || "the target field") + ", but the resume itself does not state that direction clearly near the top. Without a clear summary, I'm hunting for direction."
      },
      {
        stage: "10–20 sec — Experience check",
        pct: c2,
        up: hasExperience,
        note: hasExperience
          ? "Experience check: this gives me more confidence because there's relevant work experience to look at."
          : "Experience check: I was hoping for more work experience here to anchor your credibility."
      },
      {
        stage: "20–35 sec — Projects and proof",
        pct: c3,
        up: hasProjects,
        note: hasProjects
          ? "Projects and proof: the projects help confirm hands-on ability, which is exactly what I want to see."
          : "Projects and proof: a couple of solid projects would help confirm your hands-on ability."
      },
      {
        stage: "35–50 sec — Skills scan",
        pct: c4,
        up: hasSkills && skillCount >= 8,
        note: (hasSkills && skillCount >= 8)
          ? "Skills scan: the tools are relevant, though the organization could be a little cleaner to scan."
          : "Skills scan: the skills section could be fuller or better organized so I can confirm fit fast."
      },
      {
        stage: "50–60 sec — Final decision",
        pct: c5,
        up: confidence >= 80,
        note: confidence >= 90
          ? "Final decision: I've seen enough evidence that I'd feel good moving you forward."
          : confidence >= 80
            ? "Final decision: I see real potential — I'd want a few fixes, then I'm ready to move you forward."
            : confidence >= 70
              ? "Final decision: I see potential, but I'd want stronger positioning before I schedule you."
              : "Final decision: not yet for me today, but the resume is very fixable."
      }
    ];

    // My Decision — opening line per spec.
    const decisionIntro = "If this resume landed in my queue today…";
    let decisionBody;
    if (confidence >= 90) {
      decisionBody = "…I'd interview you. You've given me enough concrete evidence — real experience and proof of your ability — that I'd want to hear more in a conversation. What would change my mind is a drop in credibility: unexplained gaps or claims you couldn't back up if I asked.";
    } else if (confidence >= 80) {
      decisionBody = "…I'd lean toward interviewing you, but I'd want a couple of fixes first before sending you into competitive roles. The potential is clearly there. What would tip me fully to yes is sharper positioning up top and a little more measurable evidence in your strongest sections.";
    } else if (confidence >= 70) {
      decisionBody = "…I'd keep reading, but I'd hesitate before scheduling you. Right now I have to work to understand your value, and in a busy queue that's a real risk. What would change my mind is a clearer target role at the top and stronger proof in the sections I lingered on.";
    } else {
      decisionBody = "…I'd likely set you aside for now — not because there's nothing here, but because I can't quickly see your value. What would change my mind is making your target role obvious and putting your best evidence where I'll see it in the first ten seconds. The good news is these fixes are very doable.";
    }

    // Where I Landed — 80–120 word recruiter-style wrap-up paragraph.
    const closing = "Here's where I landed after about a minute with your resume. I can see a real foundation, and the strongest part of your story — " + confTop.charAt(0).toLowerCase() + confTop.slice(1) + " — is what I'd want to dig into if we talked. My honest read is that the gap between a maybe and a yes isn't a rewrite; it's making your best evidence easy to find fast and tightening the spots where I had to slow down. Lead with a clear target role, keep your strongest material near the top, and you make it much easier for someone like me to say yes. You're closer than you might think.";

    return {
      confidence,
      improvedConfidence,
      outcome,
      recommendation,
      move,
      outcomeDetail,
      emotionalRead,
      queueAction,
      signals: finalSignals,
      concerns: finalConcerns,
      questions: questions.slice(0,5),
      improvements: finalImprovements,
      notes: "After a first-pass review, I see a resume with useful evidence and a foundation that can be strengthened. The candidate's strongest areas should be made easier to find quickly, and the highest-impact improvements are clearer positioning and stronger evidence of results. Based on this version, my recommendation is: " + outcome.replace(/[🟢🟡🟠🔴]\s*/g, "") + ".",
      // v11.3.2 storytelling
      firstNoticed,
      paused,
      confidenceText,
      timeline,
      decisionIntro,
      decisionBody,
      closing
    };
  }, [hasSummary, hasSkills, hasExperience, hasProjects, hasEducation, leadershipCount, skillCount, expBulletCount, resumeStrength, topPriorities]);

  // v11.4 — Coach Review. Answers "exactly what should this student improve, why does it
  // matter, and what should they do first?" Reuses the same derived resume flags/scoring the
  // Recruiter Review uses, but frames everything as a one-on-one coaching plan (not a report).
  const coachReview = useMemo(() => {
    const firstName = String(data.name || "").trim().split(/\s+/)[0] || "";
    const rs = resumeStrength || {};
    const exp = rs.exp || {};
    const proj = rs.projects || {};
    const expBullets = exp.bullets || 0;
    const expQuant = exp.quantified || 0;
    const projQuant = proj.quantified || 0;
    const projBulletTotal = proj.bullets || 0;
    const conf = recruiterReview ? recruiterReview.confidence : 70;
    const targetConf = recruiterReview ? recruiterReview.improvedConfidence : Math.min(98, conf + 7);

    // ---- Opening thoughts (conversational, tuned to where the resume stands) ----
    let opening;
    if (conf >= 88) {
      opening = (firstName ? firstName + ", you" : "You") + "'ve built a strong resume, and it shows. At this point the work isn't about adding more — it's about polish and precision so a recruiter recognizes your best evidence in the first few seconds. Let's tighten the few spots that would move you from a solid “yes” to an easy one.";
    } else if (conf >= 78) {
      opening = (firstName ? firstName + ", you" : "You") + "'ve built a solid foundation. The biggest opportunity here isn't adding more content — it's helping recruiters recognize your strengths faster. A handful of focused edits, done in the right order, will do more for you than a full rewrite.";
    } else {
      opening = (firstName ? firstName + ", there" : "There") + "'s real material to work with here — more than you might give yourself credit for. Right now a recruiter has to work a little too hard to see it. Our job together is simple: make your direction clear and your best evidence easy to find. Let's start with the pieces that carry the most weight.";
    }

    // ---- Game plan: prioritized, time-boxed coaching actions ----
    const plan = [];
    const addPlan = (title, minutes, why) => { if (plan.length < 4 && !plan.some(p => p.title === title)) plan.push({ title, minutes, why }); };

    if (!hasSummary) {
      addPlan("Write a Professional Summary", 15, "Give the recruiter your target role and strongest evidence in the first two lines they read.");
    } else {
      addPlan("Rewrite your Professional Summary", 15, "Lead with your target role and one or two proof points so your direction is obvious at a glance.");
    }
    if (hasExperience && expBullets && expQuant < Math.ceil(expBullets / 2)) {
      addPlan("Strengthen your first two experience bullets", 20, "The top bullets get read most. Add numbers, scope, or outcomes so they land as results, not duties.");
    } else if (!hasExperience) {
      addPlan("Reframe projects and coursework as experience", 20, "Show applied work — what you built, the tools, and the result — so limited formal experience matters less.");
    }
    if (hasProjects && projQuant < Math.max(1, Math.ceil((proj.projects || 1) / 2))) {
      addPlan("Strengthen your strongest project", 15, "Turn one project into a mini case study: problem, tools, what you did, and the outcome.");
    } else if (!hasProjects) {
      addPlan("Add one strong project", 25, "A single well-described project gives recruiters concrete evidence of hands-on ability.");
    }
    if (hasSkills && resumeStrength && resumeStrength.skills && resumeStrength.skills.crammed) {
      addPlan("Reorganize your skills section", 10, "Separate technical skills, tools, and domain knowledge so recruiters can scan them in seconds.");
    }
    if (plan.length < 3 && !leadershipCount) {
      addPlan("Add a leadership or initiative line", 10, "Campus, volunteer, team, or mentoring roles show ownership — something recruiters look for early.");
    }
    if (plan.length < 3) {
      addPlan("Polish formatting and section order", 10, "Keep your strongest material near the top and the layout clean so nothing slows the read.");
    }
    const planForToday = plan.slice(0, 3);
    const totalMinutes = planForToday.reduce((s, p) => s + p.minutes, 0);

    // ---- What's already working ----
    const strengths = [];
    const addStrength = (label, why) => { if (!strengths.some(s => s.label === label)) strengths.push({ label, why }); };
    if (hasSkills && skillCount >= 6) addStrength("Technical Skills", "You list " + skillCount + " concrete skills/tools. That gives a recruiter something specific to picture you doing.");
    if (hasExperience) addStrength("Work Experience", "Real-world experience is credibility coursework can't give. It signals you've operated in a professional setting.");
    if (hasProjects) addStrength("Projects", "Projects prove hands-on ability — they show you can apply what you know, not just list it.");
    if (certCount) addStrength("Certifications", "Certifications are third-party proof of skill. They're an easy confidence boost for a screener.");
    if (hasEducation) addStrength("Education", "Your degree and school are clearly present, which anchors the rest of your story.");
    if (leadershipCount) addStrength("Leadership & Involvement", "Activities and leadership show initiative and teamwork — traits recruiters read as maturity.");
    if (exp && expQuant >= Math.ceil(expBullets / 3) && expBullets) addStrength("Measurable Results", "Several bullets already include numbers or outcomes. That's exactly the habit that separates strong resumes.");
    const strengthsFinal = strengths.slice(0, 6);

    // ---- Highest-impact improvements, ranked by stars (1-5) ----
    const improvements = [];
    const addImp = (stars, title, why, effort, impact) => {
      if (!improvements.some(x => x.title === title)) improvements.push({ stars, title, why, effort, impact });
    };
    if (!hasSummary || conf < 88) {
      addImp(5, hasSummary ? "Rewrite Professional Summary" : "Add Professional Summary",
        "This is the first thing read and the fastest way to set your direction. A vague or missing summary makes a recruiter guess — and guessing lowers confidence.",
        "15 min", "High");
    }
    if (hasExperience && expBullets && expQuant < Math.ceil(expBullets / 2)) {
      addImp(4, "Quantify your experience",
        "Only " + expQuant + " of " + expBullets + " experience bullets show measurable results. Numbers make accomplishments believable and memorable.",
        "20 min", "High");
    }
    if (hasProjects && projQuant < Math.max(1, Math.ceil((proj.projects || 1) / 2))) {
      addImp(4, "Improve project descriptions",
        "Your projects show effort but not always outcomes. Adding the problem, tools, and result turns them into evidence.",
        "15 min", "Medium-High");
    }
    if (!leadershipCount) {
      addImp(3, "Add leadership or initiative",
        "Recruiters look for ownership early. Campus, volunteer, or team leadership — if accurate — fills a common gap.",
        "10 min", "Medium");
    }
    if (hasSkills && resumeStrength && resumeStrength.skills && resumeStrength.skills.crammed) {
      addImp(3, "Reorganize skills",
        "Combined skill groups are hard to scan. Splitting them into clean categories helps both recruiters and ATS.",
        "10 min", "Medium");
    }
    addImp(2, "Formatting polish",
      "Small things — consistent spacing, section order, and clean bullets — remove friction so nothing slows the read.",
      "10 min", "Low-Medium");
    const improvementsFinal = improvements.sort((a, b) => b.stars - a.stars).slice(0, 5);

    // ---- Roadmap (ordered coaching path) ----
    const roadmap = ["Professional Summary"];
    if (hasExperience || expBullets) roadmap.push("Experience");
    if (hasProjects || !hasExperience) roadmap.push("Projects");
    if (!leadershipCount) roadmap.push("Leadership");
    roadmap.push("Final Review");

    // ---- Before / After coaching examples ----
    // RULE: every card shown here must come from the user's OWN resume. We never mix in
    // generic/illustrative lines. Cards are one of two honest types:
    //   kind:"rewrite"  — we can safely rewrite the line WITHOUT inventing facts (verb swap,
    //                     de-passivize, capitalize). Shown as WEAK → BETTER.
    //   kind:"tighten"  — the line is real but a genuine rewrite would require facts we don't
    //                     have. Shown as the real line → a labeled instruction (not a fake quote).
    // Only if we find ZERO real lines do we fall back to clearly-labeled illustrative examples.
    const illustrativeFallback = [
      { kind: "rewrite", section: "Experience", weak: "Worked on dashboards.", better: "Built 4 Power BI dashboards used weekly by a 12-person analytics team." },
      { kind: "rewrite", section: "Experience", weak: "Responsible for social media.", better: "Grew Instagram engagement 38% over one semester by testing weekly content themes." },
      { kind: "rewrite", section: "Projects", weak: "Made a machine learning project.", better: "Built a churn-prediction model in Python (scikit-learn) reaching 86% accuracy on test data." }
    ];

    const WEAK_OPENERS = /^(worked on|responsible for|helped( to| with)?|assisted( in| with)?|duties included|tasked with|in charge of|handled|involved in|participated in|was part of|part of|dealt with|contributed to|supported|aided( in| with)?)\b/i;
    const hasNumber = (s) => /\d/.test(String(s || ""));
    const cleanBullet = (s) => String(s || "").replace(/^[•\-\u2013\u2014\s]+/, "").replace(/\s+/g, " ").replace(/[.;]+$/, "").trim();
    const cap = (s) => s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
    const lc1 = (s) => s ? s.charAt(0).toLowerCase() + s.slice(1) : s;
    const trunc = (s, n) => (s && s.length > n ? s.slice(0, n).replace(/\s+\S*$/, "") + "…" : s);

    // Choose a strong verb that fits the content, without changing meaning.
    const pickVerb = (text) => {
      if (/train|mentor|onboard|coach|taught|instruct/i.test(text)) return "Trained";
      if (/schedul|coordinat|calendar|appointment|logistic/i.test(text)) return "Coordinated";
      if (/record|document|complianc|audit|file|paperwork/i.test(text)) return "Managed";
      if (/report|dashboard|analy|data|metric|track/i.test(text)) return "Analyzed";
      if (/prepar|cook|meal|serve|food/i.test(text)) return "Prepared";
      if (/inventor|stock|supply|material/i.test(text)) return "Oversaw";
      if (/plan|event|program|initiativ/i.test(text)) return "Led";
      if (/build|built|creat|develop|design/i.test(text)) return "Built";
      return "Led";
    };

    // Try to produce a REAL, substantive rewrite from a line, inventing nothing.
    // Returns a {weak, better} rewrite (green card), or null if no meaningful rewrite exists.
    // NOTE: pure capitalization fixes are NOT returned here — they're handled as consistency
    // cards below, so the green "Better" column always shows a genuinely different sentence.
    function tryRewrite(raw) {
      const b = cleanBullet(raw);
      if (!b || b.length < 12) return null;
      if (WEAK_OPENERS.test(b)) {
        const rest = b.replace(WEAK_OPENERS, "").replace(/^\s*(the|a|an|for|in|with|to)\s+/i, "").trim();
        if (rest.length < 6) return null;
        const better = pickVerb(rest) + " " + lc1(rest);
        // Only count it if the wording actually changed (not just casing).
        if (better.toLowerCase() !== cap(b).toLowerCase()) return { weak: cap(b), better };
      }
      return null;
    }

    // A real line that only needs its opener capitalized for consistency.
    function capNote(raw) {
      const b = cleanBullet(raw);
      if (!b || b.length < 12) return null;
      if (WEAK_OPENERS.test(b)) return null; // that's a rewrite case, handled above
      if (/^[a-z]/.test(b)) return { weak: b, note: "Start with a capital letter to match your other bullets — small, but recruiters notice inconsistent formatting." };
      return null;
    }

    // Build a SPECIFIC "tighten" note for a real line by inspecting what the line already
    // contains and naming the concrete detail that's missing. Returns null when the line is
    // already strong enough that a generic prompt would be noise.
    function tightenNote(section, raw) {
      const b = cleanBullet(raw);
      if (!b || b.length < 20) return null;
      if (hasNumber(b)) return null;                 // already quantified — leave it alone
      const low = b.toLowerCase();

      // Pull a short, human anchor phrase from the line so the note points at THIS bullet.
      const anchor = (() => {
        const m = low.match(/\b(dashboard|report|training|curriculum|audit|inventory|schedul\w*|onboard\w*|complianc\w*|social media|campaign|event|model|analysis|records|documentation|process|workflow|budget|inspection|presentation)\b/);
        return m ? m[1].replace(/\bschedul\w*/, "scheduling").replace(/\bonboard\w*/, "onboarding").replace(/\bcomplianc\w*/, "compliance") : null;
      })();

      // Decide what kind of specific detail would strengthen THIS line.
      // Order matters: check the more specific intents (analysis, teaching, delivery) before
      // the generic "built/created" bucket, since strong lines often contain several verbs.
      let note = null;
      const namesAudience = /\bto\b[^.]*\b(team|teams|leadership|manager|management|stakeholder|client|department|staff|executives?)\b/.test(low);
      const namesCadence = /\b(daily|weekly|monthly|quarterly|annual\w*|per (day|week|month|quarter|year)|each (day|week|month|quarter))\b/.test(low);
      if (/\b(identif\w*|analyz\w*|audit\w*|review\w*|assess\w*|evaluat\w*)\b/.test(low)) {
        note = "Add the outcome — how many items you covered and what changed as a result (issues fixed, risk reduced, time saved).";
      } else if (/\b(train\w*|mentor\w*|onboard\w*|taught|coach\w*)\b/.test(low)) {
        note = "Add how many people and the effect — how many you trained, and whether ramp-up time or errors improved.";
      } else if (/\b(present\w*|report\w*|deliver\w*|communicat\w*)\b/.test(low) && !(namesAudience && namesCadence)) {
        note = namesCadence
          ? "Name who received it (which team or level) so the audience is as concrete as the timing."
          : "Say who saw it and how often — e.g. \"to leadership monthly\" — so audience and cadence are concrete.";
      } else if (/\b(coordinat\w*|schedul\w*|manag\w*|organiz\w*|oversaw|support\w*|process\w*)\b/.test(low)) {
        note = anchor
          ? "Add the volume behind the " + anchor + " — how many, how often, or across how many teams."
          : "Add the volume — how many, how often, or across how many people or teams.";
      } else if (/\b(built|created|developed|designed|produced|maintain\w*)\b/.test(low)) {
        note = anchor
          ? "Add the scale or payoff of the " + anchor + " — how big it was, how often it was used, or what it saved."
          : "Add the scale or payoff — how big it was, how often it was used, or what it saved.";
      } else if (/\b(generate\w*|insight|utiliz\w*|used?|leverag\w*)\b/.test(low)) {
        note = "Tie this to a result — what decision, saving, or improvement the " + (anchor || "work") + " actually drove.";
      } else {
        note = "Add one concrete detail to this line — a number, frequency, or the result — so it reads as evidence, not a task.";
      }
      return { weak: cap(b), note };
    }

    const examples = [];
    const seen = new Set();
    const usedNotes = new Set();
    const sectionCount = {};
    const addCard = (card) => {
      if (!card || examples.length >= 4) return;
      const key = (card.weak || "").slice(0, 45).toLowerCase();
      if (!key || seen.has(key)) return;
      // Don't repeat the same note text across cards, and cap 2 cards per section
      // so the panel doesn't stack three near-identical items from one project.
      if (card.note && usedNotes.has(card.note)) return;
      if ((sectionCount[card.section] || 0) >= 2) return;
      seen.add(key);
      if (card.note) usedNotes.add(card.note);
      sectionCount[card.section] = (sectionCount[card.section] || 0) + 1;
      if (card.weak) card.weak = trunc(card.weak, 160);
      if (card.better) card.better = trunc(card.better, 190);
      examples.push(card);
    };

    // Gather candidate lines per section, in resume order.
    const expList = (data.experience || []).filter(e => e && (e.title || e.org || (e.bullets || []).some(Boolean)));
    const projList = (data.projects || []).filter(p => p && (p.name || (p.bullets || []).some(Boolean)));
    const sumRaw = String(data.summary || "").trim();

    // Pass 1 — prefer real REWRITES (most convincing, clearly "same facts, better wording").
    // Summary objective-style opener:
    if (sumRaw && /\b(seeking|looking for|hard[- ]?working|to obtain|motivated (individual|professional)|results[- ]driven)\b/i.test(sumRaw)) {
      const firstSentence = cleanBullet(sumRaw.split(/(?<=[.!?])\s/)[0]);
      const target = String(data.field || "").trim();
      addCard({ kind: "tighten", section: "Summary", weak: firstSentence,
        note: "Open with the role you're targeting" + (target ? " (" + target + ")" : "") + " and one or two proof points — not with what you're seeking." });
    }
    for (const e of expList) {
      for (const raw of (e.bullets || [])) {
        const r = tryRewrite(raw);
        if (r) addCard({ kind: "rewrite", section: "Experience", ...r });
      }
    }
    for (const p of projList) {
      for (const raw of (p.bullets || [])) {
        const r = tryRewrite(raw);
        if (r) addCard({ kind: "rewrite", section: "Projects", ...r });
      }
    }

    // Pass 2 — real "tighten" cards from unquantified lines. Interleave Experience and
    // Projects so we don't stack multiple cards from a single section/project.
    const tightenPool = [];
    for (const e of expList) for (const raw of (e.bullets || [])) { const t = tightenNote("Experience", raw); if (t) tightenPool.push({ kind: "tighten", section: "Experience", ...t }); }
    for (const p of projList) for (const raw of (p.bullets || [])) { const t = tightenNote("Projects", raw); if (t) tightenPool.push({ kind: "tighten", section: "Projects", ...t }); }
    // Alternate sections when adding.
    const expTight = tightenPool.filter(c => c.section === "Experience");
    const projTight = tightenPool.filter(c => c.section === "Projects");
    let ei = 0, pi = 0;
    while (examples.length < 3 && (ei < expTight.length || pi < projTight.length)) {
      if (ei < expTight.length) { addCard(expTight[ei++]); }
      if (examples.length < 3 && pi < projTight.length) { addCard(projTight[pi++]); }
    }

    // Pass 3 — lowest-value but still real: formatting-consistency (capitalization) cards.
    if (examples.length < 3) {
      for (const e of expList) { for (const raw of (e.bullets || [])) { const c = capNote(raw); if (c) { addCard({ kind: "tighten", section: "Experience", ...c }); break; } } if (examples.length >= 3) break; }
    }
    if (examples.length < 3) {
      for (const p of projList) { for (const raw of (p.bullets || [])) { const c = capNote(raw); if (c) { addCard({ kind: "tighten", section: "Projects", ...c }); break; } } if (examples.length >= 3) break; }
    }

    // Did we get ANY real, resume-derived card?
    const examplesPersonalized = examples.length > 0;
    // Only if we found nothing real do we show clearly-labeled illustrative examples.
    if (!examplesPersonalized) { for (const f of illustrativeFallback) addCard(f); }

    // ---- Quick wins (<10 min) ----
    const workSample = fieldWorkSampleProfile(data.field);
    const quickWins = [];
    const c = data.contact || {};
    if (workSample === "code") {
      if (!(c.portfolio && /github|gitlab|portfolio/i.test(c.portfolio))) quickWins.push("Add your GitHub (or portfolio) link near the top — for technical roles it's expected.");
    } else if (workSample === "portfolio") {
      if (!(c.portfolio && /portfolio|behance|dribbble|http/i.test(c.portfolio))) quickWins.push("If your work is visual (design, content, marketing), add a portfolio link near the top.");
    }
    // (credential fields get no work-sample nudge; LinkedIn below is the relevant link.)
    if (!c.linkedin) quickWins.push("Add your LinkedIn URL so recruiters can verify and connect.");
    if (expBullets && expQuant < expBullets) quickWins.push("Add one number to a bullet you already have (scope, %, count, or time saved).");
    quickWins.push("Swap one weak opener (“Responsible for…”) for a strong action verb.");
    quickWins.push("Move your strongest section higher so it's seen first.");
    if (!c.email || !c.phone) quickWins.push("Make sure both email and phone are present and easy to find.");
    const quickWinsFinal = quickWins.slice(0, 6);

    // ---- Bigger projects (longer-term) ----
    // The lead item differs by field: a code/portfolio field is well served by a work-sample
    // link, but a credential field (HR, finance, healthcare, etc.) is not — there the
    // high-value moves are a strong LinkedIn presence and a recognized certification/license.
    const bigger = [];
    if (workSample === "code") {
      bigger.push({ label: "Build a GitHub or portfolio", why: "One link to real, working code does more than a dozen resume lines for technical roles." });
    } else if (workSample === "portfolio") {
      bigger.push({ label: "Build a portfolio", why: "One link that shows finished work does more than a dozen resume lines in creative and marketing roles." });
    } else {
      bigger.push({ label: "Strengthen your LinkedIn profile", why: "In this field your profile is the link recruiters check. A complete, keyword-matched profile is the equivalent of a portfolio." });
    }
    bigger.push({ label: "Earn a targeted certification" + (workSample === "credential" ? " or license" : ""),
      why: workSample === "credential"
        ? "In credential-driven fields (e.g. SHRM-CP/PHR for HR), a recognized certification is often the single fastest credibility boost."
        : "A credential in your target field is fast, verifiable proof of commitment." });
    bigger.push({ label: "Take on volunteer leadership", why: "A visible leadership role fills the initiative gap most early resumes have." });
    bigger.push({ label: "Network intentionally", why: "Most early-career roles come through people. A few genuine conversations beats 50 cold applications." });
    bigger.push(workSample === "credential"
      ? { label: "Add measurable wins to your experience", why: "In place of a project portfolio, quantified results (headcount, time saved, compliance rates) are your strongest proof." }
      : { label: "Add one more strong project", why: "A second well-documented project deepens the evidence of what you can actually do." });

    // ---- If we worked together ----
    const topThree = planForToday.map(p => p.title.replace(/^(Rewrite|Write|Strengthen|Improve|Add|Reorganize|Reframe|Polish)\s+/i, m => m.toLowerCase()));
    const together = "If we were working together, I'd start with " +
      (topThree.length ? topThree.slice(0, 3).join(", then ") : "your summary, your first experience bullets, and your strongest project") +
      ". Those changes alone would likely raise recruiter confidence more than rewriting the whole resume — because they make the strengths you already have easy to see fast.";

    // ---- Motivation ----
    const motivation = (conf >= 85)
      ? "You're in good shape — closer than most students at this stage. These last edits are about precision, not effort. Make your best evidence unmissable and let the resume do the work for you."
      : "You're much closer than you think. Most of these improvements aren't about creating new experience — they're about making the strengths you already have easier for a recruiter to recognize. Small, focused edits, big difference.";

    return {
      firstName,
      opening,
      planForToday,
      totalMinutes,
      conf,
      targetConf,
      strengths: strengthsFinal,
      improvements: improvementsFinal,
      roadmap,
      examples,
      examplesPersonalized,
      quickWins: quickWinsFinal,
      bigger,
      together,
      motivation
    };
  }, [data, hasSummary, hasSkills, hasExperience, hasProjects, hasEducation, leadershipCount, skillCount, expBulletCount, certCount, resumeStrength, recruiterReview]);

  const workflowSteps = ['Upload','Resume Snapshot','Recruiter Review','Coach Review','Job Match','Resume Workshop','ATS Inspection','Export'];
  const currentWorkflowStepIndex = !hasStarted ? 0 : (showRecruiterReview ? 2 : (showCoachReview ? 3 : (showBuilderWorkspace ? (activeWorkshopSection === "Job Match" ? 4 : activeWorkshopSection === "Resume Workshop" ? 5 : activeWorkshopSection === "ATS Inspection" ? 6 : activeWorkshopSection === "Export" ? 7 : 1) : 1)));
  const nextWorkflowStep = workflowSteps[Math.min(workflowSteps.length - 1, currentWorkflowStepIndex + 1)];
  const nextStepIcon = {
    'Resume Snapshot': '📋',
    'Recruiter Review': '👀',
    'Coach Review': 'CJ',
    'Job Match': '🎯',
    'Resume Workshop': '🛠️',
    'ATS Inspection': '🔎',
    'Export': '⬇️'
  }[nextWorkflowStep] || '✓';
  const thirdSummaryCard = (() => {
    if (showBuilderWorkspace && activeWorkshopSection === "Export") return { title: "Ready to Apply", value: "✓", sub: "Resume optimized and ready" };
    if (showBuilderWorkspace && activeWorkshopSection === "ATS Inspection") return { title: "ATS Compatibility", value: atsScore, sub: "Final technical validation" };
    if (showBuilderWorkspace && activeWorkshopSection === "Resume Workshop") return { title: "Projected Improvement", value: resumeStrength.overall + " → " + Math.min(99, resumeStrength.overall + 7), sub: "Apply job-tailoring guidance" };
    if (optimizer.keyword) return { title: "Job Match", value: optimizer.keyword.matchPct, sub: "Fit for target job" };
    if (showBuilderWorkspace && activeWorkshopSection === "Job Match") return { title: "Current Step", value: "🎯", sub: "Paste a job posting or URL" };
    return { title: "Next Step", value: nextStepIcon, sub: nextWorkflowStep + " is next" };
  })();

  return (
    <div>
      <div className="no-print" style={{ position: "sticky", top: 0, zIndex: 20, background: "#fff", borderBottom: "1px solid #e2e8f0", boxShadow: "0 1px 3px rgba(0,0,0,.05)" }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", padding: "12px 16px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 32, height: 32, borderRadius: 8, background: "#1F3864", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700 }}>CJ</div>

              <div style={{ fontSize: 16, fontWeight: 700, lineHeight: 1.1, textAlign: "left" }}>Coach Jeff</div>

            <button onClick={reset} style={{ padding: "8px 12px", fontSize: 14, borderRadius: 8, border: "1px solid #cbd5e1", background: "#fff", cursor: "pointer" }}>Reset</button>
            <a href="https://coachjeff-coverletter.netlify.app/" style={{ padding: "8px 12px", fontSize: 14, borderRadius: 8, border: "1px solid #1F3864", background: "#fff", color: "#1F3864", fontWeight: 600, textDecoration: "none", whiteSpace: "nowrap" }}>Cover Letter →</a>
            <a href="https://coachjeff-jobfinder.netlify.app/" style={{ padding: "8px 12px", fontSize: 14, borderRadius: 8, border: "1px solid #1F3864", background: "#fff", color: "#1F3864", fontWeight: 600, textDecoration: "none", whiteSpace: "nowrap" }}>Job Finder →</a>
            <button onClick={printPdf} style={{ padding: "8px 12px", fontSize: 14, borderRadius: 8, border: "1px solid #cbd5e1", background: "#fff", cursor: "pointer" }}>Print / PDF</button>
            <button onClick={exportDocxReal} disabled={busy} style={{ padding: "8px 16px", fontSize: 14, fontWeight: 600, borderRadius: 8, border: "none", background: "#1F3864", color: "#fff", cursor: "pointer", opacity: busy ? .6 : 1 }}>{busy ? "Building…" : "Download Word"}</button>
          </div>
        </div>
      </div>

      {!hasStarted ? (<div className="no-print" style={{ maxWidth: 1100, margin: "0 auto", padding: "36px 16px" }}>
        <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 18, padding: 28, boxShadow: "0 1px 6px rgba(0,0,0,.05)", display: "grid", gridTemplateColumns: "1.05fr .95fr", gap: 24, alignItems: "start" }}>
          <div>
            <div style={{ fontSize: 12, fontWeight: 900, color: "#1F3864", textTransform: "uppercase", letterSpacing: .6, marginBottom: 8 }}>Step 1 of 8</div>
            <h1 style={{ fontSize: 36, lineHeight: 1.1, color: "#1F3864", margin: "0 0 10px" }}>Start here.</h1>
            <p style={{ fontSize: 17, lineHeight: 1.55, color: "#334155", marginBottom: 18 }}>Start by choosing the type of role you're targeting. Coach Jeff will use that choice throughout the entire optimization process—from Snapshot through Job Match, Resume Workshop, ATS Inspection, and Export.</p>
            <div style={{ background: "#eff6ff", borderLeft: "5px solid #1F3864", borderRadius: 12, padding: 14, color: "#1e3a8a", fontSize: 13, lineHeight: 1.45 }}><b>Coach Jeff's Insight:</b> The goal is not a perfect score. The goal is a resume that is clear, honest, recruiter-friendly, and ready to submit.</div>
          </div>
          <div style={{ padding: 18, background: "#f8fafc", border: "1px dashed #94a3b8", borderRadius: 14 }}>
            <div style={{ marginBottom: 14, padding: 12, background: "#fff", border: "1px solid #e2e8f0", borderRadius: 12 }}>
              <label style={{ fontSize: 12, fontWeight: 800, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 6 }}>Target Field / Industry</label>
              <p style={{ fontSize: 11.5, color: "#64748b", lineHeight: 1.35, marginBottom: 8, textAlign: "left" }}>Choose your target role once before importing your resume. Coach Jeff will personalize the entire workflow using this selection.</p>
              <select value={data.field} onChange={(e) => applyPreset(e.target.value)} style={iC}>
                <option value="">— What type of role are you targeting? —</option>
                {Object.keys(FIELD_PRESETS).map((f) => <option key={f}>{f}</option>)}
              </select>
            </div>
            <label style={{ fontSize: 12, fontWeight: 800, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 8 }}>{currentResumeName ? "Current Resume" : "Upload Resume"}</label>
            <input ref={resumeFileInputRef} type="file" accept=".docx,.pdf,.txt,.json,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain,application/json" onChange={handleResumeImportFile} style={{ width: "100%", fontSize: 13, marginBottom: 8 }} />
            {importFileStatus && <p style={{ fontSize: 11, color: importBlocked || importFileStatus.includes("Could not") || importFileStatus.includes("Unsupported") || importFileStatus.includes("appears to be") ? "#dc2626" : "#16a34a", marginTop: 5, lineHeight: 1.35, textAlign: "left" }}>{importFileStatus}</p>}
            <textarea rows={7} style={{ ...iC, resize: "vertical", lineHeight: 1.45, marginTop: 8 }} placeholder="Or paste the full existing resume here…" value={importText} onChange={(e) => { setImportText(e.target.value); setImportPreview(null); setImportFileStatus(""); setImportBlocked(false); setImportLinks(null); }} />
            <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
              <button onClick={previewImport} disabled={importBlocked} style={{ padding: "10px 14px", fontSize: 13, borderRadius: 8, border: "1px solid #1F3864", background: "#fff", color: "#1F3864", fontWeight: 700, cursor: importBlocked ? "not-allowed" : "pointer", opacity: importBlocked ? .45 : 1 }}>Review Import</button>
              <button onClick={applyImport} disabled={importBlocked} style={{ padding: "10px 14px", fontSize: 13, borderRadius: 8, border: "none", background: "#1F3864", color: "#fff", fontWeight: 800, cursor: importBlocked ? "not-allowed" : "pointer", opacity: importBlocked ? .45 : 1 }}>Begin Guided Review</button>
            </div>
          </div>
        </div>
      </div>
      ) : null}

      {hasStarted ? (
        <div className="no-print" style={{ maxWidth: 1100, margin: "0 auto", padding: "12px 16px 0" }}>
          <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 16, padding: 12, boxShadow: "0 1px 5px rgba(0,0,0,.05)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", gap: 12, flexWrap: "wrap", alignItems: "center", marginBottom: 10 }}>
              <div style={{ textAlign: "left" }}>
                <div style={{ fontSize: 11, color: "#64748b", fontWeight: 800 }}>Coach Jeff &gt; Resume Optimizer &gt; {showRecruiterReview ? "Recruiter Review" : (showCoachReview ? "Coach Review" : (showBuilderWorkspace ? activeWorkshopSection : "Resume Snapshot"))}</div>
                <div style={{ fontSize: 15, fontWeight: 900, color: "#1F3864", marginTop: 3 }}>{currentResumeName || data.name || "Current resume"}</div>
                <div style={{ fontSize: 11, color: "#16a34a", fontWeight: 700 }}>Imported successfully • Target: {data.field || "Not selected"}</div>
              </div>
              <div style={{ textAlign: "right", fontSize: 11, color: "#64748b", lineHeight: 1.4 }}>
                <div><b>Sections detected:</b> {data.order.filter(k => !data.hidden[k]).length}</div>
                <div><b>Import confidence:</b> {importPreview || importIntelligence ? "High" : "Draft"}</div>
              </div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 8, marginBottom: 10 }}>

              <div style={{ padding: "9px 11px", borderRadius: 12, background: "#f8fafc", border: "1px solid #e2e8f0" }}>
                <div style={{ fontSize: 10.5, color: "#64748b", fontWeight: 900, textTransform: "uppercase" }}>{showBuilderWorkspace && activeWorkshopSection === "ATS Inspection" ? "ATS Compatibility" : "Import Quality"}</div>
                <div style={{ fontSize: 24, fontWeight: 900, color: "#1F3864" }}>{showBuilderWorkspace && activeWorkshopSection === "ATS Inspection" ? atsScore : ((importPreview || importIntelligence) ? "High" : "Draft")}</div>
                <div style={{ fontSize: 11, color: "#64748b" }}>{showBuilderWorkspace && activeWorkshopSection === "ATS Inspection" ? "Technical formatting and parsing check" : (data.order.filter(k => !data.hidden[k]).length + " sections detected")}</div>
              </div>

                <div style={{ fontSize: 10.5, color: "#64748b", fontWeight: 900, textTransform: "uppercase" }}>{thirdSummaryCard.title}</div>

                <div style={{ fontSize: 11, color: "#64748b" }}>{thirdSummaryCard.sub}</div>
              </div>
            </div>

            <div style={{ marginBottom: 10, padding: "8px 10px", borderRadius: 12, background: "#eff6ff", color: "#1e3a8a", fontSize: 11.5, lineHeight: 1.35 }}><b>Score guide:</b> Resume Health = overall resume quality. Import Quality = how well the resume was parsed. Job Match appears after a posting is loaded. ATS Compatibility appears during the final technical validation step.</div>

            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
              {workflowSteps.map((s, i) => {
                const active = i === currentWorkflowStepIndex;
                const completed = i < currentWorkflowStepIndex;
                const label = (completed ? "✓ " : (active ? "● " : "○ ")) + (i + 1) + ". " + s;
                const goSnapshot = () => { setShowRecruiterReview(false); setShowCoachReview(false); setShowBuilderWorkspace(false); };
                const goRecruiter = () => { setShowRecruiterReview(true); setShowCoachReview(false); setShowBuilderWorkspace(false); };
                const goCoach = () => { setShowRecruiterReview(false); setShowCoachReview(true); setShowBuilderWorkspace(false); };
                const goMatch = () => scrollToWorkshopSection("Job Match");
                const goEdit = () => scrollToWorkshopSection("Resume Workshop");
                const goATS = () => scrollToWorkshopSection("ATS Inspection");
                const goExport = () => scrollToWorkshopSection("Export");
                const click = i === 1 ? goSnapshot : (i === 2 ? goRecruiter : (i === 3 ? goCoach : (i === 4 ? goMatch : (i === 5 ? goEdit : (i === 6 ? goATS : (i === 7 ? goExport : undefined))))));
                return <span key={s} onClick={click} className={active ? "cj-step active" : "cj-step"} style={{ cursor: click ? "pointer" : "default" }}>{label}</span>;
              })}
            </div>
          </div>
        </div>
      ) : null}

      {hasStarted && !showBuilderWorkspace && !showRecruiterReview && !showCoachReview ? (
        <div className="no-print" style={{ maxWidth: 1100, margin: "0 auto", padding: "16px 16px 0" }}>
          <div style={{ display: "flex", justifyContent: "space-between", gap: 14, alignItems: "end", flexWrap: "wrap", marginBottom: 10 }}>
            <div style={{ textAlign: "left" }}>
              <h2 style={{ fontSize: 28, lineHeight: 1.15, color: "#1F3864", margin: 0 }}>Resume Snapshot</h2>
              <p style={{ fontSize: 13, color: "#64748b", marginTop: 4 }}>A quick coaching dashboard: strengths, opportunities, completeness, and the best next action.</p>
            </div>
            <button onClick={printPdf} style={{ padding: "8px 12px", fontSize: 13, borderRadius: 8, border: "1px solid #cbd5e1", background: "#fff", cursor: "pointer" }}>Print Snapshot</button>
          </div>

          <div style={{ background: "#f8fafc", border: "1px solid #e2e8f0", borderLeft: "5px solid #16a34a", borderRadius: 14, padding: 12, color: "#1e293b", fontSize: 12.5, lineHeight: 1.4, marginBottom: 10, textAlign: "left" }}>

                      <button key={skill} onClick={() => addSkillToTechnical(skill)} title="Add to Technical Skills" style={{ fontSize: 11, borderRadius: 999, border: "1px solid #cbd5e1", background: "#fff", color: "#334155", padding: "4px 8px", cursor: "pointer" }}>+ {skill}{count > 0 ? " ×" + count : ""}{tag ? " · " + tag : ""}</button>

                      <button key={skill} onClick={() => set({ skills: { ...data.skills, dataVisualization: addUniqueCsv(data.skills.dataVisualization || "", skill) } })} title="Add to Data Visualization" style={{ fontSize: 11, borderRadius: 999, border: "1px solid #cbd5e1", background: "#fff", color: "#334155", padding: "4px 8px", cursor: "pointer" }}>+ {skill}</button>
                    ))}
                  </div>

                  <div style={{ fontSize: 11, fontWeight: 700, color: "#334155", marginBottom: 5, textAlign: "left" }}>Suggested Tools & Platforms</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 10 }}>
                    {toolSuggestedSkills.filter(skill => !skillAlreadyOnResume(data, skill)).map(skill => { const count = skillMentionCount(data.jobPost, skill); const tag = sectionMentionType(data.jobPost, skill); return (
                      <button key={skill} onClick={() => addSkillToTools(skill)} title="Add to Tools & Platforms" style={{ fontSize: 11, borderRadius: 999, border: "1px solid #cbd5e1", background: "#fff", color: "#334155", padding: "4px 8px", cursor: "pointer" }}>+ {skill}{count > 0 ? " ×" + count : ""}{tag ? " · " + tag : ""}</button>
                    ); })}
                  </div>

                  <div style={{ fontSize: 11, fontWeight: 700, color: "#334155", marginBottom: 5, textAlign: "left" }}>Suggested Domain Knowledge</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {["Data Governance","Risk Management","Business Analysis","Public Health Analytics","AI Governance"].filter(skill => !skillAlreadyOnResume(data, skill)).map(skill => (
                      <button key={skill} onClick={() => set({ skills: { ...data.skills, domain: addUniqueCsv(data.skills.domain || "", skill) } })} title="Add to Domain Knowledge" style={{ fontSize: 11, borderRadius: 999, border: "1px solid #cbd5e1", background: "#fff", color: "#334155", padding: "4px 8px", cursor: "pointer" }}>+ {skill}</button>
                    ))}
                  </div>

                  <p style={{ fontSize: 10.5, color: "#92400e", background: "#fffbeb", border: "1px solid #fde68a", borderRadius: 8, padding: "7px 8px", marginTop: 8, lineHeight: 1.4, textAlign: "left" }}><b>Truth rule:</b> Only add keywords and skills that accurately reflect your background and can be supported through experience, projects, coursework, certifications, or other accomplishments.</p>
                </div>
              </Card>
            );
            if (key === "experience") return (

            if (key === "projects") return (

            if (key === "education") return (

            if (key === "activities") return (

                  </Entry>

              </Card>
            );
            if (key === "certifications") return (
              <Card key={key} title="Certifications" onClear={() => clearSection("certifications")}>

                  <Entry key={x.id} onDelete={() => delItem("certifications", x.id)} canDelete={data.certifications.length > 1}>

            if (key === "awards") return (

                    <div style={grid2}>
                      <input style={iC} placeholder="Award / Honor" value={x.name} onChange={(ev) => updItem("awards", x.id, { name: ev.target.value })} />

            if (key === "publications") return (

                {data.publications.map((x) => (

                    <label style={{ ...lC, marginTop: 8 }}>Date (optional)</label>
                    <input style={iC} placeholder="Year or Mon YYYY" value={x.date} onChange={(ev) => updItem("publications", x.id, { date: ev.target.value })} />

              </Card>
            );
            if (key === "volunteer") return (
              <Card key={key} title="Volunteer Experience" onClear={() => clearSection("volunteer")}>
                {data.volunteer.map((v) => (
                  <Entry key={v.id} onDelete={() => delItem("volunteer", v.id)} canDelete={data.volunteer.length > 1}>
                    <div style={grid2}>
                      <input style={iC} placeholder="Role / Title" value={v.role} onChange={(ev) => updItem("volunteer", v.id, { role: ev.target.value })} />
                      <input style={iC} placeholder="Organization" value={v.org} onChange={(ev) => updItem("volunteer", v.id, { org: ev.target.value })} />
                      <input style={iC} placeholder="City, ST" value={v.location} onChange={(ev) => updItem("volunteer", v.id, { location: ev.target.value })} />
                      <div style={grid2}>
                        <input style={iC} placeholder="Start" value={v.start} onChange={(ev) => updItem("volunteer", v.id, { start: ev.target.value })} />
                        <input style={iC} placeholder="End" value={v.end} onChange={(ev) => updItem("volunteer", v.id, { end: ev.target.value })} />
                      </div>
                    </div>
                    <Bullets bullets={v.bullets} onChange={(bi, val) => updBullet("volunteer", v.id, bi, val)} onAdd={() => addBullet("volunteer", v.id)} onDel={(bi) => delBullet("volunteer", v.id, bi)} hint="What you did + impact (use numbers where you can)." />
                  </Entry>
                ))}
                <AddBtn label="Add volunteer experience" onClick={() => addItem("volunteer", emptyVol)} />
              </Card>
            );
            return null;
          })}
        </div>

        <div style={{ position: "sticky", top: 80 }}>
          <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #e2e8f0", padding: 16, marginBottom: 12 }}>
            <h3 style={{ fontSize: 14, fontWeight: 700, marginBottom: 4 }}>Section Order</h3>
            <p style={{ fontSize: 11, color: "#64748b", marginBottom: 8 }}>All sections start in the recommended order for your field. Drag or use ▲▼ to reorder. Tap <b>Hide</b> on any section you don't need — and empty sections never appear on the finished resume anyway.</p>
            <div style={{ fontSize: 10.5, color: "#475569", background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 8, padding: 8, marginBottom: 10, lineHeight: 1.35, textAlign: "left" }}>
              <b>Why this order?</b> {sectionOrderExplanation(data)}
              <div style={{ marginTop: 6 }}>
                <button onClick={() => set({ order: smartRecommendedOrder(data) })} style={{ fontSize: 10.5, borderRadius: 7, border: "1px solid #cbd5e1", background: "#fff", color: "#1F3864", padding: "4px 7px", cursor: "pointer", fontWeight: 700 }}>Apply Smart Order</button>
              </div>
            </div>
            <ul style={{ listStyle: "none" }}>
              {data.order.map((key, i) => {
                const meta = SECTION_META[key]; const hidden = !!data.hidden[key];
                return (
                  <li key={key} draggable onDragStart={() => setDragIdx(i)} onDragOver={(e) => { e.preventDefault(); setOverIdx(i); }} onDrop={() => onDrop(i)} onDragEnd={() => { setDragIdx(null); setOverIdx(null); }}
                    style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 8px", marginBottom: 6, borderRadius: 8, border: "1px solid " + (overIdx === i && dragIdx !== null ? "#60a5fa" : "#e2e8f0"), background: overIdx === i && dragIdx !== null ? "#eff6ff" : "#f8fafc", opacity: hidden ? .5 : 1, cursor: "grab" }}>
                    <span style={{ color: "#94a3b8" }}>⋮⋮</span>
                    <span style={{ fontSize: 14, flex: 1, textAlign: "left" }}>{meta.label}</span>
                    <button onClick={() => move(i, -1)} title="Up" style={{ border: "none", background: "none", cursor: "pointer", color: "#64748b" }}>▲</button>
                    <button onClick={() => move(i, 1)} title="Down" style={{ border: "none", background: "none", cursor: "pointer", color: "#64748b" }}>▼</button>
                    {meta.removable && <button onClick={() => toggleHide(key)} title={hidden ? "Add this section" : "Hide this section"} style={{ border: "1px solid " + (hidden ? "#1F3864" : "#cbd5e1"), background: hidden ? "#1F3864" : "#fff", color: hidden ? "#fff" : "#64748b", cursor: "pointer", fontSize: 11, fontWeight: 600, borderRadius: 6, padding: "3px 8px", whiteSpace: "nowrap" }}>{hidden ? "+ Add" : "Hide"}</button>}
                  </li>
                );
              })}
            </ul>
          </div>
          <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #e2e8f0", padding: 16, marginBottom: 12 }}>
            <h3 style={{ fontSize: 14, fontWeight: 700, marginBottom: 4 }}>Skills Coverage</h3>
            <p style={{ fontSize: 11, color: "#64748b", marginBottom: 10 }}>Analysis only. Add or edit skills in the main Skills section.</p>
            <div style={{ fontSize: 11, lineHeight: 1.55, textAlign: "left" }}>
              <div><b>Technical Skills:</b> {resumeStrength.skills.technicalCount}</div>
              <div><b>Data Visualization:</b> {resumeStrength.skills.dataVisualizationCount}</div>
              <div><b>Tools & Platforms:</b> {resumeStrength.skills.toolsCount}</div>
              <div><b>Domain Knowledge:</b> {resumeStrength.skills.domainCount}</div>
              <div style={{ marginTop: 6, paddingTop: 6, borderTop: "1px solid #e2e8f0" }}><b>Total Listed:</b> {resumeStrength.skills.technicalCount + resumeStrength.skills.dataVisualizationCount + resumeStrength.skills.toolsCount + resumeStrength.skills.domainCount}</div>
            </div>
            {optimizer.keyword ? <div style={{ marginTop: 10, fontSize: 11, lineHeight: 1.45, textAlign: "left" }}>
              <div style={{ background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 8, padding: 10, marginBottom: 8 }}>
                <div style={{ fontSize: 11, color: "#64748b", fontWeight: 700 }}>Job Match</div>
                <div style={{ fontSize: 28, fontWeight: 800, color: optimizer.keyword.matchPct >= 75 ? "#16a34a" : optimizer.keyword.matchPct >= 50 ? "#d97706" : "#dc2626" }}>{optimizer.keyword.matchPct}%</div>
              </div>
              {optimizer.keyword.missingSkills.length > 0 ? <div><b>Potential skill gaps:</b> {optimizer.keyword.missingSkills.slice(0, 6).join(", ")}</div> : <div>No major suggested skill gaps from the pasted job posting.</div>}
            </div> : <p style={{ fontSize: 10.5, color: "#64748b", marginTop: 10, textAlign: "left" }}>Paste a target job posting to see role-specific keyword gaps.</p>}
          </div>

          <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: 12, padding: 16 }}>
            <h3 style={{ fontSize: 12, fontWeight: 700, color: "#92400e", marginBottom: 8, textTransform: "uppercase", letterSpacing: 0.5 }}>ATS Tips</h3>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {[
                "Mirror exact keywords from the job posting.",
                "Quantify everything: %, $, #, time saved.",
                "Aim for one page; two is fine when content earns it.",
                "Submit .docx unless the posting requires PDF.",
                "No tables, text boxes, or graphics — this builder keeps you safe.",
                "Your draft autosaves 10 seconds after you pause typing; use Save for an immediate save.",
              ].map((tip, i) => (
                <div key={i} style={{ display: "flex", gap: 7, alignItems: "flex-start", textAlign: "left" }}>
                  <span style={{ color: "#16a34a", fontWeight: 700, flexShrink: 0, lineHeight: 1.5 }}>✓</span>
                  <span style={{ fontSize: 11, color: "#92400e", lineHeight: 1.5 }}>{tip}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      <Preview data={data} />
    </div>
  );
}

function Preview({ data }) {
  const H = ({ children }) => <div style={{ borderBottom: "1px solid #1F3864", color: "#1F3864", fontWeight: 700, fontSize: 12, letterSpacing: .5, textTransform: "uppercase", paddingBottom: 2, marginTop: 12, marginBottom: 4 }}>{children}</div>;
  const Row = ({ l, r, bl, ri }) => <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11 }}><span style={{ fontWeight: bl ? 700 : 400 }}>{l}</span><span style={{ fontStyle: ri ? "italic" : "normal" }}>{r}</span></div>;
  const cleanBulletText = (s) => String(s || "").replace(/^([••\-\*]\s*)+/, "");
  const Bul = ({ items }) => <ul style={{ margin: "2px 0 0", paddingLeft: 16, fontSize: 11 }}>{items.filter((b) => b.trim()).map((b, i) => <li key={i} style={{ marginBottom: 2 }}>{cleanBulletText(b)}</li>)}</ul>;
  const C = ({ children }) => <div style={{ marginTop: 10 }}>{children}</div>;
  return (
    <div className="print-only" style={{ fontFamily: "Arial, sans-serif", color: "#000", maxWidth: "8.5in", margin: "0 auto", padding: "0.5in", background: "#fff" }}>
      <div style={{ textAlign: "center", color: "#1F3864", fontWeight: 700, fontSize: 22, textTransform: "uppercase" }}>{data.name || "First Last"}</div>
      <div style={{ textAlign: "center", color: "#595959", fontSize: 11, marginTop: 4 }}>{[data.contact.cityState, data.contact.phone, data.contact.email, data.contact.linkedin, data.contact.portfolio].filter(Boolean).join("  |  ")}</div>
      {data.order.map((key) => {
        if (data.hidden[key]) return null;
        if (key === "summary" && data.summary.trim()) return <C key={key}><H>Professional Summary</H><p style={{ fontSize: 11 }}>{data.summary}</p></C>;
        if (key === "skills") { const s = data.skills; if (!s.technical && !s.tools) return null; return <C key={key}><H>Skills</H>{s.technical && <div style={{ fontSize: 11 }}><b>Technical:</b> {s.technical}</div>}{s.tools && <div style={{ fontSize: 11 }}><b>Tools/Platforms:</b> {s.tools}</div>}</C>; }
        if (key === "experience") { const it = data.experience.filter((e) => e.title || e.org); if (!it.length) return null; return <C key={key}><H>Experience</H>{it.map((e) => <div key={e.id} style={{ marginBottom: 6 }}><Row l={e.title} r={[e.start, e.end].filter(Boolean).join(" – ")} bl /><Row l={e.org} r={e.location} ri /><Bul items={e.bullets} /></div>)}</C>; }
        if (key === "projects") { const it = data.projects.filter((p) => p.name); if (!it.length) return null; return <C key={key}><H>Projects</H>{it.map((p) => { const sp = splitProjectLines(p.bullets); return <div key={p.id} style={{ marginBottom: 6 }}><Row l={p.name} r={p.date} bl />{sp.context && <div style={{ fontSize: 11 }}>{sp.context}</div>}{sp.toolsValue && <div style={{ fontSize: 11 }}><b>Technologies:</b> {sp.toolsValue}</div>}<Bul items={sp.accomplishments} /></div>; })}</C>; }
        if (key === "education") { const it = data.education.filter((ed) => ed.degree || ed.school); if (!it.length) return null; return <C key={key}><H>Education</H>{it.map((ed) => { const dm = splitDegreeMinor(ed.degree || ""); return <div key={ed.id} style={{ marginBottom: 6 }}><Row l={ed.school} r={ed.location} bl /><Row l={dm.degree} r={ed.grad} bl />{dm.minor && <div style={{ fontSize: 11 }}>{dm.minor}</div>}{(ed.gpa || ed.coursework) && <div style={{ fontSize: 11, color: "#595959" }}>{[ed.gpa && "GPA: " + ed.gpa, ed.coursework && "Relevant Coursework: " + ed.coursework].filter(Boolean).join("  •  ")}</div>}</div>; })}</C>; }
        if (key === "activities") { const it = data.activities.filter((a) => a.role || a.org); if (!it.length) return null; return <C key={key}><H>Leadership & Activities</H>{it.map((a) => <div key={a.id} style={{ marginBottom: 6 }}><Row l={[a.role, a.org].filter(Boolean).join(" — ")} r={[a.start, a.end].filter(Boolean).join(" – ")} bl /><Bul items={a.bullets} /></div>)}</C>; }
        if (key === "certifications") { const it = data.certifications.filter((x) => x.name); if (!it.length) return null; return <C key={key}><H>Certifications</H>{it.map((x) => <Row key={x.id} l={x.name} r={[x.issuer, x.date].filter(Boolean).join(", ")} bl />)}</C>; }
        if (key === "awards") { const it = data.awards.filter((x) => x.name); if (!it.length) return null; return <C key={key}><H>Awards & Honors</H>{it.map((x) => <Row key={x.id} l={x.name} r={[x.issuer, x.date].filter(Boolean).join(", ")} bl />)}</C>; }
        if (key === "publications") { const it = data.publications.filter((x) => x.citation); if (!it.length) return null; return <C key={key}><H>Publications / Research</H>{it.map((x) => <div key={x.id} style={{ marginBottom: 4 }}><Row l={x.citation} r={x.date} /></div>)}</C>; }
        if (key === "volunteer") { const it = data.volunteer.filter((v) => v.role || v.org); if (!it.length) return null; return <C key={key}><H>Volunteer Experience</H>{it.map((v) => <div key={v.id} style={{ marginBottom: 6 }}><Row l={v.role} r={[v.start, v.end].filter(Boolean).join(" – ")} bl /><Row l={v.org} r={v.location} ri /><Bul items={v.bullets} /></div>)}</C>; }
        return null;
      })}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

<script>
(function () {
  var statusEl = document.getElementById("root");
  function setMsg(html) { if (statusEl) statusEl.innerHTML = html; }

  // Load a script from a list of URLs, trying each until one works.
  function loadWithFallback(urls, testFn) {
    return new Promise(function (resolve, reject) {
      var i = 0;
      function tryNext() {
        if (i >= urls.length) { reject(new Error("All sources failed: " + urls.join(", "))); return; }
        var s = document.createElement("script");
        s.src = urls[i];
        s.onload = function () {
          if (!testFn || testFn()) resolve(urls[i]);
          else { i++; tryNext(); }
        };
        s.onerror = function () { i++; tryNext(); };
        document.head.appendChild(s);
      }
      tryNext();
    });
  }

  var steps = [
    { name: "React", urls: [
        "https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js",
        "https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js",
        "https://unpkg.com/react@18.2.0/umd/react.production.min.js"
      ], test: function () { return typeof window.React !== "undefined"; } },
    { name: "ReactDOM", urls: [
        "https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js",
        "https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js",
        "https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"
      ], test: function () { return typeof window.ReactDOM !== "undefined"; } },
    { name: "Babel", urls: [
        "https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js",
        "https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js",
        "https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"
      ], test: function () { return typeof window.Babel !== "undefined"; } }
  ];

  function runChain(idx) {
    if (idx >= steps.length) { compileAndRun(); return; }
    var st = steps[idx];
    setMsg('<div style="padding:40px;text-align:center;color:#64748b;font-family:Arial,sans-serif;">Loading the resume builder… (' + st.name + ')</div>');
    loadWithFallback(st.urls, st.test).then(function () { runChain(idx + 1); }).catch(function (e) {
      setMsg('<div style="max-width:600px;margin:40px auto;padding:24px;background:#fff;border:1px solid #fde68a;border-radius:12px;font-family:Arial,sans-serif;font-size:14px;line-height:1.6;color:#92400e;">' +
        '<h2 style="margin-bottom:8px;">Couldn’t load: ' + st.name + '</h2>' +
        '<p>This page needs internet access the first time it opens, to load a few libraries. ' +
        'It looks like <b>' + st.name + '</b> couldn’t be reached.</p>' +
        '<p style="margin-top:10px;"><b>Try this:</b> make sure you’re online, then refresh. ' +
        'If you’re opening the file directly from your computer (the address bar starts with <code>file://</code>) and it still fails, ' +
        'the most reliable fix is to put it online with a free host — then it always works.</p></div>');
    });
  }

  function compileAndRun() {
    try {
      var src = document.getElementById("app-source").textContent;
      var out = window.Babel.transform(src, { presets: ["react"] }).code;
      var run = new Function(out);
      run();
    } catch (err) {
      setMsg('<div style="max-width:600px;margin:40px auto;padding:24px;background:#fff;border:1px solid #fca5a5;border-radius:12px;font-family:Arial,sans-serif;color:#991b1b;">' +
        '<h2 style="margin-bottom:8px;">Something went wrong starting the app</h2><p>' + (err && err.message ? err.message : err) + '</p></div>');
    }
  }

  runChain(0);
})();
</script>


</body>
